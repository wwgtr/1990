<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حُسْنُ الظَّنِّ يُ рожِعُ المَظَانَّ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.font.im/css2?family=Amiri+Quran&family=Reem+Kufi:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Reem Kufi', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            direction: rtl;
            line-height: 1.8;
            background-image: 
                radial-gradient(circle at top right, rgba(30, 41, 59, 0.8), transparent 40%),
                radial-gradient(circle at bottom left, rgba(30, 41, 59, 0.8), transparent 40%),
                url('https://image.qwenlm.ai/public_source/d903aaa9-bfc2-49c8-8014-517d4806a20e/11b06aab9-2b6f-4acc-8780-451d289c3163.png');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9));
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            position: relative;
            margin-bottom: 3rem;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-family: 'Amiri Quran', serif;
            font-size: 3.5rem;
            color: #38bdf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(56, 189, 248, 0.2);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .card-title {
            font-size: 1.5rem;
            color: #38bdf8;
            margin-bottom: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quote {
            font-family: 'Amiri Quran', serif;
            font-size: 1.3rem;
            line-height: 2;
            color: #f8fafc;
            text-align: center;
            margin: 1.5rem 0;
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.5);
            border-right: 3px solid #38bdf8;
            border-radius: 8px;
        }

        .quote-author {
            text-align: left;
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .poem-line {
            font-family: 'Amiri Quran', serif;
            font-size: 1.2rem;
            line-height: 2.2;
            color: #f8fafc;
            text-align: center;
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 8px;
        }

        .poem-title {
            text-align: center;
            color: #38bdf8;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .wisdom {
            font-size: 1.1rem;
            color: #cbd5e1;
            text-align: center;
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 8px;
            border-top: 2px solid #38bdf8;
        }

        .theme-tag {
            display: inline-block;
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 1rem;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            color: #94a3b8;
            border-top: 1px solid rgba(56, 189, 248, 0.1);
        }

        .navigation {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(30, 41, 59, 0.7);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Reem Kufi', sans-serif;
        }

        .nav-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            transform: translateY(-2px);
        }

        .active-section {
            display: block;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
            
            .logo {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="https://image.qwenlm.ai/public_source/d903aaa9-bfc2-49c8-8014-517d4806a20e/1fefe8e57-5b65-4561-b970-d5523244e235.png" alt="Logo" class="logo">
            </div>
            <h1>حُسْنُ الظَّنِّ يُ рожِعُ المَظَانَّ</h1>
            <p class="subtitle">مَجمَعةٌ لِلحِكَمِ وَالأشعارِ وَالأقوالِ العَطرةِ</p>
        </header>

        <div class="navigation">
            <button class="nav-btn active" onclick="showSection('quotes')">الأقوال</button>
            <button class="nav-btn" onclick="showSection('poems')">الأشعار</button>
            <button class="nav-btn" onclick="showSection('wisdom')">الحكم</button>
            <button class="nav-btn" onclick="showSection('verses')">نُبذ مِنَ الآيات</button>
        </div>

        <div id="quotes" class="content-grid active-section">
            <!-- Quotes will be populated by JavaScript -->
        </div>

        <div id="poems" class="content-grid hidden">
            <!-- Poems will be populated by JavaScript -->
        </div>

        <div id="wisdom" class="content-grid hidden">
            <!-- Wisdom will be populated by JavaScript -->
        </div>

        <div id="verses" class="content-grid hidden">
            <!-- Verses will be populated by JavaScript -->
        </div>

        <footer>
            <p>مَوْقِعٌ مُعَدٌّ لِتَنْوِيرِ الْقُلُوبِ وَالْعُقُولِ بِالْحِكَمِ وَالْمَوَاعِظِ</p>
            <p>© 2026 حُسْنُ الظَّنِّ يُ рожِعُ المَظَانَّ - جَمِيعُ الْحُقُوقِ مَحْفُوظَةٌ</p>
        </footer>
    </div>

    <script>
        // Include the data files
        document.write('<script src="aqtabasat.js"><\/script>');
        document.write('<script src="shu3r.js"><\/script>');
        document.write('<script src="hikam.js"><\/script>');
        document.write('<script src="nubdhat.js"><\/script>');

        // DOM elements
        const quotesContainer = document.getElementById('quotes');
        const poemsContainer = document.getElementById('poems');
        const wisdomContainer = document.getElementById('wisdom');
        const versesContainer = document.getElementById('verses');

        // Function to show selected section
        function showSection(sectionId) {
            // Hide all sections
            document.querySelectorAll('.content-grid').forEach(section => {
                section.classList.remove('active-section');
                section.classList.add('hidden');
            });

            // Show selected section
            document.getElementById(sectionId).classList.remove('hidden');
            document.getElementById(sectionId).classList.add('active-section');

            // Update active button
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Populate the section if it's empty
            if (document.getElementById(sectionId).children.length === 0) {
                populateSection(sectionId);
            }
        }

        // Function to populate a section
        function populateSection(sectionId) {
            switch(sectionId) {
                case 'quotes':
                    renderQuotes();
                    break;
                case 'poems':
                    renderPoems();
                    break;
                case 'wisdom':
                    renderWisdom();
                    break;
                case 'verses':
                    renderVerses();
                    break;
            }
        }

        // Render quotes
        function renderQuotes() {
            quotesContainer.innerHTML = '';
            window.aqtabasat.forEach(quote => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3 class="card-title"> quoting </h3>
                    <div class="quote">${quote.full}</div>
                    <div class="quote-author">— ${quote.theme}</div>
                    <div class="theme-tag">${quote.theme}</div>
                `;
                quotesContainer.appendChild(card);
            });
        }

        // Render poems
        function renderPoems() {
            poemsContainer.innerHTML = '';
            window.shu3r.forEach(poem => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3 class="card-title"> 📜 ${poem.title} </h3>
                    <div class="poem-lines">
                        ${poem.lines.map(line => `<div class="poem-line">${line}</div>`).join('')}
                    </div>
                `;
                poemsContainer.appendChild(card);
            });
        }

        // Render wisdom
        function renderWisdom() {
            wisdomContainer.innerHTML = '';
            window.hikam.forEach(hikma => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3 class="card-title"> 💡 الحكمة </h3>
                    <div class="wisdom">${hikma.text}</div>
                `;
                wisdomContainer.appendChild(card);
            });
        }

        // Render verses
        function renderVerses() {
            versesContainer.innerHTML = '';
            window.nubdhat.forEach(verse => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3 class="card-title"> 🕌 ${verse.title} </h3>
                    <div class="quote">${verse.text}</div>
                    <div class="quote-author">— ${verse.reference}</div>
                `;
                versesContainer.appendChild(card);
            });
        }

        // Initialize the page with quotes
        document.addEventListener('DOMContentLoaded', () => {
            renderQuotes();
        });
    </script>
</body>
</html>

    { text: "أَكْذِبِ السِّعَايَةَ وَالنَّمِيمَةَ بَاطِلَةً كَانَتْ أَوْ صَحِيحَةً."},
    { text: "أَكْذَبُ شَيْءٍ الْأَمَلُ."},
    { text: "أَكْذِبُوا آمَالَكُمْ وَاغْتَنِمُوا آجَالَكُمْ."},
    { text: "أَكْرَمُ الْأَخْلَاقِ السَّخَاءُ وَأَعَمُّهَا نَفْعًا الْعَدْلُ."},
    { text: "أَكْرِمْ تَعِزَّ."},
    { text: "أَكْرَمُ حَسَبٍ حُسْنُ الْأَدَبِ."},
    { text: "أَكْرِمْ ذَوِي رَحِمِكَ."},
    { text: "أَكْرَمُ الشِّيَمِ إِكْرَامُ الْمُصَاحِبِ وَإِسْعَافُ الطَّالِبِ."},
    { text: "أَكْرِمْ ضَيْفَكَ وَإِنْ كَانَ حَقِيرًا."},
    { text: "أَكْرِمْ عَشِيرَتَكَ فَإِنَّهُمْ جَنَاحُكَ."},
    { text: "أَكْرِمْ لَكَ الْفَضْلُ مَنْ وَدَّكَ."},
    { text: "أَكْرِمْ نَفْسَكَ عَنْ كُلِّ دَنِيَّةٍ."},
    { text: "أَكْرِمْ نَفْسَكَ مَا أَعَانَتْكَ عَلَى طَاعَةِ اللَّهِ."},
    { text: "أَكْرِمْ وُدَّكَ وَاحْفَظْ عَهْدَكَ."},
    { text: "أَكْرَهُ الْمَكَارِهِ فِيمَا لَا يُحْتَسَبُ."},
    { text: "أَكْرِهُ نَفْسَكَ عَلَى الْفَضَائِلِ."},
    { text: "اكْظِمِ الْغَيْظَ تَزْدَدْ حِلْمًا."},
    { text: "اكْظِمِ الْغَيْظَ عِنْدَ الْغَضَبِ وَتَجَاوَزْ مَعَ الدَّوْلَةِ تَكُنْ لَكَ الْعَاقِبَةُ."},
    { text: "إِكْمَالُ الْمَعْرُوفِ أَحْسَنُ مِنِ ابْتِدَائِهِ."},
    { text: "أَكْيَسُ الْأَكْيَاسِ مَنْ مَقَتَ دُنْيَاهُ."},
    { text: "أَكْيَسُ الْكَيْسِ التَّقْوَى."},
    { text: "أَكْيَسُ النَّاسِ مَنْ رَفَضَ دُنْيَاهُ."},
    { text: "أَكْيَسُكُمْ أَوْرَعُكُمْ."},
    { text: "أَلْأَمُ الْخُلُقِ الْحِقْدُ."},
    { text: "أَلْأَمُ الْبَغْيِ عِنْدَ الْقُدْرَةِ."},
    { text: "أَلْأَمُ النَّاسِ الْمُغْتَابُ."},
    { text: "أَلَا إِنَّ أَبْصَرَ الْأَبْصَارِ مَنْ نَفَذَ فِي الْخَيْرِ طَرْفُهُ."},
    { text: "أَلَا إِنَّ أَسْمَعَ الْأَسْمَاعِ مَنْ وَعَى التَّذْكِيرَ وَقَبِلَهُ."},
    { text: "أَلَا إِنَّهُ لَيْسَ لِأَنْفُسِكُمْ ثَمَنٌ إِلَّا الْجَنَّةَ فَلَا تَبِيعُوهَا إِلَّا بِهَا."},
    { text: "أَلَا تَائِبٌ مِنْ خَطِيئَتِهِ قَبْلَ حُضُورِ مَنِيَّتِهِ."},
    { text: "أَلَا حُرٌّ يَدَعُ هَذِهِ اللُّمَاظَةَ لِأَهْلِهَا."},
    { text: "أَلَا عَامِلٌ لِنَفْسِهِ قَبْلَ يَوْمِ بُؤْسِهِ."},
    { text: "أَلَا فَاعْمَلُوا عِبَادَ اللَّهِ وَالْخَنَاقُ مُهْمَلٌ."},
    { text: "أَلَا فَاعْمَلُوا وَالْأَلْسُنُ مُطْلَقَةٌ وَالْأَبْدَانُ صَحِيحَةٌ."},
    { text: "أَلَا لَا يَسْتَحِيَنَّ مَنْ لَا يَعْلَمُ أَنْ يَتَعَلَّمَ."},
    { text: "أَلَا لَا يَسْتَقْبِحَنَّ مَنْ سُئِلَ عَمَّا لَا يَعْلَمُ أَنْ يَقُولَ لَا أَعْلَمُ."},
    { text: "أَلَا لَا يَعْدِلَنَّ أَحَدُكُمْ عَنِ الْقَرَابَةِ يُرَى بِهَا الْخَصَاصَةُ."},
    { text: "أَلَا مُتَزَوِّدُ لِآخِرَتِهِ قَبْلَ أُزُوفِ رِحْلَتِهِ."},
    { text: "أَلَا مُسْتَعِدٌّ لِلِقَاءِ رَبِّهِ قَبْلَ زُهُوقِ نَفْسِهِ."},
    { text: "أَلَا مُسْتَيْقِظٌ مِنْ غَفْلَتِهِ قَبْلَ نَفَادِ مُدَّتِهِ."},
    { text: "أَلَا مُنْتَبِهٌ مِنْ رَقْدَتِهِ قَبْلَ حِينِ مَنِيَّتِهِ."},
    { text: "أَلَا وَإِنَّ أَخْوَفَ مَا أَخَافُ عَلَيْكُمْ اتِّبَاعُ الْهَوَى وَطُولُ الْأَمَلِ."},
    { text: "أَلَا وَإِنَّ الدُّنْيَا قَدْ وَلَّتْ حَذَّاءَ."},
    { text: "أَلَا وَإِنَّ التَّقْوَى مَطَايَا ذُلُلٌ حُمِلَ عَلَيْهَا أَهْلُهَا."},
    { text: "أَلَا وَإِنَّ الْجِهَادَ ثَمَنُ الْجَنَّةِ."},
    { text: "أَلَا وَإِنَّ الْخَطَايَا خَيْلٌ شُمُسٌ حُمِلَ عَلَيْهَا أَهْلُهَا."},
    { text: "أَلَا وَإِنَّ الدُّنْيَا دَارٌ لَا يُسْلَمُ مِنْهَا إِلَّا بِالزُّهْدِ فِيهَا."},
    { text: "أَلَا وَإِنَّ الدُّنْيَا قَدْ تَصَرَّمَتْ وَآذَنَتْ بِانْقِضَاءٍ."},
    { text: "أَلَا وَإِنَّ شَرَائِعَ الدِّينِ وَاحِدَةٌ."},
    { text: "أَلَا وَإِنَّ الظُّلْمَ ثَلَاثَةٌ فَظُلْمٌ لَا يُغْفَرُ."},
    { text: "أَلَا وَإِنَّ الْقَنَاعَةَ وَغَلَبَةَ الشَّهْوَةِ مِنْ أَكْبَرِ الْعَفَافِ."},
    { text: "أَلَا وَإِنَّ اللَّبِيبَ مَنِ اسْتَقْبَلَ وُجُوهَ الْآرَاءِ بِفِكْرٍ صَائِبٍ."},
    { text: "أَلَا وَإِنَّ النِّسْيَانَ بَضْعَةٌ مِنَ الْإِنْسَانِ."},
    { text: "أَلَا وَإِنَّ النِّسْيَانَ الصَّادِقَ يَجْعَلُهُ اللَّهُ لِلْمَرْءِ فِي النَّاسِ."},
    { text: "أَلَا وَإِنَّ مِنَ الْبَلَاءِ الْفَاقَةَ."},
    { text: "أَلَا وَإِنَّ مَنْ تَوَرَّطَ فِي الْأُمُورِ مِنْ غَيْرِ نَظَرٍ فِي الْعَوَاقِبِ فَقَدْ تَعَرَّضَ لِمُفْدِحَاتِ النَّوَائِبِ."},
    { text: "أَلَا وَإِنَّ مَنْ لَا يَنْفَعُهُ الْحَقُّ يَضُرُّهُ الْبَاطِلُ."},
    { text: "أَلَا وَإِنَّ مِنَ النِّعَمِ سَعَةَ الْمَالِ."},
    { text: "أَلَا وَإِنَّ الْيَوْمَ الْمِضْمَارَ وَغَدًا السِّبَاقُ."},
    { text: "أَلَا وَإِنَّا أَهْلَ الْبَيْتِ أَبْوَابُ الْحِلْمِ."},
    { text: "أَلَا وَإِنَّكُمْ فِي أَيَّامِ أَمَلٍ مِنْ وَرَائِهِ أَجَلٌ."},
    { text: "أَلَا وَإِنَّهُ قَدْ أَدْبَرَ مِنَ الدُّنْيَا مَا كَانَ مُقْبِلًا."},
    { text: "أَلَا وَإِنِّي لَمْ أَرَ كَالْجَنَّةِ نَامَ طَالِبُهَا."},
    { text: "أَلَا وَقَدْ أُمِرْتُمْ بِالظَّعْنِ وَدُلِلْتُمْ عَلَى الزَّادِ."},
    { text: "أَلَا وَقَدْ أَمَرَنِي اللَّهُ بِقِتَالِ أَهْلِ النَّكْثِ وَالْبَغْيِ."},
    { text: "أَلَا وَمَا يَصْنَعُ بِالدُّنْيَا مَنْ خُلِقَ لِلْآخِرَةِ."},
    { text: "أَلْبِسْ مَا لَا تَشْتَهِرُ بِهِ وَلَا يُزْرِي بِكَ."},
    { text: "الْتَّقْوَى أَزْكَى زِرَاعَةٍ."},
    { text: "الْتَوُوا فِي أَطْرَافِ الرِّمَاحِ فَإِنَّهُ أَمْوَرُ لِلْأَسِنَّةِ."},
    { text: "إِلْجَأُوا إِلَى التَّقْوَى فَإِنَّهُ جُنَّةٌ مَنِيعَةٌ."},
    { text: "الْإِلْحَاحُ دَاعِيَةُ الْحِرْمَانِ."},
    { text: "الْحَسُودُ مَعْمُومٌ."},
    { text: "الْحُظْوَةُ عِنْدَ الْمَخْلُوقِ بِالرَّغْبَةِ عَمَّا فِي يَدَيْهِ."},
    { text: "الْزَمِ الْإِخْلَاصَ فِي السِّرِّ وَالْعَلَانِيَةِ."},
    { text: "الْزَمِ الْحَقَّ يُنْزِلْكَ مَنَازِلَ أَهْلِ الْحَقِّ."},
    { text: "إِلْزَمِ الصَّبْرَ فَإِنَّ الصَّبْرَ حُلُمُ الْعَاقِبَةِ."},
    { text: "إِلْزَمِ السُّكُوتَ وَأَصْبِرْ عَلَى الْقَنَاعَةِ."},
    { text: "إِلْزَمِ الصِّدْقَ وَإِنْ خِفْتَ ضُرَّهُ."},
    { text: "إِلْزَمِ الصِّدْقَ وَالْأَمَانَةَ فَإِنَّهُمَا سَجِيَّةُ الْأَخْيَارِ."},
    { text: "إِلْزَمِ الصَّمْتَ فَأَدْنَى نَفْعِهِ السَّلَامَةُ."},
    { text: "إِلْزَمِ الصَّمْتَ يَسْتَنِرْ فِكْرُكَ."},
    { text: "إِلْزَمِ الصَّمْتَ يَلْزَمْكَ النَّجَاةُ."},
    { text: "أَلْزَمُ الْعِلْمِ بِكَ مَا دَلَّكَ عَلَى صَلَاحِ دِينِكَ."},
    { text: "إِلْزَمُوا الْأَرْضَ وَاصْبِرُوا عَلَى الْبَلَاءِ."},
    { text: "إِلْزَمُوا الْجَمَاعَةَ وَاجْتَنِبُوا الْفُرْقَةَ."},
    { text: "إِلْزَمُوا الْحَقَّ تَلْزَمْكُمُ النَّجَاةُ."},
    { text: "إِلْزَمُوا الصَّبْرَ فَإِنَّهُ دِعَامَةُ الْإِيمَانِ."},
    { text: "الْأَلْسُنُ تُتَرْجِمُ عَمَّا تَجُنُّهُ الضَّمَائِرُ."},
    { text: "الشُّكْرُ زَيْنٌ لِلنَّعْمَاءِ."},
    { text: "الْأَلْفَاظُ قَوَالِبُ الْمَعَانِي."},
    { text: "أَلِقْ دَوَاتَكَ وَأَطِلْ جِلْفَةَ قَلَمِكَ."},
    { text: "اللَّذَّاتُ مُفْسِدَاتٌ."},
    { text: "الْمُخَاطِرُ مُتَهَجِّمٌ عَلَى الْغَرَرِ."},
    { text: "أَلِنْ كَنَفَكَ فَإِنَّ مَنْ يُلِنْ كَنَفَهُ يَسْتَدِمْ مِنْ قَوْمِهِ الْمَحَبَّةَ."},
    { text: "أَلِنْ كَنَفَكَ وَتَوَاضَعْ لِلَّهِ يَرْفَعْكَ."},
    { text: "إِلَيْنَا يَرْجِعُ الْغَالِي وَبِنَا يَلْحَقُ التَّالِي."},
    { text: "أَمَارَاتُ السَّعَادَةِ إِخْلَاصُ الْعَمَلِ."},
    { text: "إِمَامٌ عَادِلٌ خَيْرٌ مِنْ مَطَرٍ وَابِلٍ."},
    { text: "الْإِمَامَةُ نِظَامُ الْأُمَّةِ."},
    { text: "الْأَمَانَةُ إِيمَانٌ."},
    { text: "الْأَمَانَةُ تُؤَدِّي إِلَى الصِّدْقِ."},
    { text: "الْأَمَانَةُ صِيَانَةٌ."},
    { text: "الْأَمَانَةُ فَضِيلَةٌ لِمَنْ أَدَّاهَا."},
    { text: "الْأَمَانَةُ فَوْزٌ لِمَنْ رَعَاهَا."},
    { text: "الْأَمَانَةُ وَالْوَفَاءُ صِدْقُ الْأَفْعَالِ."},
    { text: "الْأَمَانِيُّ أَشْتَاتٌ."},
    { text: "الْأَمَانِيُّ بَضَائِعُ النَّوْكَى."},
    { text: "الْأَمَانِيُّ تَخْدَعُكَ."},
    { text: "الْأَمَانِيُّ تَخْدَعُ."},
    { text: "الْأَمَانِيُّ تُعْمِي عُيُونَ الْبَصَائِرِ."},
    { text: "الْأَمَانِيُّ شِيمَةُ الْحَمْقَى."},
    { text: "الْأَمَانِيُّ هِمَّةُ الرِّجَالِ."},
    { text: "إِمْتَاحُوا مِنْ صَفْوِ عَيْنٍ قَدْ رُوِّقَتْ مِنَ الْكَدَرِ."},
    { text: "امْحُ الشَّرَّ عَنْ قَلْبِكَ تَتَزَلَّ نَفْسُكَ وَيُتَقَبَّلْ عَمَلُكَ."},
    { text: "امْحَضْ أَخَاكَ النَّصِيحَةَ حَسَنَةً كَانَتْ أَوْ قَبِيحَةً."},
    { text: "امْخَضُوا الرَّأْيَ مَحْضَ السِّقَاءِ يُنْتِجُ سَدِيدَ الْآرَاءِ."},
    { text: "الْأَمْرُ بِالْمَعْرُوفِ أَفْضَلُ أَعْمَالِ الْخَلْقِ."},
    { text: "الْأَمْرُ قَرِيبٌ."},
    { text: "أَمْسِكْ عَنْ طَرِيقٍ إِذَا خِفْتَ ضَلَالَتَهُ."},
    { text: "أَمْسِكْ مِنَ الْمَالِ بِقَدْرِ ضَرُورَتِكَ وَقَدِّمِ الْفَضْلَ لِيَوْمِ فَاقَتِكَ."},
    { text: "امْشِ بِدَائِكَ مَا مَشَى بِكَ."},
    { text: "امْضُوا لِمَا تُؤْمَرُونَ بِهِ وَقِفُوا عِنْدَمَا تُنْهَوْنَ عَنْهُ."},
    { text: "أَمْقَتُ الْعِبَادِ إِلَى اللَّهِ سُبْحَانَهُ مَنْ كَانَ هِمَّتُهُ بَطْنَهُ وَفَرْجَهُ."},
    { text: "أَمْقَتُ النَّاسِ الْعَيَّابُ."},
    { text: "الْأَمَلُ أَبَدًا فِي تَكْذِيبٍ وَطُولُ الْحَيَاةِ لِلْمَرْءِ تَعْذِيبٌ."},
    { text: "الْأَمَلُ حِجَابُ الْأَجَلِ."},
    { text: "الْأَمَلُ خَادِعٌ غَارٌّ ضَارٌّ."},
    { text: "الْأَمَلُ خَوَّانٌ."},
    { text: "الْأَمَلُ رَفِيقٌ مُؤْنِسٌ."},
    { text: "الْأَمَلُ سُلْطَانُ الشَّيَاطِينِ عَلَى قُلُوبِ الْغَافِلِينَ."},
    { text: "الْأَمَلُ كَالسَّرَابِ يَغُرُّ مَنْ رَآهُ وَيُخْلِفُ مَنْ رَجَاهُ."},
    { text: "الْأَمَلُ لَا غَايَةَ لَهُ."},
    { text: "الْأَمَلُ يَخْدَعُ."},
    { text: "الْأَمَلُ يَغُرُّ."},
    { text: "الْأَمَلُ يُفْسِدُ الْعَمَلَ وَيُفْنِي الْأَجَلَ."},
    { text: "الْأَمَلُ يُقَرِّبُ الْمَنِيَّةَ وَيُبَاعِدُ الْأُمْنِيَّةَ."},
    { text: "الْأَمَلُ يُنْسِي الْأَجَلَ."},
    { text: "امْلِكْ حَمِيَّةَ نَفْسِكَ وَسَوْرَةَ غَضَبِكَ."},
    { text: "أَمْلَكُ شَيْءٍ الْوَرَعُ."},
    { text: "امْلِكْ عَلَيْكَ هَوَاكَ وَشُحَّ بِنَفْسِكَ عَمَّا لَا يَحِلُّ لَكَ."},
    { text: "امْلِكْ هَوَاكَ وَشُحَّ بِنَفْسِكَ عَمَّا لَا يَحِلُّ لَكَ."},
    { text: "امْلِكُوا أَنْفُسَكُمْ بِدَوَامِ جِهَادِهَا."},
    { text: "الْأَمْنُ اغْتِرَارٌ."},
    { text: "أَمْنَعُ حُصُونِ الدِّينِ التَّقْوَى."},
    { text: "امْنَعْ نَفْسَكَ مِنَ الشَّهَوَاتِ تَسْلَمْ مِنَ الْآفَاتِ."},
    { text: "الْأُمُورُ أَشْبَاهٌ."},
    { text: "الْأُمُورُ بِالتَّجْرِبَةِ."},
    { text: "الْأُمُورُ بِالتَّقْدِيرِ لَا بِالتَّدْبِيرِ."},
    { text: "الْأُمُورُ الْمُنْتَظِمَةُ يُفْسِدُهَا الْخِلَافُ."},
    { text: "الْأَمِيرُ السُّوءُ يَصْطَنِعُ الْبَدِيءَ."},
    { text: "إِنْ آمَنْتَ بِاللَّهِ أَمِنَ مُنْقَلَبُكَ."},
    { text: "إِنَّ أَبْصَارَ هَذِهِ الْفُحُولِ طَوَامِحُ."},
    { text: "إِنْ أَتَاكُمُ اللَّهُ بِنِعْمَةٍ فَاشْكُرُوا."},
    { text: "إِنْ أَحْبَبْتَ أَنْ تَكُونَ أَسْعَدَ النَّاسِ بِمَا عَلِمْتَ فَاعْمَلْ."},
    { text: "إِنْ أَحْبَبْتَ سَلَامَةَ نَفْسِكَ وَسَتْرَ مَعَايِبِكَ فَأَقْلِلْ كَلَامَكَ."},
    { text: "إِنَّ إِحْسَانَكَ إِلَى مَنْ كَادَكَ مِنَ الْأَضْدَادِ لَأَغْيَظُ عَلَيْهِمْ."},
    { text: "إِنَّ أَحْسَنَ الزَّيِّ مَا خَلَطَكَ بِالنَّاسِ."},
    { text: "إِنَّ أَحْسَنَ النَّاسِ عَيْشًا مَنْ حَسُنَ عَيْشُ النَّاسِ فِي عَيْشِهِ."},
    { text: "إِنَّ أَحْمَدَ الْأُمُورِ عَاقِبَةً الصَّبْرُ."},
    { text: "إِنَّ أَخَاكَ حَقًّا مَنْ غَفَرَ زَلَّتَكَ وَسَدَّ خَلَّتَكَ."},
    { text: "إِنَّ أَخْسَرَ النَّاسِ صَفْقَةً رَجُلٌ أَخْلَقَ بَدَنَهُ فِي طَلَبِ آمَالِهِ."},
    { text: "إِنَّ أَدْنَى الرِّيَاءِ شِرْكٌ."},
    { text: "إِنْ أَرَدْتَ قَطِيعَةَ أَخِيكَ فَاسْتَبْقِ لَهُ مِنْ نَفْسِكَ بَقِيَّةً."},
    { text: "إِنَّ أَزْيَنَ الْأَخْلَاقِ الْوَرَعُ وَالْعَفَافُ."},
    { text: "إِنَّ أَسْرَعَ الْخَيْرِ ثَوَابًا الْبِرُّ."},
    { text: "إِنَّ أَسْرَعَ الشَّرِّ عِقَابًا الظُّلْمُ."},
    { text: "إِنَّ أَسْعَدَ النَّاسِ مَنْ كَانَ لَهُ مِنْ نَفْسِهِ بِطَاعَةِ اللَّهِ مُتَقَاضِيًا."},
    { text: "إِنْ أَسْلَمْتَ نَفْسَكَ لِلَّهِ سَلِمَتْ نَفْسُكَ."},
    { text: "إِنَّ أَسْوَأَ الْمَعَاصِي مَغَيَّةُ الْغَيِّ."},
    { text: "إِنْ أَطَعْتَ الطَّمَعَ أَرْدَاكَ."},
    { text: "إِنَّ أَعْجَلَ الْعُقُوبَةِ عُقُوبَةُ الْبَغْيِ."},
    { text: "إِنَّ إِعْطَاءَ هَذَا الْمَالِ قِنْيَةٌ وَإِنَّ إِمْسَاكَهُ فِتْنَةٌ."},
    { text: "إِنَّ أَعْظَمَ الْمَثُوبَةِ مَثُوبَةُ الْإِنْصَافِ."},
    { text: "إِنَّ أَعْظَمَ النَّاسِ حَسْرَةً يَوْمَ الْقِيَامَةِ رَجُلٌ اكْتَسَبَ مَالًا مِنْ غَيْرِ طَاعَةِ اللَّهِ."},
    { text: "إِنَّ أَغَشَّ النَّاسِ أَغَشُّهُمْ لِنَفْسِهِ وَأَعْصَاهُمْ لِرَبِّهِ."},
    { text: "إِنَّ أَفْضَلَ أَخْلَاقِ الرِّجَالِ الْحِلْمُ."},
    { text: "إِنَّ أَفْضَلَ الْأَعْمَالِ مَا اسْتُرِقَّ بِهِ حُرٌّ."},
    { text: "إِنَّ أَفْضَلَ الْإِيمَانِ إِنْصَافُ الْمَرْءِ مِنْ نَفْسِهِ."},
    { text: "إِنَّ أَفْضَلَ الْجِهَادِ مُجَاهَدَةُ الرَّجُلِ نَفْسَهُ."},
    { text: "إِنَّ أَفْضَلَ الْخَيْرِ صَدَقَةُ السِّرِّ."},
    { text: "إِنَّ أَفْضَلَ الدِّينِ الْحُبُّ فِي اللَّهِ وَالْبُغْضُ فِي اللَّهِ."},
    { text: "إِنَّ أَفْضَلَ الْعِلْمِ السَّكِينَةُ وَالْحِلْمُ."},
    { text: "إِنَّ أَفْضَلَ النَّاسِ عِنْدَ اللَّهِ مَنْ أَحْيَا عَقْلَهُ."},
    { text: "إِنَّ أَفْضَلَ النَّاسِ مَنْ حَلُمَ عَنْ قُدْرَةٍ."},
    { text: "إِنَّ أَفْضَلَ مَا اسْتُجْلِبَ بِهِ الثَّنَاءُ السَّخَاءُ."},
    { text: "إِنَّ أَكْرَمَ الْمَوْتِ الْقَتْلُ."},
    { text: "إِنَّ أَكْرَمَ النَّاسِ مَنِ اقْتَنَى الْيَأْسَ وَلَزِمَ الْقُنُوعَ."},
    { text: "إِنَّ الْأَكْيَاسَ هُمُ الَّذِينَ لِلدُّنْيَا مَقَتُوا."},
    { text: "إِنَّ أَمَامَكَ طَرِيقًا ذَا مَسَافَةٍ بَعِيدَةٍ."},
    { text: "إِنَّ أَمَامَكَ عَقَبَةً كَؤُودًا الْمُخَفِّفُ فِيهَا أَحْسَنُ حَالًا."},
    { text: "إِنَّ الْأَمْرَ بِالْمَعْرُوفِ لَا يُقَرِّبَانِ مِنْ أَجَلٍ."},
    { text: "إِنَّ أَمْرًا لَا تَعْلَمُ مَتَى يَفْجَأُكَ يَنْبَغِي أَنْ تَسْتَعِدَّ لَهُ."},
    { text: "إِنَّ أَمْرَنَا صَعْبٌ مُسْتَصْعَبٌ خَشِنٌ."},
    { text: "إِنَّ أَمْرَنَا صَعْبٌ مُسْتَصْعَبٌ لَا يَحْتَمِلُهُ إِلَّا عَبْدٌ."},
    { text: "إِنَّ الْأُمُورَ إِذَا تَشَابَهَتِ اعْتُبِرَ آخِرُهَا بِأَوَّلِهَا."},
    { text: "إِنَّ أَنْصَحَ النَّاسِ أَنْصَحُهُمْ لِنَفْسِهِ."},
    { text: "إِنَّ أَنْفَاسَكَ أَجْزَاءُ عُمْرِكَ."},
    { text: "إِنَّ إِنْفَاقَ هَذَا الْمَالِ فِي طَاعَةِ اللَّهِ أَعْظَمُ نِعْمَةٍ."},
    { text: "إِنَّ أَهْلَ الْجَنَّةِ كُلُّ مُؤْمِنٍ هَيِّنٍ لَيِّنٍ."},
    { text: "إِنَّ أَهْلَ الْجَنَّةِ لَيَتَرَاؤُونَ مَنَازِلَ شِيعَتِنَا."},
    { text: "إِنَّ أَهْلَ النَّارِ كُلُّ كَفُورٍ مَكُورٍ."},
    { text: "إِنَّ أَهْنَأَ النَّاسِ عَيْشًا مَنْ كَانَ بِمَا قَسَمَ اللَّهُ لَهُ رَاضِيًا."},
    { text: "إِنَّ أَوْقَاتَكَ أَجْزَاءُ عُمْرِكَ فَلَا تُنْفِدْ لَكَ وَقْتًا إِلَّا فِيمَا يُنْجِيكَ."},
    { text: "إِنَّ أَوَّلَ مَا تُغْلَبُونَ عَلَيْهِ مِنَ الْجِهَادِ جِهَادُ أَيْدِيكُمْ."},
    { text: "إِنَّ أَوْلَى النَّاسِ بِالْأَنْبِيَاءِ أَعْمَلُهُمْ بِمَا جَاءُوا بِهِ."},
    { text: "إِنَّ أَوْلِيَاءَ اللَّهِ تَعَالَى لَأَكْثَرُ النَّاسِ لَهُ ذِكْرًا."},
    { text: "إِنِ ابْتَلَاكُمُ اللَّهُ بِمُصِيبَةٍ فَاصْبِرُوا."},
    { text: "إِنِ اتَّقَيْتَ اللَّهَ وَقَاكَ."},
    { text: "إِنِ اسْتَطَعْتَ أَنْ لَا يَكُونَ بَيْنَكَ وَبَيْنَ اللَّهِ ذُو نِعْمَةٍ فَافْعَلْ."},
    { text: "إِنِ اسْتَنَمْتَ إِلَى وَدُودِكَ فَاحْذَرْ لَهُ مِنْ أَمْرِكَ."},
    { text: "إِنَّ الْأَنْقِيَاءَ كُلُّ سَخِيٍّ مُتَعَفِّفٍ مُحْسِنٍ."},
    { text: "إِنَّ الْبَهَائِمَ هَمُّهَا بُطُونُهَا."},
    { text: "إِنَّ التَّقْوَى حَقُّ اللَّهِ سُبْحَانَهُ عَلَيْكُمْ."},
    { text: "إِنَّ التَّقْوَى دَارُ حِصْنٍ عَزِيزٍ."},
    { text: "إِنَّ التَّقْوَى عِصْمَةٌ لَكَ فِي حَيَاتِكَ."},
    { text: "إِنَّ التَّقْوَى فِي الْيَوْمِ الْحِرْزُ وَالْجُنَّةُ."},
    { text: "إِنَّ التَّقْوَى مُنْتَهَى رِضَا اللَّهِ مِنْ عِبَادِهِ."},
    { text: "إِنَّ التَّوَكُّلَ لَمِنْ صِدْقِ الْإِيقَانِ."},
    { text: "إِنَّ الْجَاهِلَ مَنْ جَهْلُهُ فِي إِغْوَاءِ هَوَاهُ."},
    { text: "إِنَّ الدُّنْيَا تُقْبِلُ إِقْبَالَ الطَّالِبِ."},
    { text: "إِنَّ الدُّنْيَا حُلْوَةٌ نَضِرَةٌ."},
    { text: "إِنَّ الدُّنْيَا خَيْرُهَا زَهِيدٌ وَشَرُّهَا عَتِيدٌ."},
    { text: "إِنَّ الدُّنْيَا دَارٌ أَوَّلُهَا عَنَاءٌ وَآخِرُهَا فَنَاءٌ."},
    { text: "إِنَّ الدُّنْيَا دَارٌ بِالْبَلَاءِ مَعْرُوفَةٌ."},
    { text: "إِنَّ الدُّنْيَا دَارُ خَبَالٍ وَوَبَالٍ."},
    { text: "إِنَّ الدُّنْيَا دَارُ صِدْقٍ لِمَنْ صَدَّقَهَا."},
    { text: "إِنَّ الدُّنْيَا دَارُ عَنَاءٍ وَفَنَاءٍ."},
    { text: "إِنَّ الدُّنْيَا دَارُ فَجَائِعَ."},
    { text: "إِنَّ الدُّنْيَا دَارُ مِحَنٍ."},
    { text: "إِنَّ الدُّنْيَا دَارُ مُنِيَ لَهَا الْفَنَاءُ."},
    { text: "إِنَّ الدُّنْيَا رُبَّمَا أَقْبَلَتْ عَلَى الْجَاهِلِ بِالِاتِّفَاقِ."},
    { text: "إِنَّ الدُّنْيَا سَرِيعَةُ التَّحَوُّلِ."},
    { text: "إِنَّ الدُّنْيَا ظِلُّ الْغَمَامِ وَحُلْمُ الْمَنَامِ."},
    { text: "إِنَّ الدُّنْيَا عَيْشُهَا قَصِيرٌ."},
    { text: "إِنَّ الدُّنْيَا غَرَّارَةٌ خَدُوعٌ."},
    { text: "إِنَّ الدُّنْيَا غُرُورٌ حَائِلٌ."},
    { text: "إِنَّ الدُّنْيَا قَدْ أَدْبَرَتْ وَآذَنَتْ بِوَدَاعٍ."},
    { text: "إِنَّ الدُّنْيَا كَالْحَيَّةِ لَيِّنٌ مَسُّهَا قَاتِلٌ سَمُّهَا."},
    { text: "إِنَّ الدُّنْيَا كَالشَّبَكَةِ تَلْتَفُّ عَلَى مَنْ رَغِبَ فِيهَا."},
    { text: "إِنَّ الدُّنْيَا كَالْغُولِ تُغْوِي مَنْ أَطَاعَهَا."},
    { text: "إِنَّ الدُّنْيَا لَا تَفِي لِصَاحِبٍ وَلَا تَصْفُو لِشَارِبٍ."},
    { text: "إِنَّ الدُّنْيَا لَا يُسْلَمُ مِنْهَا إِلَّا بِالزُّهْدِ."},
    { text: "إِنَّ الدُّنْيَا لَمْ تُخْلَقْ لَكُمْ دَارَ مَقَامٍ."},
    { text: "إِنَّ الدُّنْيَا لَمُشْغِلَةٌ عَنِ الْآخِرَةِ."},
    { text: "إِنَّ الدُّنْيَا لَمُفْسِدَةُ الدِّينِ."},
    { text: "إِنَّ الدُّنْيَا لَهِيَ الْكَنُودُ الْعَنُودُ."},
    { text: "إِنَّ الدُّنْيَا مَاضِيَةٌ بِكُمْ عَلَى سُنَنٍ."},
    { text: "إِنَّ الدُّنْيَا مَعْكُوسَةٌ مَنْكُوسَةٌ."},
    { text: "إِنَّ الدُّنْيَا مُنْتَهَى بَصَرِ الْأَعْمَى."},
    { text: "إِنَّ الدُّنْيَا مَنْزِلُ قُلْعَةٍ وَلَيْسَتْ بِدَارِ نُجْعَةٍ."},
    { text: "إِنَّ الدُّنْيَا وَالْآخِرَةَ عَدُوَّانِ مُتَفَاوِتَانِ."},
    { text: "إِنَّ الدُّنْيَا يُونِقُ مَنْظَرُهَا وَيُوبِقُ مَخْبَرُهَا."},
    { text: "إِنَّ الدَّهْرَ لَخَصْمٌ غَيْرُ مَخْصُومٍ."},
    { text: "إِنَّ الدَّهْرَ مُوتِرٌ قَوْسَهُ لَا تُخْطِي سِهَامُهُ."},
    { text: "إِنَّ الدَّهْرَ يَجْرِي بِالْبَاقِينَ كَجَرْيِهِ بِالْمَاضِينَ."},
    { text: "إِنَّ الدِّينَ لَشَجَرَةٌ أَصْلُهَا الْإِيمَانُ بِاللَّهِ."},
    { text: "إِنَّ الَّذِي فِي يَدَيْكَ قَدْ كَانَ لَهُ أَهْلٌ قَبْلَكَ."},
    { text: "إِنَّ الرَّحِمَ إِذَا تَمَاسَّتْ تَعَاطَفَتْ."},
    { text: "إِنَّ الزَّاهِدِينَ فِي الدُّنْيَا لَتَبْكِي قُلُوبُهُمْ."},
    { text: "إِنَّ الزُّهْدَ فِي الْجَهْلِ بِقَدْرِ الرَّغْبَةِ فِي الْعَقْلِ."},
    { text: "إِنَّ الزُّهْدَ فِي وِلَايَةِ الظَّالِمِ بِقَدْرِ الرَّغْبَةِ فِي وِلَايَةِ الْعَادِلِ."},
    { text: "إِنَّ السِّبَاعَ هَمُّهَا الْعُدْوَانُ عَلَى غَيْرِهَا."},
    { text: "إِنَّ السُّعَدَاءَ بِالدُّنْيَا غَدًا هُمُ الْهَارِبُونَ مِنْهَا الْيَوْمَ."},
    { text: "إِنَّ السُّلْطَانَ لَأَمِينُ اللَّهِ فِي الْأَرْضِ."},
    { text: "إِنَّ الْعَالِمَ يَهْدِي وَيُرْشِدُ وَيُنْجِي."},
    { text: "إِنَّ الْعُهُودَ قَلَائِدُ فِي الْأَعْنَاقِ إِلَى يَوْمِ الْقِيَامَةِ."},
    { text: "إِنَّ الْغَايَةَ أَمَامَكُمْ وَإِنَّ السَّاعَةَ وَرَاءَكُمْ تَحْدُوكُمْ."},
    { text: "إِنَّ الْغَايَةَ الْقِيَامَةُ."},
    { text: "إِنَّ الْفُجَّارَ كُلُّ ظَلُومٍ خَتُورٍ."},
    { text: "إِنَّ الْفُحْشَ وَالتَّفَحُّشَ لَيْسَا مِنْ خَلَائِقِ الْإِسْلَامِ."},
    { text: "إِنَّ الْفُرَصَ تَمُرُّ مَرَّ السَّحَابِ."},
    { text: "إِنَّ الْفَقْرَ مَذَلَّةٌ لِلنَّفْسِ مُدْهِشَةٌ لِلْعَقْلِ."},
    { text: "إِنَّ الْقُبْحَ فِي الظُّلْمِ بِقَدْرِ الْحُسْنِ فِي الْعَدْلِ."},
    { text: "إِنَّ الْقُرْآنَ ظَاهِرُهُ أَنِيقٌ وَبَاطِنُهُ عَمِيقٌ."},
    { text: "إِنَّ الْكَفَّ عِنْدَ حَيْرَةِ الضَّلَالِ خَيْرٌ مِنْ رُكُوبِ الْأَهْوَالِ."},
    { text: "إِنَّ الْكَيْسَ مَنْ كَانَ لِشَهْوَتِهِ مَانِعًا."},
    { text: "إِنَّ اللَّهَ تَعَالَى أَوْصَاكُمْ بِالتَّقْوَى."},
    { text: "إِنَّ اللَّهَ تَعَالَى أَطْلَعَ عَلَى الْأَرْضِ فَاخْتَارَنَا."},
    { text: "إِنَّ اللَّهَ تَعَالَى جَعَلَ الدُّنْيَا لِمَا بَعْدَهَا."},
    { text: "إِنَّ اللَّهَ تَعَالَى لَا يُعْطِي الدِّينَ إِلَّا لِخَاصَّتِهِ."},
    { text: "إِنَّ اللَّهَ تَعَالَى لَمْ يَجْعَلْ لِلْعَبْدِ أَكْثَرَ مِمَّا سُمِّيَ لَهُ فِي الذِّكْرِ الْحَكِيمِ."},
    { text: "إِنَّ اللَّهَ تَعَالَى يُحِبُّ السَّهْلَ النَّفْسِ السَّمْحَ الْخَلِيقَةِ."},
    { text: "إِنَّ اللَّهَ تَعَالَى يُدْخِلُ بِحُسْنِ النِّيَّةِ الْجَنَّةَ."},
    { text: "إِنَّ اللَّهَ تَعَالَى أَبَى أَنْ يَجْعَلَ أَرْزَاقَ عِبَادِهِ إِلَّا مِنْ حَيْثُ لَا يَحْتَسِبُونَ."},
    { text: "إِنَّ اللَّهَ تَعَالَى إِذَا أَرَادَ بِعَبْدٍ خَيْرًا وَفَّقَهُ لِإِنْفَادِ أَجَلِهِ."},
    { text: "إِنَّ اللَّهَ تَعَالَى أَمَرَ بِالْعَدْلِ وَالْإِحْسَانِ."},
    { text: "إِنَّ اللَّهَ تَعَالَى أَمَرَ عِبَادَهُ تَخْيِيرًا وَنَهَاهُمْ تَحْذِيرًا."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ جَعَلَ الذِّكْرَ جَلَاءَ الْقُلُوبِ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ جَعَلَ الطَّاعَةَ غَنِيمَةَ الْأَكْيَاسِ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ عِنْدَ إِضْمَارِ كُلِّ مُضْمِرٍ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ فَرَضَ عَلَيْكُمْ فَرَائِضَ فَلَا تُضَيِّعُوهَا."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ فَرَضَ فِي أَمْوَالِ الْأَغْنِيَاءِ أَقْوَاتَ الْفُقَرَاءِ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ قَدْ أَنَارَ سَبِيلَ الْحَقِّ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ قَدْ وَضَعَ الْعِقَابَ عَلَى مَعَاصِيهِ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ لَيُبْغِضُ الطَّوِيلَ الْأَمَلِ السَّيِّئَ الْعَمَلِ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ لَيُبْغِضُ الْوَقِحَ الْمُتَجَرِّئَ عَلَى الْمَعَاصِي."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ يُجْرِي الْأُمُورَ عَلَى مَا يَقْتَضِيهِ لَا عَلَى مَا تَرْتَضِيهِ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ يُحِبُّ أَنْ تَكُونَ نِيَّةُ الْإِنْسَانِ لِلنَّاسِ جَمِيلَةً."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ يُحِبُّ الْعَقْلَ الْقَوِيمَ وَالْعَمَلَ الْمُسْتَقِيمَ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ يُحِبُّ الْمُتَعَفِّفَ الْحَيَّ التَّقِيَّ الرَّاضِيَ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ يُحِبُّ كُلَّ سَمْحِ الْيَدَيْنِ حَرِيزِ الدِّينِ."},
    { text: "إِنَّ اللَّهَ سُبْحَانَهُ يُعْطِي الدُّنْيَا مَنْ يُحِبُّ وَمَنْ لَا يُحِبُّ."},
    { text: "إِنَّ الْمُتَّقِينَ ذَهَبُوا بِعَاجِلِ الدُّنْيَا وَالْآخِرَةِ."},
    { text: "إِنَّ الْمُجَاهِدَ نَفْسَهُ عَلَى طَاعَةِ اللَّهِ كَالشَّهِيدِ."},
    { text: "إِنَّ الْمَرْءَ إِذَا هَلَكَ قَالَ النَّاسُ مَا تَرَكَ."},
    { text: "إِنَّ الْمَرْءَ عَلَى مَا قَدَّمَ قَادِمٌ وَعَلَى مَا خَلَّفَ نَادِمٌ."},
    { text: "إِنَّ الْمَرْءَ قَدْ يَسُرُّهُ دَرْكُ مَا لَمْ يَكُنْ لِيَفُوتَهُ."},
    { text: "إِنَّ الْمَرْءَ يُشْرِفُ عَلَى أَمَلِهِ فَيَقْطَعُهُ حُضُورُ أَجَلِهِ."},
    { text: "إِنَّ الْمِسْكِينَ لَرَسُولُ اللَّهِ."},
    { text: "إِنَّ الْمُسْلِمِينَ مُسْتَكِينُونَ."},
    { text: "إِنَّ الْمَغْبُونَ مَنْ غُبِنَ عُمْرَهُ."},
    { text: "إِنَّ الْمَوْتَ لَزَائِرٌ غَيْرُ مَحْبُوبٍ."},
    { text: "إِنَّ الْمَوْتَ لَمَعْقُودٌ بِنَوَاصِيكُمْ."},
    { text: "إِنَّ الْمَوْتَ لَهَادِمُ لَذَّاتِكُمْ."},
    { text: "إِنَّ النِّسَاءَ هَمُّهُنَّ زِينَةُ الْحَيَاةِ الدُّنْيَا وَالْفَسَادُ فِيهَا."},
    { text: "إِنَّ النَّفْسَ أَبْعَدُ شَيْءٍ مَنْزَعًا."},
    { text: "إِنَّ النَّفْسَ الَّتِي تَجْهَدُ فِي اقْتِنَاءِ الرَّغَائِبِ الْبَاقِيَةِ لَتُدْرِكُ طَلَبَهَا."},
    { text: "إِنَّ النَّفْسَ الَّتِي تَطْلُبُ الرَّغَائِبَ الْفَانِيَةَ لَتَهْلِكُ فِي طَلَبِهَا."},
    { text: "إِنَّ النَّفْسَ حُمْضَةٌ وَالْأُذُنَ مَجَاجَةٌ."},
    { text: "إِنَّ النَّفْسَ لَأَمَّارَةٌ بِالسُّوءِ وَالْفَحْشَاءِ."},
    { text: "إِنَّ النَّفْسَ لَجَوْهَرَةٌ ثَمِينَةٌ مَنْ صَانَهَا رَفَعَهَا."},
    { text: "إِنَّ النُّفُوسَ إِذَا تَنَاسَبَتِ اخْتَلَفَتْ."},
    { text: "إِنَّ الْوَعْظَ الَّذِي لَا يَمُجُّهُ سَمْعٌ وَلَا يَعْدِلُهُ نَفْعٌ مَا سَكَتَ عَنْهُ لِسَانُ الْقَوْلِ."},
    { text: "إِنَّ الْوَفَاءَ تَوْأَمُ الصِّدْقِ."},
    { text: "إِنَّ الْيَسِيرَ مِنَ اللَّهِ سُبْحَانَهُ لَأَكْرَمُ مِنَ الْكَثِيرِ مِنْ خَلْقِهِ."},
    { text: "إِنَّ الْيَوْمَ عَمَلٌ وَلَا حِسَابَ وَغَدًا حِسَابٌ وَلَا عَمَلَ."},
    { text: "إِنَّ بِأَهْلِ الْمَعْرُوفِ مِنَ الْحَاجَةِ إِلَى اصْطِنَاعِهِ أَكْثَرُ مِمَّا بِأَهْلِ الرَّغْبَةِ إِلَيْهِمْ."},
    { text: "إِنَّ بَذْلَ التَّحِيَّةِ مِنْ مَحَاسِنِ الْأَخْلَاقِ."},
    { text: "إِنَّ بِذَوِي الْعُقُولِ مِنَ الْحَاجَةِ إِلَى الْأَدَبِ كَمَا يَظْمَأُ الزَّرْعُ إِلَى الْمَطَرِ."},
    { text: "إِنَّ بِشْرَ الْمُؤْمِنِ فِي وَجْهِهِ وَقُوَّتَهُ فِي دِينِهِ وَحُزْنَهُ فِي قَلْبِهِ."},
    { text: "إِنَّ بَطْنَ الْأَرْضِ مَيِّتٌ وَظَهْرَهُ سَقِيمٌ."},
    { text: "إِنْ تَبْذُلُوا أَمْوَالَكُمْ فِي جَنْبِ اللَّهِ فَإِنَّ اللَّهَ مُسْرِعُ الْخَلَفِ."},
    { text: "إِنْ تَخْلُصْ تَفُزْ."},
    { text: "إِنَّ تَخْلِيصَ النِّيَّةِ مِنَ الْفَسَادِ أَشَدُّ عَلَى الْعَامِلِينَ مِنْ طُولِ الِاجْتِهَادِ."},
    { text: "إِنَّ تَقْوَى اللَّهِ سُبْحَانَهُ هِيَ الزَّادُ وَالْمَعَادُ."},
    { text: "إِنَّ تَقْوَى اللَّهِ عِمَارَةُ الدِّينِ وَعِمَادُ الْيَقِينِ."},
    { text: "إِنَّ تَقْوَى اللَّهِ لَمْ تَزَلْ عَارِضَةً نَفْسَهَا عَلَى الْأُمَمِ الْمَاضِينَ."},
    { text: "إِنَّ تَقْوَى اللَّهِ مِفْتَاحُ سَدَادٍ وَذَخِيرَةُ مَعَادٍ."},
    { text: "إِنْ تَنَزَّهُوا عَنِ الْمَعَاصِي يُحْبِبْكُمُ اللَّهُ."},
    { text: "إِنْ تَوَكَّرْتَ أُكْرِمْتَ."},
    { text: "إِنَّ جِدَّ الدُّنْيَا هَزْلٌ وَعِزَّهَا ذُلٌّ وَعُلُوهَا سِفْلٌ."},
    { text: "إِنْ جَعَلْتَ دُنْيَاكَ تَبَعًا لِدِينِكَ أَحْرَزْتَ دِينَكَ وَدُنْيَاكَ."},
    { text: "إِنْ جَعَلْتَ دِينَكَ تَبَعًا لِدُنْيَاكَ أَهْلَكْتَ دِينَكَ وَدُنْيَاكَ."},
    { text: "إِنَّ حُسْنَ الْعَهْدِ مِنَ الْإِيمَانِ."},
    { text: "إِنَّ حِلْمَ اللَّهِ تَعَالَى عَلَى الْمَعَاصِي جَرَّأَكَ."},
    { text: "إِنَّ حَوَائِجَ النَّاسِ إِلَيْكُمْ نِعْمَةٌ مِنَ اللَّهِ عَلَيْكُمْ."},
    { text: "إِنَّ خَيْرَ الْمَالِ مَا أَكْسَبَ ثَنَاءً وَشُكْرًا وَأَوْجَبَ ثَوَابًا وَأَجْرًا."},
    { text: "إِنَّ خَيْرَ الْمَالِ مَا أَوْرَثَكَ ذُخْرًا وَذِكْرًا."},
    { text: "إِنَّ دَعْوَةَ الْمَظْلُومِ مُجَابَةٌ عِنْدَ اللَّهِ سُبْحَانَهُ."},
    { text: "إِنَّ دُنْيَاكُمْ هَذِهِ لَأَهْوَنُ فِي عَيْنِي مِنْ عِرَاقِ خِنْزِيرٍ فِي يَدِ مَجْذُومٍ."},
    { text: "إِنَّ ذِكْرَ الْغِيبَةِ شَرُّ الْإِفْكِ."},
    { text: "إِنَّ ذَهَابَ النَّاهِبِينَ لَعِبْرَةٌ لِلْقَوْمِ."},
    { text: "إِنَّ رَأْيَكَ لَا يَتَّسِعُ لِكُلِّ شَيْءٍ فَفَرِّغْهُ لِلْمُهِمِّ."},
    { text: "إِنْ رَأَيْتَ مِنْ نِسَائِكَ رِيبَةً فَاجْعَلْ لَهُنَّ النَّكِيرَ عَلَى الْكَبِيرِ وَالصَّغِيرِ."},
    { text: "إِنْ رَغِبْتُمْ فِي الْفَوْزِ وَكَرَامَةِ الْآخِرَةِ فَخُذُوا مِنَ الْفَنَاءِ لِلْبَقَاءِ."},
    { text: "إِنَّ رُوَاةَ الْعِلْمِ كَثِيرٌ وَرُعَاتَهُ قَلِيلٌ."},
    { text: "إِنَّ الزَّهَادَةَ قَصْرُ الْأَمَلِ وَالشُّكْرُ عَلَى النِّعَمِ وَالْوَرَعُ عَنِ الْمَحَارِمِ."},
    { text: "إِنَّ سَخَاءَ النَّفْسِ عَمَّا فِي أَيْدِي النَّاسِ لَأَفْضَلُ مِنْ سَخَاءِ الْبَذْلِ."},
    { text: "إِنْ سَقِمَ فَهُوَ نَادِمٌ عَلَى تَرْكِ الْعَمَلِ."},
    { text: "إِنَّ طِبَاعَكَ تَدْعُوكَ إِلَى مَا أَلِفْتَهُ."},
    { text: "إِنَّ عَدُوَّ مُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَآلِهِ مَنْ عَصَى اللَّهَ."},
    { text: "إِنَّ عَظِيمَ الْأَجْرِ مُقَارِنٌ عَظِيمَ الْبَلَاءِ."},
    { text: "إِنْ عَقَدْتَ أَيْمَانَكَ فَارْضَ بِالْمَقْضِيِّ عَلَيْكَ وَلَكَ."},
    { text: "إِنْ عَقَلْتَ أَمْرَكَ وَأَصَبْتَ مَعْرِفَةَ نَفْسِكَ فَأَعْرِضْ عَنِ الدُّنْيَا."},
    { text: "إِنَّ عَلَى أَمَلِكَ جُنَّةً حَصِينَةً."},
    { text: "إِنَّ عُمْرَكَ عَدَدُ أَنْفَاسِكَ وَعَلَيْهَا رَقِيبٌ يُحْصِيهَا."},
    { text: "إِنَّ عُمْرَكَ مَهْرُ سَعَادَتِكَ."},
    { text: "إِنَّ عُمْرَكَ وَقْتُكَ الَّذِي أَنْتَ فِيهِ."},
    { text: "إِنَّ غَائِبًا يَحْدُوهُ الْجَدِيدَانِ اللَّيْلُ وَالنَّهَارُ لَحَرِيٌّ بِسُرْعَةِ الْأَوْبَةِ."},
    { text: "إِنَّ غَايَةً تَنْقُصُهَا اللَّحْظَةُ وَتَهْدِمُهَا السَّاعَةُ لَحَرِيَّةٌ بِقَصْرِ الْمُدَّةِ."},
    { text: "إِنَّ غَدًا مِنَ الْيَوْمِ قَرِيبٌ."},
    { text: "إِنَّ فَضْلَ الْقَوْلِ عَلَى الْفِعْلِ لَهُجْنَةٌ."},
    { text: "إِنَّ فِي الْخُمُولِ لَرَاحَةً."},
    { text: "إِنَّ فِي الشَّرِّ لَوَقَاحَةً."},
    { text: "إِنَّ فِي الْفِرَارِ مُوجِدَةَ اللَّهِ سُبْحَانَهُ."},
    { text: "إِنَّ فِي الْقُنُوعِ لَغَنَاءً."},
    { text: "إِنَّ فِي الْمَوْتِ لَرَاحَةً لِمَنْ كَانَ عَبْدَ شَهْوَتِهِ."},
    { text: "إِنَّ فِي كُلِّ شَيْءٍ مَوْعِظَةً وَعِبْرَةً لِذَوِي اللُّبِّ."},
    { text: "إِنَّ قَادِمًا يَقْدَمُ بِالْفَوْزِ أَوِ الشَّقْوَةِ."},
    { text: "إِنَّ قَدْرَ السُّؤَالِ أَكْثَرُ مِنْ قِيمَةِ النَّوَالِ."},
    { text: "إِنَّ قَوْلَنَا إِنَّا لِلَّهِ إِقْرَارٌ عَلَى أَنْفُسِنَا بِالْمِلْكِ."},
    { text: "إِنَّ قَوْمًا عَبَدُوا اللَّهَ سُبْحَانَهُ رَغْبَةً فَتِلْكَ عِبَادَةُ التُّجَّارِ."},
    { text: "إِنْ كَانَ فِي الْغَضَبِ الِانْتِصَارُ فَفِي الْحِلْمِ ثَوَابُ الْأَبْرَارِ."},
    { text: "إِنْ كَانَ فِي الْكَلَامِ بَلَاغَةٌ فَفِي الصَّمْتِ السَّلَامَةُ."},
    { text: "إِنْ كَانَتِ الرَّعَايَا قَبْلِي تَشْكُو حَيْفَ رُعَاتِهَا فَإِنِّي الْيَوْمَ أَشْكُو حَيْفَ رَعِيَّتِي."},
    { text: "إِنَّ كَرَامَتَكَ لَا تَتَّسِعُ لِجَمِيعِ النَّاسِ فَتَوَخَّ بِهَا أَفَاضِلَ الْخَلْقِ."},
    { text: "إِنَّ كَرَمَ اللَّهِ سُبْحَانَهُ لَا يَنْقُضُ حِكْمَتَهُ."},
    { text: "إِنَّ كُفْرَ النِّعْمَةِ لُؤْمٌ وَمُصَاحَبَةَ الْجَاهِلِ شُومٌ."},
    { text: "إِنَّ كَلَامَ الْحَكِيمِ إِذَا كَانَ صَوَابًا لَمُسْتَحِقُّ الْأَفْضَلِ الْعُدَّةِ."},
    { text: "إِنَّ كَمَا تُحِبُّ أَنْ يُعَامِلُوكَ بِهِ."},
    { text: "إِنَّ كُنْتُمْ لَا مَحَالَةَ مُتَنَزِّهِينَ فَتَنَزَّهُوا عَنْ مَعَاصِي الْقُلُوبِ."},
    { text: "إِنْ كُنْتُمْ لِلنَّجَاةِ طَالِبِينَ فَارْفُضُوا الْغَفْلَةَ."},
    { text: "إِنْ كُنْتُمْ لِلنَّعِيمِ طَالِبِينَ فَأَعْتِقُوا أَنْفُسَكُمْ مِنْ دَارِ الشَّقَاءِ."},
    { text: "إِنَّ لِأَنْفُسِكُمْ أَثْمَانًا فَلَا تَبِيعُوهَا إِلَّا بِالْجَنَّةِ."},
    { text: "إِنَّ لِتَقْوَى اللَّهِ حَبْلًا وَثِيقًا عُرْوَتُهُ."},
    { text: "إِنَّ لِسَانَكَ يَقْتَضِيكَ مَا عَوَّدْتَهُ."},
    { text: "إِنَّ لَكُمْ نِهَايَةً فَانْتَهُوا إِلَى نِهَايَتِكُمْ."},
    { text: "إِنَّ لِلْآخِرِ بِالْأَوَّلِ مُزْدَجَرًا."},
    { text: "إِنَّ لِلْإِسْلَامِ غَايَةً فَانْتَهُوا إِلَى غَايَتِهِ."},
    { text: "إِنَّ لِإِلَهَ إِلَّا اللَّهُ شُرُوطًا وَإِنِّي وَذُرِّيَّتِي مِنْ شُرُوطِهَا."},
    { text: "إِنَّ لِلْبَاقِينَ بِالْمَاضِينَ مُعْتَبَرًا."},
    { text: "إِنَّ لِلدُّنْيَا رِجَالًا لَدَيْهِمْ كُنُوزٌ مَذْخُورَةٌ."},
    { text: "إِنَّ لِلدُّنْيَا مَعَ كُلِّ شَرْبَةٍ شَرَقًا."},
    { text: "إِنَّ لِلذِّكْرِ أَهْلًا أَخَذُوهُ بَدَلًا مِنَ الدُّنْيَا."},
    { text: "إِنَّ لِلْقُلُوبِ إِقْبَالًا وَإِدْبَارًا."},
    { text: "إِنَّ لِلْقُلُوبِ خَوَاطِرَ سُوءٍ وَالْعُقُولُ تَزْجُرُ مِنْهَا."},
    { text: "إِنَّ لِلْقُلُوبِ شَهْوَةً وَكَرَاهَةً وَإِقْبَالًا وَإِدْبَارًا."},
    { text: "إِنَّ لِلْمِحَنِ غَايَاتٍ لَا بُدَّ مِنْ انْقِضَائِهَا."},
    { text: "إِنَّ لِلْمِحَنِ غَايَاتٍ وَلِلْغَايَاتِ نِهَايَاتٌ."},
    { text: "إِنَّ لِلْمَوْتِ لَغَمَرَاتٍ هِيَ أَفْضَعُ مِنْ أَنْ تُسْتَغْرَقَ بِصِفَةٍ."},
    { text: "إِنَّ لِلنَّاسِ عُيُوبًا فَلَا تَكْشِفْ مَا غَابَ عَنْكَ."},
    { text: "إِنَّ لِلَّهِ تَعَالَى فِي السَّرَّاءِ نِعْمَةَ الْإِفْضَالِ."},
    { text: "إِنَّ لِلَّهِ تَعَالَى فِي كُلِّ نِعْمَةٍ حَقًّا مِنَ الشُّكْرِ."},
    { text: "إِنَّ لِلَّهِ سُبْحَانَهُ سَطَوَاتٍ وَنَقِمَاتٍ."},
    { text: "إِنَّ لِلَّهِ سُبْحَانَهُ عِبَادًا يَخْتَصُّهُمْ بِالنِّعَمِ لِمَنَافِعِ الْعِبَادِ."},
    { text: "إِنَّ لِلَّهِ سُبْحَانَهُ مَلَكًا يُنَادِي فِي كُلِّ يَوْمٍ يَا أَهْلَ الدُّنْيَا لِدُوا لِلْمَوْتِ."},
    { text: "إِنْ لَمْ تَرْدَعْ نَفْسَكَ عَنْ كَثِيرٍ مِمَّا تُحِبُّ مَخَافَةَ مَكْرُوهِهِ سَمَتْ بِكَ الْأَهْوَاءُ."},
    { text: "إِنْ لَمْ يُصْلِحْهُمْ إِلَّا إِفْسَادِي فَلَا أَصْلَحَهُمُ اللَّهُ."},
    { text: "إِنَّ اللَّيْلَ وَالنَّهَارَ مُسْرِعَانِ فِي هَدْمِ الْأَعْمَارِ."},
    { text: "إِنَّ اللَّيْلَ وَالنَّهَارَ يَعْمَلَانِ فِيكَ فَأَعْمَلْ فِيهِمَا."},
    { text: "إِنَّ لَيْلَكَ وَنَهَارَكَ لَا يَسْتَوْعِبَانِ لِجَمِيعِ حَاجَاتِكَ."},
    { text: "إِنَّ مَا تُقَدِّمُ مِنْ خَيْرٍ يَكُنْ لَكَ ذُخْرُهُ."},
    { text: "إِنَّ مَاضِيَ عُمْرِكَ أَجَلٌ وَآتِيَهُ أَمَلٌ."},
    { text: "إِنَّ مَاضِيَ يَوْمِكَ مُنْتَقِلٌ وَبَاقِيَهُ مُتَّهَمٌ."},
    { text: "إِنَّ مَالَكَ لَا يُغْنِي جَمِيعَ النَّاسِ فَاخْصُصْ بِهِ أَهْلَ الْحَقِّ."},
    { text: "إِنَّ مَالَكَ لِحَامِدِكَ فِي حَيَاتِكَ وَلِذَامِّكَ بَعْدَ وَفَاتِكَ."},
    { text: "إِنَّ مَثَلَ الدُّنْيَا وَالْآخِرَةِ كَرَجُلٍ لَهُ امْرَأَتَانِ."},
    { text: "إِنَّ مُجَاهَدَةَ النَّفْسِ لَتَزِمُّهَا عَنِ الْمَعَاصِي."},
    { text: "إِنَّ مَحَلَّ الْإِيمَانِ الْجَنَانُ وَسَبِيلَهُ الْأُذُنَانِ."},
    { text: "إِنَّ مَعَ كُلِّ إِنْسَانٍ مَلَكَيْنِ يَحْفَظَانِهِ."},
    { text: "إِنَّ مُقَابَلَةَ الْإِسَاءَةِ بِالْإِحْسَانِ لَمِنْ أَحْسَنِ الْفَضَائِلِ."},
    { text: "إِنَّ مَكْرُمَةً صَنَعْتَهَا إِلَى أَحَدٍ مِنَ النَّاسِ إِنَّمَا أَكْرَمْتَ بِهَا نَفْسَكَ."},
    { text: "إِنَّ مِنْ أَبْغَضِ الْخَلَائِقِ إِلَى اللَّهِ تَعَالَى رَجُلًا وَكَلَهُ اللَّهُ إِلَى نَفْسِهِ."},
    { text: "إِنَّ مِنْ أَحَبِّ الْعِبَادِ إِلَى اللَّهِ سُبْحَانَهُ عَبْدًا أَعَانَهُ عَلَى نَفْسِهِ."},
    { text: "إِنَّ مِنْ أَبْغَضِ الْخَلَائِقِ إِلَى اللَّهِ تَعَالَى مَنْ كَانَ هِمَّتُهُ بَطْنَهُ وَفَرْجَهُ."},
    { text: "إِنَّ مِنْ أَمْقَتِ النَّاسِ الْعَيَّابُ."},
    { text: "إِنَّ مِنْ أَهْلِ الدُّنْيَا مَنْ أَشْبَاهَ الْكِلَابِ."},
    { text: "إِنَّ مِنْ أَهْلِ الْقُرْآنِ أَهْلَ اللَّهِ وَخَاصَّتَهُ."},
    { text: "إِنَّ مِنْ أَهْلِ الذِّكْرِ أَهْلَ اللَّهِ وَخَاصَّتَهُ."},
    { text: "إِنَّ مِنْ أَهْلَكَ شَيْءٍ اسْتِدَامَةَ الضَّلَالِ."},
    { text: "إِنَّ مِنْ أَهْلَكَ شَيْءٍ الشَّقَّ وَالِارْتِيَابَ."},
    { text: "إِنَّ مِنْ أَهْلَكَ شَيْءٍ الطَّمَعُ."},
    { text: "إِنَّ مِنْ أَهْلَكَ شَيْءٍ الْهَوَى."},
    { text: "إِنَّ مِنْ أَمِنَ نَفْسَكَ مَا جَمَحَتْ بِكَ إِلَى مَعَاصِي اللَّهِ."},
    { text: "إِنَّ مِنْ أَهْنَأِ الْأَقْسَامِ الْقَنَاعَةُ وَصِحَّةُ الْأَجْسَامِ."},
    { text: "إِنَّ مِنْ أَهْنَأِ الْعَيْشِ أَطْرَاحَ الْكُلَفِ."},
    { text: "إِنَّ مِنْ أَهْوَنِ شَيْءٍ لَائِمَةُ الْجُهَّالِ."},
    { text: "إِنَّ مِنْ أَهْوَاءِ النَّفْسِ مَا يُؤَدِّي إِلَى الرَّدَى."},
    { text: "إِنَّ مِنْ أَوْأَخِرِ مَصَادِرِ التَّوْفِيقِ أَوَائِلَ مَوَارِدِ الْحَذَرِ."},
    { text: "إِنَّ مِنْ أَوْثَقِ سَبَبٍ أَخَذْتَ بِهِ سَبَبٌ بَيْنَكَ وَبَيْنَ اللَّهِ."},
    { text: "إِنَّ مِنْ أَوْثَقِ عُرَى الْإِيمَانِ الْحُبُّ فِي اللَّهِ وَالْبُغْضُ فِي اللَّهِ."},
    { text: "إِنَّ مِنْ أَوْجَبِ الْعِلْمِ عَلَيْكَ مَا أَنْتَ مَسْؤُولٌ عَنِ الْعَمَلِ بِهِ."},
    { text: "إِنَّ مِنْ أَوْحَشِ الْوَحْشَةِ الْعُجْبُ."},
    { text: "إِنَّ مِنْ أَوْرَعِ النَّاسِ أَنْزَهُهُمْ عَنِ الْمَطَالِبِ."},
    { text: "إِنَّ مِنْ أَوْضَعِ الْعِلْمِ مَا وَقَفَ عَلَى اللِّسَانِ."},
    { text: "إِنَّ مِنْ أَوْفَرِ النَّاسِ حَظًّا مِنَ الْآخِرَةِ أَقَلَّهُمْ حَظًّا مِنَ الدُّنْيَا."},
    { text: "إِنَّ مِنْ أَوْفَرِ الْبِرِّ صِلَةَ الرَّحِمِ."},
    { text: "إِنَّ مِنْ أَوْفَرِ الْقِسْمِ صِحَّةَ الْجِسْمِ."},
    { text: "إِنَّ مِنْ أَوْقَاتِ الدُّنْيَا وَإِنْ طَالَتْ قَصِيرَةٌ."},
    { text: "إِنَّ مِنْ أَوْقَاتِ السُّرُورِ خُلْسَةٌ."},
    { text: "إِنَّ مِنْ أَوْفَى جُنَّةٍ التُّقَى."},
    { text: "إِنَّ مِنْ أَوَّلِ الْإِخْلَاصِ الْيَأْسُ عَمَّا فِي أَيْدِي النَّاسِ."},
    { text: "إِنَّ مِنْ أَوَّلِ الْعِبَادَةِ انْتِظَارَ الْفَرَجِ بِالصَّبْرِ."},
    { text: "إِنَّ مِنْ أَوَّلِ اللَّهْوِ لَعِبٌ وَآخِرُهُ حَرَبٌ."},
    { text: "إِنَّ مِنْ أَوَّلِ مَا تُنْكِرُونَ مِنَ الْجِهَادِ جِهَادُ أَنْفُسِكُمْ."},
    { text: "إِنَّ مِنْ أَوَّلِ مَا يَجِبُ عَلَيْكُمْ لِلَّهِ سُبْحَانَهُ شُكْرُ أَيَادِيهِ."},
    { text: "إِنَّ مِنْ أَوَّلِ الْمُرُوءَةِ الْبِشْرُ وَآخِرُهَا اسْتِدَامَةُ الْبِرِّ."},
    { text: "إِنَّ مِنْ أَوَّلِ الْمُرُوءَةِ طَلَاقَةُ الْوَجْهِ."},
    { text: "إِنَّ مِنْ أَوَّلِ الْهَوَى فِتْنَةٌ وَآخِرُهُ مِحْنَةٌ."},
    { text: "إِنَّ مِنْ أَوَّلَ مَنْ تَرَوْنَ أَهْلَ الدُّنْيَا يُمْسُونَ وَيُصْبِحُونَ عَلَى أَحْوَالٍ شَتَّى."},
    { text: "إِنَّ مِنْ أَوْلَى النَّاسِ بِالْإِنْعَامِ مَنْ كَثُرَتْ نِعَمُ اللَّهِ عَلَيْهِ."},
    { text: "إِنَّ مِنْ أَوْلَى النَّاسِ بِالِاصْطِنَاعِ مَنْ إِذَا مُطِلَ صَبَرَ."},
    { text: "إِنَّ مِنْ أَوْلَى النَّاسِ بِنَا مَنْ وَالَانَا وَعَادَى مَنْ عَادَانَا."},
    { text: "إِنَّ مِنْ أَوْلَى الْعِلْمِ بِكَ مَا لَا يُتَقَبَّلُ الْعَمَلُ إِلَّا بِهِ."},
    { text: "إِنَّ مِنْ أَوْلَى مَنْ أَحْبَبْتَ مَنْ لَا يَقْلَاكَ."},
    { text: "إِنَّ مِنْ أَوْلَى النَّاسِ بِالْأَنْبِيَاءِ عَلَيْهِمُ السَّلَامُ أَعْلَمُهُمْ بِمَا جَاءُوا بِهِ."},
    { text: "إِنَّ مِنْ أَوْلَى النَّاسِ بِالْحَذَرِ أَسْلَمُهُمْ مِنَ الْغِيَرِ."},
    { text: "إِنَّ مِنْ أَوْلَى النَّاسِ بِالرَّحْمَةِ أَحْوَجُهُمْ إِلَيْهَا."},
    { text: "إِنَّ مِنْ أَوْلَى النَّاسِ بِالْعَفْوِ أَقْدَرُهُمْ عَلَى الْعُقُوبَةِ."},
    { text: "إِنَّ مِنْ أَوْلَى النَّاسِ بِالنَّوَالِ أَغْنَاهُمْ عَنِ السُّؤَالِ."},
    { text: "إِنَّ مِنْ أَوْهَنِ الْأَعْدَاءِ كَيْدًا مَنْ أَظْهَرَ عَدَاوَتَهُ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تُخْدَعَ عَنْ دَارِ الْقَرَارِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تُخْدَعَ عَنْ صَدِيقِكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تُخْرِجَ صَدِيقَكَ إِخْرَاجًا يُخْرِجُهُ عَنْ مَوَدَّتِكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَذْكُرَ مِنَ الْكَلَامِ مُضْحِكًا."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَرْضَى عَنْ نَفْسِكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَسْتَخِفَّ بِالْعُلَمَاءِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَسْتَسْهِلَ رُكُوبَ الْمَعَاصِي."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَسْتَكْبِرَ مِنْ مَعْصِيَةِ غَيْرِكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَسْتَوْحِشَ مِنْ غَلْطَةِ خَيْرٍ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تُسْلِفَ الْمَعْصِيَةَ وَتُسَوِّفَ بِالتَّوْبَةِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تُسِيءَ الظَّنَّ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَعْتَمِدَ عَلَى اللَّئِيمِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تُعْجِبَ بِنَفْسِكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَغْتَرَّ بِغَلْطَةِ شِرِّيرٍ بِالْخَيْرِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَغْتَرَّ بِمَا تَرَى مِنْ إِخْلَادِ أَهْلِ الدُّنْيَا إِلَيْهَا."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَغْفَلَ عَنْ حَقِّ أَخِيكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَغْلِبَكَ نَفْسُكَ عَلَى مَا تَظُنُّ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تَكُونَ عَلَى النَّاسِ طَاعِنًا وَلِنَفْسِكَ مُدَاهِنًا."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تُهْمِلَ حَقَّ أَخِيكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ تُوحِشَ مُوَدَّدَكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ أَنْ يَفْقِدَكَ رَبُّكَ عِنْدَ طَاعَتِهِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَإِدْمَانَ الشَّبَعِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْإِسَاءَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْإِصْرَارَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْإِعْجَابَ وَحُبَّ الْإِطْرَاءِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْإِمْسَاكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالِاتِّكَالَ عَلَى الْمُنَى."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالِاسْتِنَارَةَ بِمَا لِلنَّاسِ فِيهِ أُسْوَةٌ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْبِطْنَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْبَغْيَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالتَّجَبُّرَ عَلَى عِبَادِ اللَّهِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالتَّحَلِّيَ بِالْبُخْلِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالتَّسَرُّعَ إِلَى الْعُقُوبَةِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالتَّعَايُرَ فِي غَيْرِ مَوْضِعِهِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالثِّقَةَ بِالْآمَالِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالثِّقَةَ بِنَفْسِكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْجَفَاءَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْجَوْرَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْحِرْصَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْحَسَدَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْخَدِيعَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْخُرْقَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْخِيَانَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالسَّفَهَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالشُّحَّ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالشَّرَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالشَّرَةَ فَإِنَّهُ يُفْسِدُ الْوَرَعَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالشَّكَّ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالظُّلْمَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالظُّلْمَ فَمَنْ ظَلَمَ كَرُهَتْ أَيَّامُهُ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْعَجَلَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْعَجَلَ فَإِنَّهُ مَقْرُونٌ بِالْعِثَارِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْغَدْرَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْغَضَبَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْغَفْلَةَ وَالِاغْتِرَارَ بِالْمُهْلَةِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْغِيبَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْفُرْقَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْفُحْشَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْكِبْرَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْكَلَامَ فِيمَا لَا تَعْرِفُ طَرِيقَتَهُ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْمُجَاهَرَةَ بِالْفُجُورِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْمَعْصِيَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْمَكْرَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْمَلَقَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْمَنَّ بِالْمَعْرُوفِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالنِّفَاقَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالنَّمِيمَةَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْهَذَرَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْوُقُوعَ فِي الشُّبُهَاتِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْوَلَهَ بِالدُّنْيَا."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَانْتِهَاكَ الْمَحَارِمِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَحُبَّ الدُّنْيَا."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَخُبْثَ الطَّوِيَّةِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَصُحْبَةَ مَنْ أَلْهَاكَ وَأَغْرَاكَ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَطَاعَةَ الْهَوَى."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمَحَاضِرَ الْفُسُوقِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمَذْمُومَ اللَّجَاجِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُسَامَاةَ اللَّهِ سُبْحَانَهُ فِي عَظَمَتِهِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُسْتَهْجَنَ الْكَلَامِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُشَاوَرَةَ النِّسَاءِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُصَاحَبَةَ الْأَشْرَارِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُصَاحَبَةَ أَهْلِ الْفُسُوقِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُصَاحَبَةَ الْفُسَّاقِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُصَادَقَةَ الْأَحْمَقِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُصَادَقَةَ الْبَخِيلِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُصَادَقَةَ الْكَذَّابِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُعَاشَرَةَ الْأَشْرَارِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُعَاشَرَةَ مُتَتَبِّعِي عُيُوبِ النَّاسِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمَقَاعِدَ الْأَسْوَاقِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمَنْعَ الْمُقْتَصِدِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُوَاسَاةَ الرِّفَاقِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَمُؤْمِنِينَ مُشْفِقِينَ."},
    { text: "إِنَّ مِنْ إِنْ نَطَقُوا صَدَقُوا."},
    { text: "إِنَّ مِنْ إِفْعَلِ الْخَيْرَ وَلَا تُحَقِّرْ مِنْهُ شَيْئًا."},
    { text: "إِنْجَازُ الْوَعْدِ أَحَدُ الْعِتْقَيْنِ."},
    { text: "إِنْجَازُ الْوَعْدِ مِنْ دَلَائِلِ الْمَجْدِ."},
    { text: "أَنْجَحُ الْأُمُورِ مَا أَحَاطَ بِهِ الْكِتْمَانُ."},
    { text: "أَنْجَحُكُمْ أَصْدَقُكُمْ."},
    { text: "الِانْحِطَاطُ إِلَى الرَّذَائِلِ سَهْلٌ مُرْدٍ."},
    { text: "انْدَمْ عَلَى مَا أَسَأْتَ وَلَا تَنْدَمْ عَلَى مَعْرُوفٍ صَنَعْتَ."},
    { text: "الْإِنْذَارُ إِعْذَارٌ."},
    { text: "أُنْسُ الْأَمْنِ تُذْهِبُهُ وَحْشَةُ الْوَحْدَةِ."},
    { text: "أُنْسُ الْجَمَاعَةِ تُنَكِّدُهُ وَحْشَةُ الْمَخَافَةِ."},
    { text: "إِنْسَ رِفْدَكَ، اذْكُرْ وَعْدَكَ."},
    { text: "الْأُنْسُ فِي ثَلَاثَةٍ: الزَّوْجَةُ الْمُوَافِقَةُ، وَالْوَلَدُ الْبَارُّ، وَالْأَخُ الْمُوَافِقُ."},
    { text: "الْإِنْسَانُ بِعَقْلِهِ."},
    { text: "الْإِنْسَانُ عَبْدُ الْإِحْسَانِ."},
    { text: "الْإِنْصَافُ أَفْضَلُ الشِّيَمِ."},
    { text: "الْإِنْصَافُ أَفْضَلُ الْفَضَائِلِ."},
    { text: "الْإِنْصَافُ رَاحَةٌ."},
    { text: "الْإِنْصَافُ زَيْنُ الْإِمْرَةِ."},
    { text: "الْإِنْصَافُ شِيمَةُ الْأَشْرَافِ."},
    { text: "الْإِنْصَافُ عُنْوَانُ النُّبْلِ."},
    { text: "الْإِنْصَافُ مِنَ النَّفْسِ كَالْعَدْلِ فِي الْإِمْرَةِ."},
    { text: "الْإِنْصَافُ يَرْفَعُ الْخِلَافَ وَيُوجِبُ الِائْتِلَافَ."},
    { text: "الْإِنْصَافُ يَسْتَدِيمُ الْمَحَبَّةَ."},
    { text: "الْإِنْصَافُ يُؤَلِّفُ الْقُلُوبَ."},
    { text: "أَنْصَحُ النَّاسِ لِنَفْسِهِ أَطْوَعُهُمْ لِرَبِّهِ."},
    { text: "أُنْصُرِ اللَّهَ بِقَلْبِكَ وَلِسَانِكَ وَيَدِكَ."},
    { text: "أَنْصَفُ النَّاسِ مَنْ أَنْصَفَ مِنْ نَفْسِهِ بِغَيْرِ حَاكِمٍ عَلَيْهِ."},
    { text: "أَنْصِفْ مِنْ نَفْسِكَ قَبْلَ أَنْ يُنْتَصَفَ مِنْكَ."},
    { text: "أَنْصِفِ النَّاسَ مِنْ نَفْسِكَ وَأَهْلِكَ وَخَاصَّتِكَ."},
    { text: "أُنْظُرْ إِلَى الدُّنْيَا نَظَرَ الزَّاهِدِ الْمُفَارِقِ."},
    { text: "أُنْظُرُوا إِلَى الدُّنْيَا نَظَرَ الزَّاهِدِينَ فِيهَا."},
    { text: "أَنْعَمُ النَّاسِ عَيْشًا مَنْ مَنَحَهُ اللَّهُ تَعَالَى الْقَنَاعَةَ."},
    { text: "أَنْعِمْ تُشْكَرْ وَأَرْهِبْ تُحْذَرْ."},
    { text: "أَنْفَذُ السِّهَامِ دَعْوَةُ الْمَظْلُومِ."},
    { text: "الِانْفِرَادُ رَاحَةُ الْمُتَعَبِّدِينَ."},
    { text: "انْفَرِدْ بِسِرِّكَ وَلَا تُودِعْهُ حَازِمًا فَيَزِلَّ."},
    { text: "أَنْفَعُ الْعِلْمِ مَا عُمِلَ بِهِ."},
    { text: "أَنْفَعُ الدَّوَاءِ تَرْكُ الْمُنَى."},
    { text: "أَنْفَعُ الدَّخَائِرِ صَالِحُ الْأَعْمَالِ."},
    { text: "أَنْفَعُ شَيْءٍ الْوَرَعُ."},
    { text: "أَنْفَعُ الْكُنُوزِ مَحَبَّةُ الْقُلُوبِ."},
    { text: "أَنْفَعُ الْكُنُوزِ مَعْرُوفٌ تُودِعُهُ الْأَحْرَارَ."},
    { text: "أَنْفَعُ الْمَالِ مَا قُضِيَ بِهِ الْفَرْضُ."},
    { text: "أَنْفَعُ الْمَوَاعِظِ مَا رَدَعَ."},
    { text: "الِانْقِبَاضُ عَنِ الْمَحَارِمِ مِنْ شِيَمِ الْعُقَلَاءِ."},
    { text: "الِانْقِيَادُ لِلشَّهْوَةِ أَدْوَأُ الدَّاءِ."},
    { text: "إِنَّكَ إِنْ أَحْسَنْتَ فَنَفْسَكَ تُكْرِمُ."},
    { text: "إِنَّكَ إِنْ أَخْلَاتَ بِشَيْءٍ مِنْ هَذَا التَّقْسِيمِ فَلَا تَقُومُ نَوَافِلُ."},
    { text: "إِنَّكَ إِنْ أَدْبَرْتَ عَنِ الدُّنْيَا أَقْبَلَتْ."},
    { text: "إِنَّكَ إِنْ أَسَأْتَ فَنَفْسَكَ تَمْتَهِنُ."},
    { text: "إِنَّكَ إِنْ أَطَعْتَ اللَّهَ سُبْحَانَهُ نَجَّاكَ."},
    { text: "إِنَّكَ إِنْ أَطَعْتَ هَوَاكَ أَصَمَّكَ وَأَعْمَاكَ."},
    { text: "إِنَّكَ إِنْ أَقْبَلْتَ عَلَى الدُّنْيَا أَدْبَرَتْ."},
    { text: "إِنَّكَ إِنْ أَنْصَفْتَ مِنْ نَفْسِكَ أَزْلَفَكَ اللَّهُ."},
    { text: "إِنَّكَ إِنِ اجْتَنَبْتَ السَّيِّئَاتِ رَفِيعَ الدَّرَجَاتِ."},
    { text: "إِنَّكَ إِنِ اشْتَغَلْتَ بِفَضَائِلِ النَّوَافِلِ عَنْ أَدَاءِ الْفَرَائِضِ فَلَنْ يَقُومَ فَضْلٌ."},
    { text: "إِنَّكَ إِنْ تَكَبَّرْتَ وَضَعَكَ اللَّهُ."},
    { text: "إِنَّكَ إِنْ تَوَاضَعْتَ رَفَعَكَ اللَّهُ."},
    { text: "إِنَّكَ إِنْ تَوَرَّعْتَ تَنَزَّهْتَ عَنْ دَنَسِ السَّيِّئَاتِ."},
    { text: "إِنَّكَ إِنْ حَارَبْتَ اللَّهَ سُبْحَانَهُ حُرِبْتَ وَهَلَكْتَ."},
    { text: "إِنَّكَ إِنْ سَالَمْتَ اللَّهَ سُبْحَانَهُ سَلِمْتَ وَفُزْتَ."},
    { text: "إِنَّكَ إِنْ عَمِلْتَ لِلْآخِرَةِ فَازَ قِدْحُكَ."},
    { text: "إِنَّكَ إِنْ عَمِلْتَ لِلدُّنْيَا خَسِرَتْ صَفْقَتُكَ."},
    { text: "إِنَّكَ إِنْ مَلَّكْتَ نَفْسَكَ قِيَادَكَ أَفْسَدَتْ مَعَادَكَ."},
    { text: "إِنَّكَ طَرِيدُ الْمَوْتِ الَّذِي لَا يَنْجُو هَارِبُهُ."},
    { text: "إِنَّكَ فِي سَبِيلِ مَنْ كَانَ قَبْلَكَ."},
    { text: "إِنَّكَ لَسْتَ بِسَابِقٍ أَجَلَكَ وَلَا بِمَرْزُوقٍ مَا لَيْسَ لَكَ."},
    { text: "إِنَّكَ لَنْ تَبْلُغَ أَمَلَكَ وَلَنْ تَعْدُوَ أَجَلَكَ."},
    { text: "إِنَّكَ لَنْ تَحْمِلَ إِلَى الْآخِرَةِ عَمَلًا أَضَرَّ عَلَيْكَ مِنْ حُبِّ الدُّنْيَا."},
    { text: "إِنَّكَ لَنْ تُخْلَقَ لِلدُّنْيَا فَازْهَدْ فِيهَا."},
    { text: "إِنَّكَ لَنْ تُدْرِكَ مَا تُحِبُّ مِنْ رَبِّكَ إِلَّا بِالصَّبْرِ."},
    { text: "إِنَّكَ لَنْ تَلِجَ الْجَنَّةَ حَتَّى تَزْدَجِرَ عَنْ غَيِّكَ."},
    { text: "إِنَّكَ لَنْ تَلْقَى اللَّهَ سُبْحَانَهُ بِعَمَلٍ بَرٍّ شَهِيدٍ."},
    { text: "إِنَّكَ لَنْ يُتَقَبَّلَ مِنْ عَمَلِكَ إِلَّا مَا أَخْلَصْتَ فِيهِ."},
    { text: "إِنَّكَ لَنْ يُغْنِيَ عَنْكَ بَعْدَ الْمَوْتِ إِلَّا صَالِحُ عَمَلٍ قَدَّمْتَهُ."},
    { text: "إِنَّكَ مَخْلُوقٌ لِلْآخِرَةِ فَاعْمَلْ لَهَا."},
    { text: "إِنَّكَ مُدْرِكٌ قِسْمَكَ وَمَضْمُونٌ رِزْقُكَ."},
    { text: "إِنَّكَ مُقَوَّمٌ بِأَدَبِكَ فَزَيِّنْهُ بِالْحِلْمِ."},
    { text: "إِنَّكَ مِنْ وَرَائِكَ طَالِبًا حَثِيثًا مِنَ الْمَوْتِ."},
    { text: "إِنَّكَ مَوْزُونٌ بِعَقْلِكَ فَزَكِّهِ بِالْعِلْمِ."},
    { text: "الْإِنْكَارُ أُضْرَارٌ."},
    { text: "إِنَّكُمْ أَغْبَطُ بِمَا بَذَلْتُمْ مِنَ الرَّاغِبِ إِلَيْكُمْ."},
    { text: "إِنَّكُمْ إِلَى عِمَارَةِ دَارِ الْبَقَاءِ أَحْوَجُ مِنْكُمْ إِلَى عِمَارَةِ دَارِ الْفَنَاءِ."},
    { text: "إِنَّكُمْ إِلَى الْآخِرَةِ صَائِرُونَ وَعَلَى اللَّهِ تَعَالَى مَعْرُوضُونَ."},
    { text: "إِنَّكُمْ إِلَى مَكَارِمِ الْأَفْعَالِ أَحْوَجُ مِنْكُمْ إِلَى بَلَاغَةِ الْأَقْوَالِ."},
    { text: "إِنَّكُمْ إِنْ أَطَعْتُمْ أَنْفُسَكُمْ نَزَعَتْ بِكُمْ إِلَى شَرِّ غَايَةٍ."},
    { text: "إِنَّكُمْ إِنْ أَطَعْتُمْ سَوْرَةَ الْغَضَبِ أَوْرَدَتْكُمْ مَوَارِدَ الْعَطَبِ."},
    { text: "إِنَّكُمْ إِنْ أَقْبَلْتُمْ عَلَى اللَّهِ أَقْبَلْتُمْ."},
    { text: "إِنَّكُمْ إِنْ أَمَّرْتُمْ عَلَيْكُمُ الْهَوَى أَصَمَّكُمْ وَأَعْمَاكُمْ."},
    { text: "إِنَّكُمْ إِنِ اغْتَرَرْتُمْ بِالْآمَالِ تَخَرَّمَتْكُمْ بَوَادِرُ الْآجَالِ."},
    { text: "إِنَّكُمْ إِنِ اغْتَنَمْتُمْ صَالِحَ الْأَعْمَالِ نِلْتُمْ مِنَ الْآخِرَةِ نِهَايَةَ الْآمَالِ."},
    { text: "إِنَّكُمْ إِنْ رَجَوْتُمُ اللَّهَ بَلَغْتُمْ آمَالَكُمْ."},
    { text: "إِنَّكُمْ إِنْ رَضِيتُمْ بِالْقَضَاءِ طَابَتْ عِيشَتُكُمْ."},
    { text: "إِنَّكُمْ إِنْ رَغِبْتُمْ إِلَى اللَّهِ غَنِمْتُمْ وَنَجَوْتُمْ."},
    { text: "إِنَّكُمْ إِنْ رَغِبْتُمْ فِي الدُّنْيَا أَفْنَيْتُمْ أَعْمَارَكُمْ."},
    { text: "إِنَّكُمْ إِنْ زَهَدْتُمْ خَلَصْتُمْ مِنْ شَقَاءِ الدُّنْيَا."},
    { text: "إِنَّكُمْ إِنْ صَبَرْتُمْ عَلَى الْبَلَاءِ وَشَكَرْتُمْ فِي الرَّخَاءِ كَانَ لَكُمْ مِنَ اللَّهِ الرِّضَا."},
    { text: "إِنَّكُمْ إِنْ قَنَعْتُمْ حُزْتُمُ الْغِنَى."},
    { text: "إِنَّكُمْ إِنْ مَلَّكْتُمْ شَهَوَاتِكُمْ نَزَتْ بِكُمْ إِلَى الْأَشَرِ وَالْغَوَايَةِ."},
    { text: "إِنَّكُمْ إِنَّمَا خُلِقْتُمْ لِلْآخِرَةِ لَا لِلدُّنْيَا."},
    { text: "إِنَّكُمْ بِأَعْمَالِكُمْ مُجَازَوْنَ وَبِهَا مُرْتَهَنُونَ."},
    { text: "إِنَّكُمْ حَصَائِدُ الْآجَالِ وَأَغْرَاضُ الْحِمَامِ."},
    { text: "إِنَّكُمْ سَتُعْرَضُونَ عَلَى سَبِّي أَوِ الْبَرَاءَةِ مِنِّي."},
    { text: "إِنَّكُمْ طُرَدَاءُ الْمَوْتِ الَّذِي إِنْ أَقَمْتُمْ أَخَذَكُمْ."},
    { text: "إِنَّكُمْ فِي زَمَانٍ الْقَائِلُ فِيهِ بِالْحَقِّ قَلِيلٌ."},
    { text: "إِنَّكُمْ لَنْ تُحَصِّلُوا بِالْجَهْلِ إِرْبًا."},
    { text: "إِنَّكُمْ مُجَازَوْنَ بِأَفْعَالِكُمْ فَلَا تَفْعَلُوا إِلَّا بِرًّا."},
    { text: "إِنَّكُمْ مَدِينُونَ بِمَا قَدَّمْتُمْ."},
    { text: "إِنَّكُمْ مُؤَاخَذُونَ بِأَقْوَالِكُمْ فَلَا تَقُولُوا إِلَّا خَيْرًا."},
    { text: "إِنَّكُمْ هَدَفُ النَّوَائِبِ."},
    { text: "إِنَّمَا أَبَادَ الْقُرُونَ تَعَاقُبُ الْحَرَكَاتِ وَالسُّكُونِ."},
    { text: "إِنَّمَا أَنْتَ عَدَدُ أَيَّامٍ."},
    { text: "إِنَّمَا أَنْتَ كَالطَّاعِنِ نَفْسَهُ لِيَقْتُلَ رِدْفَهُ."},
    { text: "إِنَّمَا الدُّنْيَا جِيفَةٌ."},
    { text: "إِنَّمَا الدُّنْيَا دَارُ مَمَرٍّ وَالْآخِرَةُ دَارُ مُسْتَقَرٍّ."},
    { text: "إِنَّمَا الدُّنْيَا شَرَكٌ وَقَعَ فِيهِ مَنْ لَا يَعْرِفُهُ."},
    { text: "إِنَّمَا الدُّنْيَا مَتَاعُ أَيَّامٍ قَلَائِلَ."},
    { text: "إِنَّمَا السَّعِيدُ مَنْ خَافَ الْعِقَابَ فَأَمِنَ."},
    { text: "إِنَّمَا الشَّرَفُ بِالْعَقْلِ وَالْأَدَبِ."},
    { text: "إِنَّمَا الْعَاقِلُ مَنْ وَعَظَتْهُ التَّجَارِبُ."},
    { text: "إِنَّمَا الْعَالِمُ مَنْ دَعَاهُ عِلْمُهُ إِلَى الْوَرَعِ."},
    { text: "إِنَّمَا الْكَرَمُ التَّنَزُّهُ عَنِ الْمَعَاصِي."},
    { text: "إِنَّمَا الْكَرَمُ بَذْلُ الرَّغَائِبِ."},
    { text: "إِنَّمَا الْكَيْسُ مَنْ إِذَا أَسَاءَ اسْتَغْفَرَ."},
    { text: "إِنَّمَا اللَّبِيبُ مَنِ اسْتَسَلَّ الْأَحْقَادَ."},
    { text: "إِنَّمَا الْمَجْدُ أَنْ تُعْطِيَ فِي الْغُرْمِ."},
    { text: "إِنَّمَا الْمَرْءُ فِي الدُّنْيَا غَرَضٌ تَنْتَضِلُهُ الْمَنَايَا."},
    { text: "إِنَّمَا الْمَرْءُ مَجْزِيٌّ بِمَا أَسْلَفَ."},
    { text: "إِنَّمَا الْمَرْأَةُ لُعْبَةٌ فَمَنِ اتَّخَذَهَا فَلْيُغَطِّهَا."},
    { text: "إِنَّمَا الْمُسْتَحْفِظُونَ لِدِينِ اللَّهِ هُمُ الَّذِينَ أَقَامُوا الدِّينَ."},
    { text: "إِنَّمَا النَّاسُ رَجُلَانِ: مُتَّبِعُ شِرْعَةٍ وَمُبْتَدِعُ بِدْعَةٍ."},
    { text: "إِنَّمَا النَّاسُ عَالِمٌ وَمُتَعَلِّمٌ."},
    { text: "إِنَّمَا النُّبْلُ التَّبَرِّي عَنِ الْمَخَازِي."},
    { text: "إِنَّمَا الْوَرَعُ التَّحَرِّي فِي الْمَكَاسِبِ."},
    { text: "إِنَّمَا الْوَرَعُ التَّطْهِيرُ عَنِ الْمَعَاصِي."},
    { text: "إِنَّمَا طَبَائِعُ الْأَبْرَارِ طَبَائِعُ مُحْتَمِلَةٌ لِلْخَيْرِ."},
    { text: "إِنَّمَا قَلْبُ الْحَدَثِ كَالْأَرْضِ الْخَالِيَةِ."},
    { text: "إِنَّمَا لَكَ مِنْ مَالِكَ مَا قَدَّمْتَهُ لِآخِرَتِكَ."},
    { text: "إِنَّمَا مَثَلُ مَنْ خَبَرَ الدُّنْيَا كَمَثَلِ قَوْمٍ سَفَرٍ."},
    { text: "إِنَّمَا مَثَلِي بَيْنَكُمْ كَالسِّرَاجِ فِي الظُّلْمَةِ."},
    { text: "إِنَّمَا هِيَ مِنْ فَسَادِ الْخَاصَّةِ."},
    { text: "إِنَّمَا يُحِبُّكَ مَنْ لَا يَتَمَلَّقُكَ."},
    { text: "إِنَّمَا يَسْتَحِقُّ اسْمَ الصَّمْتِ الْمُضْطَلِعُ بِالْإِجَابَةِ."},
    { text: "إِنَّمَا يَعْرِفُ الْفَضْلَ لِأَهْلِ الْفَضْلِ أُولُو الْفَضْلِ."},
    { text: "إِنَّمَا يَنْبَغِي لِأَهْلِ الْعِصْمَةِ."},
    { text: "إِنَّمَا يَنْبَغِي لِأَهْلِ الْعِصْمَةِ أَنْ يَرْحَمُوا."},
    { text: "إِنِّي آمُرُكُمْ بِحُسْنِ الِاسْتِعْدَادِ."},
    { text: "إِنِّي أَخَافُ عَلَيْكُمْ كُلَّ عَلِيمِ اللِّسَانِ مُنَافِقِ الْجَنَانِ."},
    { text: "إِنِّي إِذَا اسْتَحْكَمَتْ فِي الرَّجُلِ خَصْلَةٌ مِنْ خِصَالِ الْخَيْرِ احْتَمَلْتُهُ لَهَا."},
    { text: "إِنِّي طَلَّقْتُ الدُّنْيَا ثَلَاثًا بَتَاتًا."},
    { text: "إِنِّي كُنْتُ إِذَا سَأَلْتُ رَسُولَ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَآلِهِ أَعْطَانِي."},
    { text: "إِنِّي لَأَرْفَعُ نَفْسِي أَنْ تَكُونَ حَاجَةٌ لَا يَسَعُهَا جُودِي."},
    { text: "إِنِّي لَأَرْفَعُ نَفْسِي عَنْ أَنْ أَنْهَى النَّاسَ بِمَا لَسْتُ أَنْتَهِي عَنْهُ."},
    { text: "إِنِّي لَا أُحِبُّكُمْ عَلَى طَاعَةٍ إِلَّا وَأَسْبِقُكُمْ إِلَيْهَا."},
    { text: "إِنِّي لَعَلَى إِقَامَةِ حُجَجِ اللَّهِ أُقَاوِلُ."},
    { text: "إِنِّي لَعَلَى بَيِّنَةٍ مِنْ رَبِّي."},
    { text: "إِنِّي لَعَلَى جَادَّةِ الْحَقِّ."},
    { text: "إِنِّي لَعَلَى يَقِينٍ مِنْ رَبِّي."},
    { text: "إِنِّي مُحَارِبٌ أَمَلِي وَمُنْتَظِرُ أَجَلِي."},
    { text: "إِنِّي مُسْتَوْفٍ رِزْقِي وَمُجَاهِدٌ نَفْسِي."},
    { text: "أَهْجُرِ اللَّهْوَ فَإِنَّكَ لَمْ تُخْلَقْ عَبَثًا."},
    { text: "أُهْجُرُوا الشَّهَوَاتِ فَإِنَّهَا تَقُودُكُمْ."},
    { text: "أَهْرُبُوا مِنَ الدُّنْيَا وَاصْرِفُوا قُلُوبَكُمْ عَنْهَا."},
    { text: "أَهْلُ الدُّنْيَا غَرَضُ النَّوَائِبِ."},
    { text: "أَهْلُ الذِّكْرِ أَهْلُ اللَّهِ وَخَاصَّتُهُ."},
    { text: "أَهْلُ الْقُرْآنِ أَهْلُ اللَّهِ وَخَاصَّتُهُ."},
    { text: "أَهْلَكُ شَيْءٍ اسْتِدَامَةُ الضَّلَالِ."},
    { text: "أَهْلَكُ شَيْءٍ الشَّقُّ وَالِارْتِيَابُ."},
    { text: "أَهْلَكُ شَيْءٍ الطَّمَعُ."},
    { text: "أَهْلَكُ شَيْءٍ الْهَوَى."},
    { text: "أَمِنْ نَفْسَكَ مَا جَمَحَتْ بِكَ إِلَى مَعَاصِي اللَّهِ."},
    { text: "أَهْنَأُ الْأَقْسَامِ الْقَنَاعَةُ وَصِحَّةُ الْأَجْسَامِ."},
    { text: "أَهْنَأُ الْعَيْشِ اطِّرَاحُ الْكُلَفِ."},
    { text: "أَهْوَنُ شَيْءٍ لَائِمَةُ الْجُهَّالِ."},
    { text: "أَوَائِلُ مَصَادِرِ التَّوْفِيقِ أَوَائِلُ مَوَارِدِ الْحَذَرِ."},
    { text: "أَوْثَقُ سَبَبٍ أَخَذْتَ بِهِ سَبَبٌ بَيْنَكَ وَبَيْنَ اللَّهِ."},
    { text: "أَوْثَقُ عُرَى الْإِيمَانِ الْحُبُّ فِي اللَّهِ وَالْبُغْضُ فِي اللَّهِ."},
    { text: "أَوْجَبُ الْعِلْمِ عَلَيْكَ مَا أَنْتَ مَسْؤُولٌ عَنِ الْعَمَلِ بِهِ."},
    { text: "إِنَّ فِي الْخُمُولِ لَرَاحَةٌ."},
    { text: "إِنَّ فِي الشَّرِّ لَوَقَاحَةٌ."},
    { text: "إِنَّ فِي الْمَوْتِ لَرَاحَةٌ لِمَنْ كَانَ عَبْدَ شَهْوَتِهِ."},
    { text: "إِنْ كُنْتُمْ لَا مَحَالَةَ مُتَنَزِّهِينَ فَتَنَزَّهُوا عَنْ مَعَاصِي الْقُلُوبِ."},
    { text: "إِنَّ مِنْ أَهْلِ الذِّكْرِ أَهْلَ اللَّهِ وَخَاصَّتُهُ."},
    { text: "إِنَّ مِنْ أَهْنَأِ الْعَيْشِ اطِّرَاحَ الْكُلَفِ."},
    { text: "إِنَّ مِنْ إِيَّاكَ وَالْمُجَاهَرَةَ بِالْفُجُورَ."},
    { text: "بِأَصَالَةِ الرَّأْيِ يَقْوَى الْحَزْمُ."},
    { text: "بِإِغَاثَةِ الْمَلْهُوفِ يَكُونُ لَكَ مِنْ عَذَابِ اللَّهِ حِصْنٌ."},
    { text: "بِإِيثَارِ حُبِّ الْعَاجِلَةِ صَارَ مَنْ صَارَ إِلَى سُوءِ الْآجِلَةِ."},
    { text: "بِئْسَ الِاخْتِيَارُ التَّعَوُّضُ بِمَا يَفْنَى عَمَّا يَبْقَى."},
    { text: "بِئْسَ الِاخْتِيَارُ الرِّضَا بِالنَّقْصِ."},
    { text: "بِئْسَ الِاسْتِعْدَادُ الِاسْتِبْدَادُ."},
    { text: "بِئْسَ الْجَارُ جَارُ السُّوءِ."},
    { text: "بِئْسَ الْخَلِيقَةُ الْبُخْلُ."},
    { text: "بِئْسَ الدَّاءُ الْحُمْقُ."},
    { text: "بِئْسَ الدُّخْرُ فِعْلُ الشَّرِّ."},
    { text: "بِئْسَ الرَّجُلُ مَنْ بَاعَ دِينَهُ بِدُنْيَا غَيْرِهِ."},
    { text: "بِئْسَ الرَّفِيقُ الْحِرْصُ."},
    { text: "بِئْسَ الرَّفِيقُ الْحَسُودُ."},
    { text: "بِئْسَ الزَّادُ إِلَى الْمَعَادِ الْعُدْوَانُ عَلَى الْعِبَادِ."},
    { text: "بِئْسَ السَّجِيَّةُ الْغُلُولُ."},
    { text: "بِئْسَ السَّعْيُ التَّفْرِقَةُ بَيْنَ الْأَلِيفَيْنِ."},
    { text: "بِئْسَ السِّيَاسَةُ الْجَوْرُ."},
    { text: "بِئْسَ الشِّيَمُ الْأَمَلُ يُفْنِي الْأَجَلَ وَيُفَوِّتُ الْعَمَلَ."},
    { text: "بِئْسَ الشِّيَمُ الْخُرْقُ."},
    { text: "بِئْسَ الشِّيَمُ النَّمِيمَةُ."},
    { text: "بِئْسَ الصَّدِيقُ الْمَلُولُ."},
    { text: "بِئْسَ الطَّعَامُ الْحَرَامُ."},
    { text: "بِئْسَ الطَّمَعُ الشَّرَهُ."},
    { text: "بِئْسَ الظُّلْمُ ظُلْمُ الْمُسْتَسْلِمِ."},
    { text: "بِئْسَ الْعَادَةُ الْفُضُولُ."},
    { text: "بِئْسَ الْعَشِيرُ الْحَقُودُ."},
    { text: "بِئْسَ الْعَمَلُ الْمَعْصِيَةُ."},
    { text: "بِئْسَ الْغَرِيمُ النَّوْمُ يُفْنِي قَصِيرَ الْعُمْرِ وَيُفَوِّتُ كَثِيرَ الْأَجْرِ."},
    { text: "بِئْسَ الْقَرِينُ الْجَهُولُ."},
    { text: "بِئْسَ الْقَرِينُ الْعَدُوُّ."},
    { text: "بِئْسَ الْقَرِينُ الْغَضَبُ يُبْدِي الْمَعَايِبَ وَيُدْنِي الشَّرَّ وَيُبَاعِدُ الْخَيْرَ."},
    { text: "بِئْسَ الْقُوتُ أَكْلُ مَالِ الْأَيْتَامِ."},
    { text: "بِئْسَ الْكَسْبُ الْحَرَامُ."},
    { text: "بِئْسَ الْمَنْطِقُ الْكَذِبُ."},
    { text: "بِئْسَ النَّسَبُ سُوءُ الْأَدَبِ."},
    { text: "بِئْسَ الْوَجْهُ الْوَقَاحُ."},
    { text: "بِئْسَ قَرِينُ الدِّينِ الطَّمَعُ."},
    { text: "بِئْسَ قَرِينُ الْوَرَعِ الشَّبَعُ."},
    { text: "بِئْسَتِ الدَّارُ الدُّنْيَا."},
    { text: "بِئْسَتِ الْقِلَادَةُ قِلَادَةُ الْآثَامِ."},
    { text: "بِئْسَتِ الْقِلَادَةُ قِلَادَةُ الدَّيْنِ."},
    { text: "بَادِرِ الْبِرَّ فَإِنَّ أَعْمَالَ الْبِرِّ فُرْصَةٌ."},
    { text: "بَادِرِ الْخَيْرَ تَرْشُدْ."},
    { text: "بَادِرِ الطَّاعَةَ تَسْعَدْ."},
    { text: "بَادِرِ الْفُرْصَةَ قَبْلَ أَنْ تَكُونَ غُصَّةً."},
    { text: "بَادِرْ شَبَابَكَ قَبْلَ هَرَمِكَ وَصِحَّتَكَ قَبْلَ سُقْمِكَ."},
    { text: "بَادِرْ غِنَاكَ قَبْلَ فَقْرِكَ وَحَيَاتَكَ قَبْلَ مَوْتِكَ."},
    { text: "بَادِرُوا الْآجَالَ بِأَعْمَالِكُمْ وَابْتَاعُوا مَا يَبْقَى لَكُمْ بِمَا يَزُولُ عَنْكُمْ."},
    { text: "بَادِرُوا الْأَمَلَ وَخَافُوا بَغْتَةَ الْأَجَلِ تُدْرِكُوا أَفْضَلَ الْأَمَلِ."},
    { text: "بَادِرُوا الْأَمَلَ وَسَابِقُوا هُجُومَ الْأَجَلِ فَإِنَّ النَّاسَ يُوشِكُ أَنْ يَنْقَطِعَ بِهِمُ الْأَمَلُ."},
    { text: "بَادِرُوا الْعَمَلَ وَأَكْذِبُوا الْأَمَلَ وَلَاحِظُوا الْأَجَلَ."},
    { text: "بَادِرُوا الْمَوْتَ وَغَمَرَاتِهِ وَمَهِّدُوا لَهُ قَبْلَ حُلُولِهِ."},
    { text: "بَادِرُوا بِأَعْمَالِكُمْ وَسَابِقُوا آجَالَكُمْ فَإِنَّكُمْ مَدِينُونَ بِمَا أَسْلَفْتُمْ."},
    { text: "بَادِرُوا بِأَمْوَالِكُمْ قَبْلَ حُلُولِ آجَالِكُمْ."},
    { text: "بَادِرُوا بِالْعَمَلِ عُمْرًا نَاكِسًا."},
    { text: "بَادِرُوا بِالْعَمَلِ مَرَضًا حَابِسًا وَمَوْتًا خَالِسًا."},
    { text: "بَادِرُوا صَالِحَ الْأَعْمَالِ وَالْخَنَاقُ مُهْمَلٌ وَالرُّوحُ مُرْسَلٌ."},
    { text: "بَادِرُوا فِي فَيْنَةِ الْإِرْشَادِ وَرَاحَةِ الْأَجْسَادِ."},
    { text: "بَادِرُوا فِي مَهَلِ الْبَقِيَّةِ وَأَنْفِ الْمَشِيَّةِ وَانْتِظَارِ التَّوْبَةِ."},
    { text: "بَادِرُوا قَبْلَ أَخْذِ الْعَزِيزِ الْمُقْتَدِرِ."},
    { text: "بَادِرُوا قَبْلَ الرَّوْعِ وَالزُّهُوقِ."},
    { text: "بَادِرُوا قَبْلَ الضَّنْكِ وَالْمَضِيقِ."},
    { text: "بَادِرُوا قَبْلَ قُدُومِ الْغَائِبِ الْمُنْتَظَرِ."},
    { text: "بَادِرُوا وَالْأَبْدَانُ صَحِيحَةٌ وَالْأَلْسُنُ مُطْلَقَةٌ."},
    { text: "بِئْسَ الشِّيَمُ الْأَمَلُ يُفْنِي الْأَجَلَ."},
    { text: "بِئْسَ الصَّدِيقُ الْمُلُوكُ."},
    { text: "بِئْسَ الْغَرِيمُ النَّوْمُ يُفْنِي قَصِيرَ الْعُمْرِ."},
    { text: "بِئْسَ الْقَرِينُ الْغَضَبُ."},
    { text: "بَادِرُوا الْآجَالَ بِأَعْمَالِكُمْ."},
    { text: "بَادِرُوا الْأَمَلَ وَخَافُوا بَغْتَةَ الْأَجَلِ."},
    { text: "بَادِرُوا الْأَمَلَ وَسَابِقُوا هُجُومَ الْأَجَلِ."},
    { text: "بَادِرُوا الْمَوْتَ وَغَمَرَاتِهِ."},
    { text: "بَادِرُوا بِأَعْمَالِكُمْ وَسَابِقُوا آجَالَكُمْ."},
    { text: "بَادِرُوا بِالْعَمَلِ مَرَضًا حَابِسًا."},
    { text: "بَادِرُوا صَالِحَ الْأَعْمَالِ."},
    { text: "بَادِرُوا فِي فَيْنَةِ الْإِرْشَادِ."},
    { text: "بَادِرُوا فِي مَهَلِ الْبَقِيَّةِ وَأَنْفِ الْمَشِيَّةِ."},
    { text: "بَادِرُوا وَالْأَبْدَانُ صَحِيحَةٌ."},
    { text: "بَادِرْ شَبَابَكَ قَبْلَ هَرَمِكَ."},
    { text: "بَادِرْ غِنَاكَ قَبْلَ فَقْرِكَ."},
    { text: "تَجَنَّبُوا الْغِيبَةَ فَإِنَّهَا إِدَامُ كِلَابِ النَّارِ."},
    { text: "تَجَنَّبُوا الْغَدْرَ فَإِنَّهُ مِنْ خَلَائِقِ اللِّئَامِ."},
    { text: "تَجَنَّبُوا الْهَوَى فَإِنَّهُ يَصُدُّ عَنِ الْحَقِّ."},
    { text: "تَحَرَّزُوا مِنَ الْعَجَلَةِ فَإِنَّهَا مَفْسَدَةٌ لِلْأُمُورِ."},
    { text: "تَحَفَّظُوا مِنَ الْغِيبَةِ فَإِنَّهَا تَحْلِقُ الدِّينَ."},
    { text: "تَحَمَّلْ مِنَ الصَّدِيقِ مَا لَا تَحْتَمِلُهُ مِنَ الْعَدُوِّ."},
    { text: "تَخَلَّقُوا بِالْأَخْلَاقِ الْكَرِيمَةِ تَعِشُوا فِي سَعَةٍ."},
    { text: "تَدَاوَوْا مِنَ الْحَسَدِ بِالرِّضَا بِالْمَقْدُورِ."},
    { text: "تَدَبَّرُوا أَمْرَكُمْ قَبْلَ أَنْ يَنْفُذَ الْعُمْرُ."},
    { text: "تَذَكَّرُوا هَادِمَ اللَّذَّاتِ وَمُفَرِّقَ الْجَمَاعَاتِ."},
    { text: "تَرَاحُمُوا تُرْحَمُوا."},
    { text: "تَرْكُ الذَّنْبِ أَهْوَنُ مِنْ طَلَبِ التَّوْبَةِ."},
    { text: "تَرْكُ الْخَطِيئَةِ خَيْرٌ مِنْ طَلَبِ التَّوْبَةِ."},
    { text: "تَرْكُ الدُّنْيَا رَاحَةُ الْقَلْبِ."},
    { text: "تَرْكُ الشَّهَوَاتِ عُنْوَانُ الْعَقْلِ."},
    { text: "تَرْكُ الظُّلْمِ حَيَاةُ الْعَدْلِ."},
    { text: "تَرْكُ الْغَيْظِ رَاحَةُ النَّفْسِ."},
    { text: "تَرْكُ الْكِبْرِ زِينَةُ الْعَالِمِ."},
    { text: "تَرْكُ الْوِزْرِ أَحْسَنُ مِنَ الِاعْتِذَارِ."},
    { text: "تَزَيَّنُوا بِالْحِلْمِ تَسُودُوا."},
    { text: "تَزَيَّنُوا بِالْعِلْمِ تُعْرَفُوا."},
    { text: "تَزَيَّنُوا بِالصَّبْرِ تُقْهَرُوا الْأَعْدَاءَ."},
    { text: "تَسَلَّوْا بِذِكْرِ اللَّهِ فَإِنَّهُ أَفْضَلُ التَّسْلِيَةِ."},
    { text: "تَصَدَّقُوا بِأَمْوَالِكُمْ تُثْمِرْ لَكُمْ."},
    { text: "تَصَفَّوْا مِنَ الدَّنَسِ تَصْفُ لَكُمُ الْحَيَاةُ."},
    { text: "تَصَافَوْا فِي اللَّهِ تَسْمُ أَرْوَاحُكُمْ."},
    { text: "تَصَبَّرُوا فَإِنَّ الصَّبْرَ عُقْبَاهُ خَيْرٌ."},
    { text: "تَصَبَّرُوا عَلَى الْمَكَارِهِ تَنَالُوا الْمَعَالِيَ."},
    { text: "تَعَاوَنُوا عَلَى الْبِرِّ وَالتَّقْوَى."},
    { text: "تَعَلَّمُوا الْعِلْمَ فَإِنَّهُ يَرْفَعُ الْوَضِيعَ."},
    { text: "تَعَلَّمُوا الْحِكْمَةَ وَلَوْ مِنَ الْمُشْرِكِينَ."},
    { text: "تَعَوَّذُوا بِاللَّهِ مِنْ شَرِّ النَّفْسِ."},
    { text: "تَعَوَّذُوا بِاللَّهِ مِنْ غَلَبَةِ الدَّيْنِ."},
    { text: "تَفَكَّرُوا فِي خَلْقِ السَّمَاوَاتِ وَالْأَرْضِ."},
    { text: "تَفَكَّرُوا فِي عَوَاقِبِ الْأُمُورِ."},
    { text: "تَفَقَّهُوا فِي دِينِ اللَّهِ فَإِنَّ الْفِقْهَ نُورُ الْقَلْبِ."},
    { text: "تَفَقَّرُوا إِلَى اللَّهِ تَعَالَى تَعِزُّوا."},
    { text: "تَقَرَّبُوا إِلَى اللَّهِ بِأَدَاءِ الْفَرَائِضِ."},
    { text: "تَقَرَّبُوا إِلَى اللَّهِ بِالتَّطَوُّعِ بِالنَّوَافِلِ."},
    { text: "تَقَوَّوْا عَلَى طَاعَةِ اللَّهِ بِالْوَرَعِ."},
    { text: "تَقْوَى اللَّهِ عِمَادُ الْإِيمَانِ."},
    { text: "تَقْوَى اللَّهِ مِفْتَاحُ كُلِّ خَيْرٍ."},
    { text: "تَقْوَى اللَّهِ خَيْرُ زَادٍ."},
    { text: "تَقْوَى اللَّهِ حِرْزٌ لَا يَخِيبُ مَنْ لَجَأَ إِلَيْهِ."},
    { text: "تَقْوَى اللَّهِ تَقْطَعُ دَابِرَ الشَّرِّ."},
    { text: "تَقْوَى اللَّهِ مِعْرَاجُ الْأَبْرَارِ."},
    { text: "تَقْوَى اللَّهِ تُنَوِّرُ الْقَلْبَ."},
    { text: "تَقْوَى اللَّهِ تُنْجِي مِنَ الْهَلَكَةِ."},
    { text: "تَكَلَّمُوا تُعْرَفُوا فَإِنَّ الْمَرْءَ مَخْبُوءٌ تَحْتَ لِسَانِهِ."},
    { text: "تَكَلَّمُوا بِالْخَيْرِ تَغْنَمُوا."},
    { text: "تَكَلَّمُوا بِالْحِكْمَةِ تَصِحَّ قُلُوبُكُمْ."},
    { text: "تَمَسَّكُوا بِالْكِتَابِ فَإِنَّهُ عِصْمَةٌ."},
    { text: "تَمَسَّكُوا بِالسُّنَّةِ فَإِنَّهَا نُورُ الْأُمَّةِ."},
    { text: "تَمَسَّكُوا بِالْجَمَاعَةِ فَإِنَّ يَدَ اللَّهِ مَعَ الْجَمَاعَةِ."},
    { text: "تَمَسَّكُوا بِالْوَفَاءِ فَإِنَّهُ دَلِيلُ الْوَفَاءِ."},
    { text: "تَمَسَّكُوا بِالْعِفَّةِ فَإِنَّهَا زِينَةُ الْإِيمَانِ."},
    { text: "تَمَسَّكُوا بِالْحَيَاءِ فَإِنَّهُ شُعْبَةٌ مِنَ الْإِيمَانِ."},
    { text: "تَنَزَّهُوا عَنِ الْبَاطِلِ تَعِشُوا فِي حَقٍّ."},
    { text: "تَنَزَّهُوا عَنِ السُّوءِ تَعِشُوا فِي خَيْرٍ."},
    { text: "تَنَزَّهُوا عَنِ الْمَحَارِمِ تَنْعَمُوا."},
    { text: "تَنَزَّهُوا عَنِ النَّقَائِصِ تَسْمُ نُفُوسُكُمْ."},
    { text: "تَنَزَّهُوا عَنِ الْكِبْرِ تَسْلَمْ نُفُوسُكُمْ."},
    { text: "تَوَاضَعُوا لِلَّهِ يَرْفَعْكُمْ."},
    { text: "تَوَاضَعُوا لِلنَّاسِ يُحِبُّوكُمْ."},
    { text: "تَوَاضَعُوا لِلْحَقِّ تَهْتَدُوا."},
    { text: "تَوَاضَعُوا لِلْعِلْمِ تَرْشُدُوا."},
    { text: "تَوَاضَعُوا فَإِنَّ التَّوَاضُعَ أَشْرَفُ الْخَلَائِقِ."},
    { text: "تَوَكَّلُوا عَلَى اللَّهِ فَإِنَّهُ كَفَى مَنْ تَوَكَّلَ عَلَيْهِ."},
    { text: "تَوَكَّلُوا عَلَى اللَّهِ فِي كُلِّ أُمُورِكُمْ."},
    { text: "تَوَكَّلُوا عَلَى اللَّهِ وَفَوِّضُوا أَمْرَكُمْ إِلَيْهِ."},
    { text: "تَهَادَوْا تَحَابُّوا."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُذْهِبُ الضَّغَائِنَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُقَرِّبُ الْمَوَدَّةَ."},
    { text: "تَهَادَوْا تَزِيدُوا فِي الْحُبِّ."},
    { text: "تَهَادَوْا تَسْتَمِيلُوا الْقُلُوبَ."},
    { text: "تَهَادَوْا تُوَرِّثُوا الْمَحَبَّةَ."},
    { text: "تَهَادَوْا تَجْلِبُوا الْأُلْفَةَ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا الصِّلَةَ."},
    { text: "تَهَادَوْا تَقْوَى الْأُخُوَّةُ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَمْحُو الضَّغِينَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُطَفِّئُ الْغَضَبَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْكَرَامَةِ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُلِينُ الْقُلُوبَ."},
    { text: "تَهَادَوْا تَسْتَدِيمُوا الْمَحَبَّةَ."},
    { text: "تَهَادَوْا تَجْلِبُوا الْوُدَّ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُلْقِي الْمَوَدَّةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ السُّرُورَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُقَوِّي الصِّلَةَ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْخَيْرَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الرَّحْمَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْقُرْبِ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الْبَرَكَةَ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا الْوُدَّ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي النُّفُوسَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُلْقِي السَّكِينَةَ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْيُسْرَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الْبَغْضَاءَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الصِّدْقَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْإِخَاءِ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْإِحْسَانَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصْلِحُ الْقُلُوبَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ النَّجَاحَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْوِفَاقِ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا الْبِرَّ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الْغِلَّ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الْأُنْسَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْأُلْفَةِ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا السَّعَادَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي الْوُدَّ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ النِّزَاعَ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا السَّلَامَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الْفَرَحَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْإِخْلَاصِ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْعَطْفَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي الصَّدْرَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الْجَفَاءَ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا الْهَنَاءَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الْحُبَّ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الصِّلَةِ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْبَهْجَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي الْبَاطِنَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الْخُصُومَةَ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا التَّصَافِيَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الْمَوَدَّةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْأُخُوَّةِ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْوِفَاقَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي الْوُجْدَانَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الْعَدَاوَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الصَّفَاءَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الصَّدَاقَةِ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْبَرَكَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي النَّظَرَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الْقَطِيعَةَ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا التَّسَامُحَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الرِّضَا."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْإِيقَانِ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْوَفَاءَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي الْقَلْبَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الْعِتَابَ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا الْمَوَدَّةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ الْخَيْرَ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْأُلْفَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي النَّفْسَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الْخِلَافَ."},
    { text: "تَهَادَوْا تَسْتَذِيعُوا الْبَهْجَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَجْلِبُ السَّكِينَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الْوُدِّ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الْإِخَاءَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي الْأُخُوَّةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تَقْطَعُ الشَّحْنَاءَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُزِيدُ فِي الصِّدْقِ."},
    { text: "تَهَادَوْا تَسْتَجْلِبُوا الصَّدَاقَةَ."},
    { text: "تَهَادَوْا فَإِنَّ الْهَدِيَّةَ تُصَفِّي الْقُلُوبَ."},
    { text: "الْأَيَّامُ تُفِيدُ التَّجَارِبَ."},
    { text: "الْأَيَّامُ تُوضِحُ السَّرَائِرَ الْكَامِنَةَ."},
    { text: "الْأَيَّامُ صَحَائِفُ آجَالِكُمْ فَخَلِّدُوهَا أَحْسَنَ أَعْمَالِكُمْ."},
    { text: "إِئْتَمِرُوا بِالْمَعْرُوفِ وَأْمُرُوا بِهِ وَتَنَاهَوْا عَنِ الْمُنْكَرِ وَانْهَوْا عَنْهُ."},
    { text: "الْإِيثَارُ أَحْسَنُ الْإِحْسَانِ وَأَعْلَى مَرَاتِبِ الْإِيمَانِ."},
    { text: "الْإِيثَارُ أَشْرَفُ الْإِحْسَانِ."},
    { text: "الْإِيثَارُ أَشْرَفُ الْكَرَمِ."},
    { text: "الْإِيثَارُ أَعْلَى الْإِيمَانِ."},
    { text: "الْإِيثَارُ أَعْلَى مَرَاتِبِ الْكَرَمِ وَأَفْضَلُ الشِّيَمِ."},
    { text: "الْإِيثَارُ أَعْلَى الْمَكَارِمِ."},
    { text: "الْإِيثَارُ أَفْضَلُ الْإِحْسَانِ."},
    { text: "الْإِيثَارُ أَفْضَلُ عِبَادَةٍ وَأَجَلُّ سِيَادَةٍ."},
    { text: "إِيثَارُ الدَّعَةِ يَقْطَعُ أَسْبَابَ الْمَنْفَعَةِ."},
    { text: "الْإِيثَارُ سَجِيَّةُ الْأَبْرَارِ وَشِيمَةُ الْأَخْيَارِ."},
    { text: "الْإِيثَارُ شِيمَةُ الْأَبْرَارِ."},
    { text: "الْإِيثَارُ غَايَةُ الْإِحْسَانِ."},
    { text: "الْإِيثَارُ فَضِيلَةٌ."},
    { text: "أَيْسَرُ الرِّيَاءِ الشِّرْكُ."},
    { text: "أَيَسُرُّكَ أَنْ تَكُونَ مِنْ حِزْبِ اللَّهِ الْغَالِبِينَ؟ اتَّقِ اللَّهَ سُبْحَانَهُ."},
    { text: "أَيَسُرُّكَ أَنْ تَلْقَى اللَّهَ غَدًا فِي الْقِيَامَةِ وَهُوَ عَلَيْكَ رَاضٍ؟"},
    { text: "أَيْقِنْ تُفْلِحْ."},
    { text: "الْإِيمَانُ إِخْلَاصُ الْعَمَلِ."},
    { text: "الْإِيمَانُ أَعْلَى غَايَةٍ."},
    { text: "الْإِيمَانُ أَفْضَلُ الْأَمَانَتَيْنِ."},
    { text: "الْإِيمَانُ أَمَانٌ."},
    { text: "الْإِيمَانُ بَرِيءٌ مِنَ الْحَسَدِ."},
    { text: "الْإِيمَانُ بَرِيءٌ مِنَ النِّفَاقِ."},
    { text: "الْإِيمَانُ شَجَرَةٌ أَصْلُهَا الْيَقِينُ."},
    { text: "الْإِيمَانُ شِهَابٌ لَا يَخْبُو."},
    { text: "الْإِيمَانُ شَفِيعٌ مُنْجِحٌ."},
    { text: "الْإِيمَانُ صَبْرٌ فِي الْبَلَاءِ وَشُكْرٌ فِي الرَّخَاءِ."},
    { text: "الْإِيمَانُ قَوْلٌ بِاللِّسَانِ وَعَمَلٌ بِالْأَرْكَانِ."},
    { text: "الْإِيمَانُ نَجَاةٌ."},
    { text: "الْإِيمَانُ هُوَ الْإِخْلَاصُ وَالْيَقِينُ."},
    { text: "الْإِيمَانُ وَاضِحُ الْوَلَائِجِ."},
    { text: "الْإِيمَانُ وَالْعَمَلُ أَخَوَانِ تَوْأَمَانِ."},
    { text: "الْإِيمَانُ وَالْعَمَلُ أَخَوَانِ تَوْأَمَانِ لَا يَفْتَرِقَانِ."},
    { text: "أَيْنَ الْأَبْصَارُ اللَّامِحَةُ مَنَارَ التُّقَى."},
    { text: "أَيْنَ أَهْلُ مَدَائِنِ الرَّسِّ الَّذِينَ قَتَلُوا النَّبِيِّينَ."},
    { text: "أَيْنَ بَنُو الْأَصْفَرِ وَالْفَرَاعِنَةُ."},
    { text: "أَيْنَ تَتِيهُ بِكُمُ الْغَيَاهِبُ وَتَخْدَعُكُمُ الْكَاذِبَةُ."},
    { text: "أَيْنَ تَتِيهُونَ وَمِنْ أَيْنَ تُؤْتَوْنَ وَأَنَّى تُؤْفَكُونَ."},
    { text: "أَيْنَ تَخْتَدِعُكُمْ كَوَاذِبُ الْآمَالِ."},
    { text: "أَيْنَ تَذْهَبُ بِكُمُ الْمَذَاهِبُ."},
    { text: "أَيْنَ تَضِلُّ عُقُولُكُمْ وَتَزِيغُ نُفُوسُكُمْ."},
    { text: "أَيْنَ الْجَبَابِرَةُ وَأَبْنَاءُ الْجَبَابِرَةِ."},
    { text: "أَيْنَ الَّذِينَ أَخْلَصُوا أَعْمَالَهُمُ لِلَّهِ."},
    { text: "أَيْنَ الَّذِينَ اسْتَذَلُّوا الْأَعْدَاءَ وَمَلَكُوا نَوَاصِيَهَا."},
    { text: "أَيْنَ الَّذِينَ بَلَغُوا مِنَ الدُّنْيَا أَقَاصِيَ الْهِمَمِ."},
    { text: "أَيْنَ الَّذِينَ دَانَتْ لَهُمُ الْأُمَمُ."},
    { text: "أَيْنَ الَّذِينَ زَعَمُوا أَنَّهُمُ الرَّاسِخُونَ فِي الْعِلْمِ."},
    { text: "أَيْنَ الَّذِينَ شَيَّدُوا الْمَمَالِكَ وَمَهَّدُوا الْمَسَالِكَ."},
    { text: "أَيْنَ الَّذِينَ عَسْكَرُوا الْعَسَاكِرَ وَمَدَّنُوا الْمَدَائِنَ."},
    { text: "أَيْنَ الَّذِينَ قَالُوا مَنْ أَشَدُّ مِنَّا قُوَّةً."},
    { text: "أَيْنَ الَّذِينَ كَانُوا أَحْسَنَ آثَارًا وَأَعْدَلَ أَفْعَالًا."},
    { text: "أَيْنَ الَّذِينَ مَلَكُوا مِنَ الدُّنْيَا أَقَاصِيَهَا."},
    { text: "أَيْنَ الَّذِينَ هَزَمُوا الْجُيُوشَ."},
    { text: "أَيْنَ الْقُلُوبُ الَّتِي وُهِبَتْ لِلَّهِ."},
    { text: "أَيْنَ كِسْرَى وَقَيْصَرُ وَتُبَّعُ وَحِمْيَرُ."},
    { text: "أَيْنَ الْمُلُوكُ وَالْأَكَاسِرَةُ."},
    { text: "أَيْنَ مَنِ ادَّخَرَ وَاعْتَقَدَ وَجَمَعَ الْمَالَ."},
    { text: "أَيْنَ مَنْ بَنَى وَشَيَّدَ وَفَرَسَ وَمَهَّدَ."},
    { text: "أَيْنَ مَنْ جَمَعَ فَأَكْثَرَ وَاحْتَقَبَ وَاعْتَقَدَ."},
    { text: "أَيْنَ مَنْ كَانَ أَعَدَّ عَتِيدًا وَأَكْنَفَ جُنُودًا."},
    { text: "أَيْنَ مَنْ سَعَى وَاجْتَهَدَ وَأَعَدَّ وَاحْتَشَدَ."},
    { text: "أَيْنَ مَنْ كَانَ أَطْوَلَ مِنْكُمْ أَعْمَارًا وَأَعْظَمَ آثَارًا."},
    { text: "أَيْنَ مَنِ ادَّخَرَ وَاعْتَقَدَ وَجَمَعَ الْمَالَ عَلَى الْمَالِ فَأَكْثَرَ."},
    { text: "أَيْنَ مَنْ بَنَى وَشَيَّدَ وَفَرَسَ وَمَهَّدَ وَجَمَعَ وَعَدَّدَ."},
    { text: "أَيْنَ الْمُوقِنُونَ الَّذِينَ خَلَعُوا سَرَابِيلَ الْهَوَى."},
    { text: "أَيْنَ يَغُرُّكُمْ سَرَابُ الْآمَالِ."},
    { text: "بِئْسَ الْعَادَةُ النِّفَاقُ."},
    { text: "بِئْسَ الْخُلُقُ الْكِذْبُ."},
    { text: "بِئْسَ الْقَرِينُ الشَّرَهُ."},
    { text: "بِئْسَ الْقَرِينُ الْحَسَدُ."},
    { text: "بِئْسَ الزَّادُ لِلْمَعَادِ الْبَغْيُ."},
    { text: "بِئْسَ الْقَرِينُ الْغِيبَةُ."},
    { text: "بِئْسَ الْخُلُقُ الْخِيَانَةُ."},
    { text: "بِئْسَ الْقَرِينُ الْعَجَلَةُ."},
    { text: "بِئْسَ الشِّيَمُ الطَّمَعُ."},
    { text: "بِئْسَ الْعَمَلُ الْإِسْرَافُ."},
    { text: "بَادِرُوا بِالْأَعْمَالِ الْخَيْرَاتِ."},
    { text: "بَادِرُوا بِالصَّدَقَةِ تَدْفَعُوا الْبَلَاءَ."},
    { text: "بَادِرُوا بِالْعِلْمِ قَبْلَ ذَهَابِهِ."},
    { text: "بَادِرُوا بِالتَّوْبَةِ قَبْلَ الْمَوْتِ."},
    { text: "بَادِرُوا بِالصِّلَةِ قَبْلَ الْقَطِيعَةِ."},
    { text: "بَادِرُوا بِالْإِحْسَانِ قَبْلَ الْإِسَاءَةِ."},
    { text: "بَادِرُوا بِالْعَدْلِ قَبْلَ الْجَوْرِ."},
    { text: "بَادِرُوا بِالْوَفَاءِ قَبْلَ الْغَدْرِ."},
    { text: "بَادِرُوا بِالْحِلْمِ قَبْلَ الْغَضَبِ."},
    { text: "بَادِرُوا بِالتَّوَاضُعِ قَبْلَ الْكِبْرِ."},
    { text: "بِالْحِلْمِ تَنْكَسِرُ حِدَّةُ الْغَضَبِ."},
    { text: "بِالْحِلْمِ يُقْهَرُ الْعَدُوُّ."},
    { text: "بِالْحِلْمِ تُسَادُ الْأُمَمُ."},
    { text: "بِالْحِلْمِ يَعْلُو الْقَدْرُ."},
    { text: "بِالْحِلْمِ تَعْتَدِلُ الْأُمُورُ."},
    { text: "بِالْحِلْمِ تَصْفُو الْقُلُوبُ."},
    { text: "بِالْحِلْمِ يَزُولُ الْحِقْدُ."},
    { text: "بِالْحِلْمِ يَحْصُلُ الْوَقَارُ."},
    { text: "بِالْحِلْمِ تُرْفَعُ الدَّرَجَاتُ."},
    { text: "بِالْحِلْمِ يَكُونُ النَّجَاحُ."},
    { text: "بِالصَّبْرِ تُنَالُ الْمَعَالِي."},
    { text: "بِالصَّبْرِ تُهْضَمُ الشَّدَائِدُ."},
    { text: "بِالصَّبْرِ يُنَالُ الظَّفَرُ."},
    { text: "بِالصَّبْرِ تُصْلَحُ الْأُمُورُ."},
    { text: "بِالصَّبْرِ يَنْكَشِفُ الْبَلَاءُ."},
    { text: "بِالصَّبْرِ تَثْبُتُ الْقُلُوبُ."},
    { text: "بِالصَّبْرِ يُدْرَكُ الْأَمَلُ."},
    { text: "بِالصَّبْرِ تُقْهَرُ الْعَوَاقِبُ."},
    { text: "بِالصَّبْرِ تَعِزُّ النُّفُوسُ."},
    { text: "بِالصَّبْرِ يُنَالُ الْخَيْرُ."},
    { text: "بِالتَّقْوَى يُنَالُ النَّجَاةُ."},
    { text: "بِالتَّقْوَى يَعْلُو الْمُؤْمِنُ."},
    { text: "بِالتَّقْوَى يَفُوزُ الْعِبَادُ."},
    { text: "بِالتَّقْوَى يُصْلِحُ الْعَمَلُ."},
    { text: "بِالتَّقْوَى تَدْفَعُ الشَّدَائِدُ."},
    { text: "بِالتَّقْوَى يُقْبَلُ الدُّعَاءُ."},
    { text: "بِالتَّقْوَى يُنَالُ رِضَا اللَّهِ."},

    { text: "أَحْسَنُ السَّنَاءِ الْخُلُقُ السَّجِيحُ." },
    { text: "أَحْسِنِ الْعِشْرَةَ وَاصْبِرْ عَلَى الْعُشْرَةِ وَأَنْصِفْ مَعَ الْقُدْرَةِ." },
    { text: "أَحْسَنُ الْكَلَامِ مَا زَانَهُ حُسْنُ النِّظَامِ وَفَهِمَهُ الْخَاصُّ وَالْعَامُّ." },
    { text: "أَحْسَنُ الْمَقَالِ مَا صَدَّقَهُ الْفِعَالُ." },
    { text: "أَحْسَنُ الْمَكَارِمِ عَفْوُ الْمُقْتَدِرِ وَجُودُ الْمُفْتَقِرِ." },
    { text: "أَحْسَنُ الْمُلُوكِ حَالًا مَنْ حَسُنَ عَيْشُ النَّاسِ فِي عَيْشِهِ وَعَمَّ رَعِيَّتَهُ بِعَدْلِهِ." },
    { text: "أَحْسَنُ النَّاسِ حَالًا فِي النِّعَمِ مَنِ اسْتَدَامَ حَاضِرَهَا بِالشُّكْرِ وَارْتَجَعَ فَائِتَهَا بِالصَّبْرِ." },
    { text: "أَحْسِنُوا تِلَاوَةَ الْقُرْآنِ فَإِنَّهُ أَحْسَنُ الْقَصَصِ وَشِفَاءُ الصُّدُورِ." },
    { text: "أَحْسِنُوا جِوَارَ نِعَمِ الدِّينِ وَالدُّنْيَا بِالشُّكْرِ لِمَنْ دَلَّكُمْ عَلَيْهَا." },
    { text: "إِحْفَظْ عُمْرَكَ مِنَ التَّضْيِيعِ لَهُ فِي غَيْرِ الْعِبَادَةِ وَالطَّاعَاتِ." },
    { text: "أَحَقُّ النَّاسِ أَنْ يُحْذَرَ السُّلْطَانُ الْجَائِرُ وَالْعَدُوُّ الْقَادِرُ وَالصَّدِيقُ الْغَادِرُ." },
    { text: "أَحَقُّ النَّاسِ بِالْإِحْسَانِ مَنْ أَحْسَنَ اللَّهُ إِلَيْهِ وَبَسَطَ بِالْقُدْرَةِ يَدَيْهِ." },
    { text: "أَحَقُّ مَنْ أَطَعْتَهُ مَنْ أَمَرَكَ بِالتُّقَى وَنَهَاكَ عَنِ الْهَوَى." },
    { text: "أَحَقُّ مَنْ تُطِيعُهُ مَنْ لَا تَجِدُ مِنْهُ بُدًّا وَلَا تَسْتَطِيعُ لِأَمْرِهِ رَدًّا." },
    { text: "أَحَقُّ النَّاسِ بِزِيَادَةِ النِّعْمَةِ أَشْكَرُهُمْ لِمَا أُعْطِيَ مِنْهَا." },
    { text: "أَحْمَدُ الْعِلْمِ عَاقِبَةً مَا زَادَ فِي عَمَلِكَ فِي الْعَاجِلِ وَأَزْلَفَكَ فِي الْآجِلِ." },
    { text: "الْأَحْمَقُ إِذَا تَكَلَّمَ بِكَلِمَةٍ أَتْبَعَهَا خُلُقًا." },
    { text: "الْأَحْمَقُ غَرِيبٌ فِي بَلْدَتِهِ مُهَانٌ بَيْنَ أَعِزَّتِهِ." },
    { text: "الْأَحْمَقُ لَا يَحْسُنُ بِالْهَوَانِ وَلَا يَنْفَكُّ عَنْ نَقْصٍ وَخُسْرَانٍ." },
    { text: "احْمِلْ نَفْسَكَ عِنْدَ شِدَّةِ أَخِيكَ عَلَى اللِّينِ." },
    { text: "احْمِلْ نَفْسَكَ مَعَ أَخِيكَ عِنْدَ صَرْمِهِ عَلَى الصِّلَةِ." },
    { text: "أَحْيِ قَلْبَكَ بِالْمَوْعِظَةِ وَأَمِتْهُ بِالزَّهَادَةِ." },
    { text: "أَحْيُوا الْمَعْرُوفَ بِإِمَاتَتِهِ فَإِنَّ الْمِنَّةَ تَهْدِمُ الصَّنِيعَةَ." },
    { text: "إِخْتَرْ مِنْ كُلِّ شَيْءٍ جَدِيدَهُ وَمِنَ الْإِخْوَانِ أَقْدَمَهُمْ." },
    { text: "أَخْرِجْ مِنْ مَالِكَ الْحُقُوقَ وَأَشْرِكْ فِيهِ الصَّدِيقَ." },
    { text: "أَخْرِجُوا الدُّنْيَا مِنْ قُلُوبِكُمْ قَبْلَ أَنْ تَخْرُجَ مِنْهَا أَجْسَادُكُمْ." },
    { text: "أُخْزُنْ لِسَانَكَ كَمَا تَخْزُنُ ذَهَبَكَ وَوَرِقَكَ." },
    { text: "الْإِخْلَاصُ خَطَرٌ عَظِيمٌ." },
    { text: "الْإِخْلَاصُ غَايَةٌ." },
    { text: "الْإِخْوَانُ جَلَاءُ الْهُمُومِ وَالْأَحْزَانِ." },
    { text: "الْإِخْوَانُ زِينَةٌ فِي الرَّخَاءِ وَعُدَّةٌ فِي الْبَلَاءِ." },
    { text: "إِخْوَانُ الصِّدْقِ زِينَةٌ فِي السَّرَّاءِ وَعُدَّةٌ فِي الضَّرَّاءِ." },
    { text: "إِدْمَانُ تَحَوُّلِ الْمَغَارِمِ يُوجِبُ الْجَلَالَةَ." },
    { text: "إِدْمَانُ الشَّبَعِ يُورِثُ أَنْوَاعَ الْوَجَعِ." },
    { text: "أَدْوَأُ الدَّاءِ الصَّلَفُ." },
    { text: "إِذَا أَتَتْكَ الْمِحَنُ فَاقْعُدْ لَهَا." },
    { text: "إِذَا أَحَبَّ اللَّهُ عَبْدًا أَلْهَمَهُ رُشْدَهُ." },
    { text: "إِذَا أَحَبَّ اللَّهُ عَبْدًا بَغَّضَ إِلَيْهِ الْمَالَ." },
    { text: "إِذَا أَحَبَّ اللَّهُ عَبْدًا رَزَقَهُ قَلْبًا سَلِيمًا." },
    { text: "إِذَا أَحْبَبْتَ فَلَا تُكْثِرْ." },
    { text: "إِذَا أَرَادَ أَحَدُكُمْ أَنْ لَا يَسْأَلَ اللَّهَ شَيْئًا إِلَّا أَعْطَاهُ فَلْيَيْأَسْ مِنَ النَّاسِ." },
    { text: "إِذَا أَرَادَ اللَّهُ بِعَبْدٍ خَيْرًا أَلْهَمَهُ الِاقْتِصَادَ." },
    { text: "إِذَا أَرَادَ اللَّهُ سُبْحَانَهُ إِزَالَةَ نِعْمَةٍ عَنْ عَبْدٍ كَانَ أَوَّلَ مَا يُغَيِّرُ مِنْهُ عَقْلَهُ." },
    { text: "أَقْرَبُ الْعِبَادِ إِلَى اللَّهِ تَعَالَى أَقْوَلُهُمْ لِلْحَقِّ وَإِنْ كَانَ عَلَيْهِ." },
    { text: "أَقْرَبُ النِّيَّاتِ بِالنَّجَاحِ أَعْوَدُهَا بِالصَّلَاحِ." },
    { text: "الْأَمَانِيُّ تُعْمِي عُيُونِ الْبَصَائِرِ." },
    { text: "الْعِلْمُ وِرَاثَةٌ كَرِيمَةٌ." },
    { text: "الْأَدَبُ خَيْرُ مِيرَاثٍ." },
    { text: "الْحِلْمُ غِطَاءٌ سَاتِرٌ." },
    { text: "الْعَقْلُ حُسَامٌ قَاطِعٌ." },
    { text: "الْحَسَدُ نَارٌ لَا تَخْمُدُ." },
    { text: "الْكِبْرُ رَدَاءُ اللَّهِ." },
    { text: "الظُّلْمُ مَجْلَبَةُ النِّقَمِ." },
    { text: "الْعَدْلُ قِوَامُ الرَّعِيَّةِ." },
    { text: "الْغِيبَةُ جُهْدُ الْعَاجِزِ." },
    { text: "الْفَضِيلَةُ حِرْصٌ عَلَى الْخَيْرِ." },
    { text: "الْقَنَاعَةُ كَنْزٌ لَا يَفْنَى." },
    { text: "الصَّبْرُ ظَفَرٌ." },
    { text: "الشُّكْرُ زِيَادَةٌ." },
    { text: "الْخِيَانَةُ نِفَاقٌ." },
    { text: "الصِّدْقُ أَمَانَةٌ." },
    { text: "الْكَذِبُ خِيَانَةٌ." },
    { text: "الْحَيَاءُ جَمَالٌ." },
    { text: "الْعِفَّةُ صِيَانَةٌ." },
    { text: "الرِّفْقُ مِفْتَاحُ النَّجَاحِ." },
    { text: "الْوَفَاءُ دَلِيلُ الْوَفَاءِ." },
    { text: "الْحِلْمُ أَوْسَعُ الْأَخْلَاقِ." },
    { text: "الْجُودُ سِيَادَةٌ." },
    { text: "السَّخَاءُ مَحَبَّةٌ." },
    { text: "الْبُخْلُ عَارٌ." },
    { text: "الشَّجَاعَةُ عِزٌّ." },
    { text: "الْجُبْنُ مَنْقَصَةٌ." },
    { text: "الْأَدَبُ زِينَةٌ." },
    { text: "الْعِلْمُ نُورٌ." },
    { text: "الْجَهْلُ ظُلْمَةٌ." },
    { text: "الْحِكْمَةُ ضَالَّةُ الْمُؤْمِنِ." },
    { text: "التَّوَاضُعُ رِفْعَةٌ." },
    { text: "الْخُيَلَاءُ ضَعَةٌ." },
    { text: "الْعَجَلَةُ نَدَمٌ." },
    { text: "التَّأَنِّي سَلَامَةٌ." },
    { text: "الْحَزْمُ ظَفَرٌ." },
    { text: "الْغَفْلَةُ خُسْرَانٌ." },
    { text: "الِانْتِبَاهُ غَنِيمَةٌ." },
    { text: "الْمَوَدَّةُ قُرْبَى." },
    { text: "الْعَدَاوَةُ بُعْدٌ." },
    { text: "الْإِخْلَاصُ سِرٌّ." },
    { text: "الرِّيَاءُ شِرْكٌ." },
    { text: "التَّقْوَى عِصْمَةٌ." },
    { text: "الْفُجُورُ مَعْصِيَةٌ." },
    { text: "الْيَقِينُ طُمَأْنِينَةٌ." },
    { text: "الشَّكُّ حَيْرَةٌ." },
    { text: "الْعَمَلُ نَجَاةٌ." },
    { text: "التَّسْوِيفُ هَلَاكٌ." },
    { text: "الْفِكْرُ مِرْآةٌ." },
    { text: "الْهَوَى مَعْمًى." },
    { text: "الْعَقْلُ نُورٌ." },
    { text: "الْحَقُّ سُلْطَانٌ." },
    { text: "الْبَاطِلُ جُدْرَانٌ." },
    { text: "الْوَقَارُ زِينَةٌ." },
    { text: "الْخِفَّةُ مَنْقَصَةٌ." },
    { text: "الْأَمَلُ غُرُورٌ." },
    { text: "الْأَجَلُ حَتْمٌ." },
    { text: "الْغِنَى كِفَايَةٌ." },
    { text: "الْفَقْرُ بَلَاءٌ." },
    { text: "الرِّضَا رَاحَةٌ." },
    { text: "السَّخَطُ عَذَابٌ." },
    { text: "التَّعَلُّمُ رِفْعَةٌ." },
    { text: "التَّعْلِيمُ هِدَايَةٌ." },
    { text: "الْإِرْشَادُ نُورٌ." },
    { text: "الِاهْتِدَاءُ نَجَاةٌ." },
    { text: "الْهَوَى سُمٌّ." },
    { text: "الْعَقْلُ مِيزَانٌ." },
    { text: "الْحِكْمَةُ حَيَاةٌ." },
    { text: "الْجَهْلُ مَمَاتٌ." },
    { text: "الْعَدْلُ حَيَاةٌ." },
    { text: "الظُّلْمُ مَمَاتٌ." },
    { text: "الْحِلْمُ نُورٌ." },
    { text: "الْغَضَبُ ظُلْمَةٌ." },
    { text: "الْإِخْلَاصُ حَيَاةٌ." },
    { text: "الرِّيَاءُ مَمَاتٌ." },
    { text: "التَّقْوَى حَيَاةٌ." },
    { text: "الْفُجُورُ مَمَاتٌ." },
    { text: "الْيَقِينُ حَيَاةٌ." },
    { text: "الشَّكُّ مَمَاتٌ." },
    { text: "الْعَمَلُ حَيَاةٌ." },
    { text: "التَّسْوِيفُ مَمَاتٌ." },
    { text: "الْفِكْرُ حَيَاةٌ." },
    { text: "الْهَوَى مَمَاتٌ." },
    { text: "الْعَقْلُ حَيَاةٌ." },
    { text: "الْحَقُّ حَيَاةٌ." },
    { text: "الْبَاطِلُ مَمَاتٌ." },
    { text: "الْوَقَارُ حَيَاةٌ." },
    { text: "الْخِفَّةُ مَمَاتٌ." },
    { text: "الْأَمَلُ حَيَاةٌ." },
    { text: "الْأَجَلُ مَمَاتٌ." },
    { text: "الْغِنَى حَيَاةٌ." },
    { text: "الْفَقْرُ مَمَاتٌ." },
    { text: "الرِّضَا حَيَاةٌ." },
    { text: "السَّخَطُ مَمَاتٌ." },
    { text: "التَّعَلُّمُ حَيَاةٌ." },
    { text: "التَّعْلِيمُ حَيَاةٌ." },
    { text: "الْإِرْشَادُ حَيَاةٌ." },
    { text: "الِاهْتِدَاءُ حَيَاةٌ." },
    { text: "أَلَا وَإِنَّ تَقْوَى اللَّهِ هِيَ الزَّادُ وَالْمَعَادُ." },
    { text: "أَلَا وَإِنَّ تَقْوَى اللَّهِ عِمَارَةُ الدِّينِ." },
    { text: "أَلَا وَإِنَّ تَقْوَى اللَّهِ لَمْ تَزَلْ عَارِضَةً نَفْسَهَا عَلَى الْأُمَمِ." },
    { text: "أَلَا وَإِنَّ تَقْوَى اللَّهِ مِفْتَاحُ سَدَادٍ." },
    { text: "أَلَا وَإِنْ تَنَزَّهُوا عَنِ الْمَعَاصِي يُحْبِبْكُمُ اللَّهُ." },
    { text: "أَلَا وَإِنْ تَوَكَّرْتَ أُكْرِمْتَ." },
    { text: "أَلَا وَإِنَّ جِدَّ الدُّنْيَا هَزْلٌ." },
    { text: "أَلَا وَإِنْ جَعَلْتَ دُنْيَاكَ تَبَعًا لِدِينِكَ أَحْرَزْتَ الْخَيْرَ." },
    { text: "أَلَا وَإِنْ جَعَلْتَ دِينَكَ تَبَعًا لِدُنْيَاكَ أَهْلَكْتَ نَفْسَكَ." },
    { text: "أَلَا وَإِنَّ حُسْنَ الْعَهْدِ مِنَ الْإِيمَانِ." },
    { text: "أَلَا وَإِنَّ حِلْمَ اللَّهِ تَعَالَى عَلَى الْمَعَاصِي جَرَّأَكَ." },
    { text: "أَلَا وَإِنَّ حَوَائِجَ النَّاسِ إِلَيْكُمْ نِعْمَةٌ." },
    { text: "أَلَا وَإِنَّ خَيْرَ الْمَالِ مَا أَكْسَبَ ثَنَاءً." },
    { text: "أَلَا وَإِنَّ خَيْرَ الْمَالِ مَا أَوْرَثَكَ ذُخْرًا." },
    { text: "أَلَا وَإِنَّ دَعْوَةَ الْمَظْلُومِ مُجَابَةٌ." },
    { text: "أَلَا وَإِنَّ دُنْيَاكُمْ هَذِهِ لَأَهْوَنُ فِي عَيْنِي." },
    { text: "أَلَا وَإِنَّ ذِكْرَ الْغِيبَةِ شَرُّ الْإِفْكِ." },
    { text: "أَلَا وَإِنَّ ذَهَابَ النَّاهِبِينَ لَعِبْرَةٌ." },
    { text: "أَلَا وَإِنَّ رَأْيَكَ لَا يَتَّسِعُ لِكُلِّ شَيْءٍ." },
    { text: "أَلَا وَإِنْ رَأَيْتَ مِنْ نِسَائِكَ رِيبَةً فَأَدِّبْ." },
    { text: "أَلَا وَإِنْ رَغِبْتُمْ فِي الْفَوْزِ فَخُذُوا مِنَ الْفَنَاءِ." },
    { text: "أَلَا وَإِنَّ رُوَاةَ الْعِلْمِ كَثِيرٌ." },
    { text: "أَلَا وَإِنَّ الزَّهَادَةَ قَصْرُ الْأَمَلِ." },
    { text: "أَلَا وَإِنَّ سَخَاءَ النَّفْسِ أَفْضَلُ." },
    { text: "أَلَا وَإِنْ سَقِمَ فَهُوَ نَادِمٌ." },
    { text: "أَلَا وَإِنَّ طِبَاعَكَ تَدْعُوكَ إِلَى مَا أَلِفْتَهُ." },
    { text: "أَلَا وَإِنَّ عَدُوَّ مُحَمَّدٍ مَنْ عَصَى اللَّهَ." },
    { text: "أَلَا وَإِنَّ عَظِيمَ الْأَجْرِ مُقَارِنٌ عَظِيمَ الْبَلَاءِ." },
    { text: "أَلَا وَإِنْ عَقَدْتَ أَيْمَانَكَ فَارْضَ." },
    { text: "أَلَا وَإِنْ عَقَلْتَ أَمْرَكَ فَأَعْرِضْ عَنِ الدُّنْيَا." },
    { text: "أَلَا وَإِنَّ عَلَى أَمَلِكَ جُنَّةً." },
    { text: "أَلَا وَإِنَّ عُمْرَكَ عَدَدُ أَنْفَاسِكَ." },
    { text: "أَلَا وَإِنَّ عُمْرَكَ مَهْرُ سَعَادَتِكَ." },
    { text: "أَلَا وَإِنَّ عُمْرَكَ وَقْتُكَ." },
    { text: "أَلَا وَإِنَّ غَائِبًا يَحْدُوهُ اللَّيْلُ لَحَرِيٌّ." },
    { text: "أَلَا وَإِنَّ غَايَةً تَنْقُصُهَا اللَّحْظَةُ لَحَرِيَّةٌ." },
    { text: "أَلَا وَإِنَّ غَدًا مِنَ الْيَوْمِ قَرِيبٌ." },
    { text: "أَلَا وَإِنَّ فَضْلَ الْقَوْلِ عَلَى الْفِعْلِ هُجْنَةٌ." },
    { text: "أَلَا وَإِنَّ فِي الْخُمُولِ لَرَاحَةً." },
    { text: "أَلَا وَإِنَّ فِي الشَّرِّ لَوَقَاحَةً." },
    { text: "أَلَا وَإِنَّ فِي الْفِرَارِ مُوجِدَةَ اللَّهِ." },
    { text: "أَلَا وَإِنَّ فِي الْقُنُوعِ لَغَنَاءً." },
    { text: "أَلَا وَإِنَّ فِي الْمَوْتِ لَرَاحَةً." },
    { text: "أَلَا وَإِنَّ فِي كُلِّ شَيْءٍ مَوْعِظَةً." },
    { text: "أَلَا وَإِنَّ قَادِمًا يَقْدَمُ بِالْفَوْزِ." },
    { text: "أَلَا وَإِنَّ قَدْرَ السُّؤَالِ أَكْثَرُ." },
    { text: "أَلَا وَإِنَّ قَوْلَنَا إِنَّا لِلَّهِ إِقْرَارٌ." },
    { text: "أَلَا وَإِنَّ قَوْمًا عَبَدُوا اللَّهَ رَغْبَةً." },
    { text: "أَلَا وَإِنْ كَانَ فِي الْغَضَبِ الِانْتِصَارُ." },
    { text: "أَلَا وَإِنْ كَانَ فِي الْكَلَامِ بَلَاغَةٌ." },
    { text: "أَلَا وَإِنْ كَانَتِ الرَّعَايَا تَشْكُو." },
    { text: "أَلَا وَإِنَّ كَرَامَتَكَ لَا تَتَّسِعُ." },
    { text: "أَلَا وَإِنَّ كَرَمَ اللَّهِ لَا يَنْقُضُ حِكْمَتَهُ." },
    { text: "أَلَا وَإِنَّ كُفْرَ النِّعْمَةِ لُؤْمٌ." },
    { text: "أَلَا وَإِنَّ كَلَامَ الْحَكِيمِ مُسْتَحِقٌّ." },
    { text: "أَلَا وَإِنَّ كَمَا تُحِبُّ أَنْ يُعَامِلُوكَ." },
    { text: "أَلَا وَإِنْ كُنْتُمْ لَا مَحَالَةَ مُتَنَزِّهِينَ." },
    { text: "أَلَا وَإِنْ كُنْتُمْ لِلنَّجَاةِ طَالِبِينَ." },
    { text: "أَلَا وَإِنْ كُنْتُمْ لِلنَّعِيمِ طَالِبِينَ." },
    { text: "أَلَا وَإِنَّ لِأَنْفُسِكُمْ أَثْمَانًا." },
    { text: "أَلَا وَإِنَّ لِتَقْوَى اللَّهِ حَبْلًا وَثِيقًا." },
    { text: "أَلَا وَإِنَّ لِسَانَكَ يَقْتَضِيكَ." },
    { text: "أَلَا وَإِنَّ لَكُمْ نِهَايَةً." },
    { text: "أَلَا وَإِنَّ لِلْآخِرِ بِالْأَوَّلِ مُزْدَجَرًا." },
    { text: "أَلَا وَإِنَّ لِلْإِسْلَامِ غَايَةً." },
    { text: "أَلَا وَإِنَّ لِإِلَهَ إِلَّا اللَّهُ شُرُوطًا." },
    { text: "أَلَا وَإِنَّ لِلْبَاقِينَ بِالْمَاضِينَ مُعْتَبَرًا." },
    { text: "أَلَا وَإِنَّ لِلدُّنْيَا رِجَالًا." },
    { text: "أَلَا وَإِنَّ لِلدُّنْيَا مَعَ كُلِّ شَرْبَةٍ." },
    { text: "أَلَا وَإِنَّ لِلذِّكْرِ أَهْلًا." },
    { text: "أَلَا وَإِنَّ لِلْقُلُوبِ إِقْبَالًا." },
    { text: "أَلَا وَإِنَّ لِلْقُلُوبِ خَوَاطِرَ." },
    { text: "أَلَا وَإِنَّ لِلْقُلُوبِ شَهْوَةً." },
    { text: "أَلَا وَإِنَّ لِلْمِحَنِ غَايَاتٍ." },
    { text: "أَلَا وَإِنَّ لِلْمِحَنِ غَايَاتٍ وَلِلْغَايَاتِ نِهَايَاتٌ." },
    { text: "أَلَا وَإِنَّ لِلْمَوْتِ لَغَمَرَاتٍ." },
    { text: "أَلَا وَإِنَّ لِلنَّاسِ عُيُوبًا." },
    { text: "أَلَا وَإِنَّ لِلَّهِ تَعَالَى فِي السَّرَّاءِ نِعْمَةً." },
    { text: "أَلَا وَإِنَّ لِلَّهِ تَعَالَى فِي كُلِّ نِعْمَةٍ حَقًّا." },
    { text: "أَلَا وَإِنَّ لِلَّهِ سُبْحَانَهُ سَطَوَاتٍ." },
    { text: "أَلَا وَإِنَّ لِلَّهِ سُبْحَانَهُ عِبَادًا." },
    { text: "أَلَا وَإِنَّ لِلَّهِ سُبْحَانَهُ مَلَكًا." },
    { text: "أَلَا وَإِنْ لَمْ تَرْدَعْ نَفْسَكَ." },
    { text: "أَلَا وَإِنْ لَمْ يُصْلِحْهُمْ." },
    { text: "أَلَا وَإِنَّ اللَّيْلَ وَالنَّهَارَ مُسْرِعَانِ." },
    { text: "أَلَا وَإِنَّ اللَّيْلَ وَالنَّهَارَ يَعْمَلَانِ فِيكَ." },
    { text: "أَلَا وَإِنَّ لَيْلَكَ وَنَهَارَكَ لَا يَسْتَوْعِبَانِ." },
    { text: "أَلَا وَإِنَّ مَا تُقَدِّمُ مِنْ خَيْرٍ." },
    { text: "أَلَا وَإِنَّ مَاضِيَ عُمْرِكَ." },
    { text: "أَلَا وَإِنَّ مَاضِيَ يَوْمِكَ." },
    { text: "أَلَا وَإِنَّ مَالَكَ لَا يُغْنِي." },
    { text: "أَلَا وَإِنَّ مَالَكَ لِحَامِدِكَ." },
    { text: "أَلَا وَإِنَّ مَثَلَ الدُّنْيَا وَالْآخِرَةِ." },
    { text: "أَلَا وَإِنَّ مُجَاهَدَةَ النَّفْسِ." },
    { text: "أَلَا وَإِنَّ مَحَلَّ الْإِيمَانِ." },
    { text: "أَلَا وَإِنَّ مَعَ كُلِّ إِنْسَانٍ مَلَكَيْنِ." },
    { text: "أَلَا وَإِنَّ مُقَابَلَةَ الْإِسَاءَةِ." },
    { text: "أَلَا وَإِنَّ مَكْرُمَةً صَنَعْتَهَا." },
    { text: "أَلَا وَإِنَّ مِنْ أَبْغَضِ الْخَلَائِقِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَحَبِّ الْعِبَادِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَمْقَتِ النَّاسِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَهْلِ الدُّنْيَا." },
    { text: "أَلَا وَإِنَّ مِنْ أَهْلِ الْقُرْآنِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَهْلِ الذِّكْرِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَهْلَكَ شَيْءٍ." },
    { text: "أَلَا وَإِنَّ مِنْ أَمِنَ نَفْسَكَ." },
    { text: "أَلَا وَإِنَّ مِنْ أَهْنَأِ الْأَقْسَامِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَهْنَأِ الْعَيْشِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَهْوَنِ شَيْءٍ." },
    { text: "أَلَا وَإِنَّ مِنْ أَهْوَاءِ النَّفْسِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْأَخِرِ مَصَادِرِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْثَقِ سَبَبٍ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْثَقِ عُرَى الْإِيمَانِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْجَبِ الْعِلْمِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْحَشِ الْوَحْشَةِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْرَعِ النَّاسِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْضَعِ الْعِلْمِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْفَرِ النَّاسِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْفَرِ الْبِرِّ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْفَرِ الْقِسْمِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْقَاتِ الدُّنْيَا." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْقَاتِ السُّرُورِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْفَى جُنَّةٍ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوَّلِ الْإِخْلَاصِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوَّلِ الْعِبَادَةِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوَّلِ اللَّهْوِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوَّلِ مَا تُنْكِرُونَ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوَّلِ مَا يَجِبُ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوَّلِ الْمُرُوءَةِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوَّلِ الْهَوَى." },
    { text: "أَلَا وَإِنَّ مِنْ أَوَّلَ مَنْ تَرَوْنَ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى النَّاسِ بِالْإِنْعَامِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى النَّاسِ بِالِاصْطِنَاعِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى النَّاسِ بِنَا." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى الْعِلْمِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى مَنْ أَحْبَبْتَ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى النَّاسِ بِالْأَنْبِيَاءِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى النَّاسِ بِالْحَذَرِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى النَّاسِ بِالرَّحْمَةِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى النَّاسِ بِالْعَفْوِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْلَى النَّاسِ بِالنَّوَالِ." },
    { text: "أَلَا وَإِنَّ مِنْ أَوْهَنِ الْأَعْدَاءِ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تُخْدَعَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تُخْرِجَ صَدِيقَكَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَذْكُرَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَرْضَى." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَسْتَخِفَّ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَسْتَسْهِلَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَسْتَكْبِرَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَسْتَوْحِشَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تُسْلِفَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تُسِيءَ الظَّنَّ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَعْتَمِدَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تُعْجِبَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَغْتَرَّ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَغْفَلَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَغْلِبَكَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تَكُونَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تُهْمِلَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ تُوحِشَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ أَنْ يَفْقِدَكَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَإِدْمَانَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْإِسَاءَةَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْإِصْرَارَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْإِعْجَابَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْإِمْسَاكَ." },

    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْحِرْصَ." },

    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالسَّفَهَ." },

    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْغَضَبَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْغَفْلَةَ." },

    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْمُجَاهَرَةَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْمَعْصِيَةَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْمَكْرَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْمَلَقَ." },

    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْهَذَرَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْوُقُوعَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَالْوَلَهَ." },
    { text: "أَلَا وَإِنَّ مِنْ إِيَّاكَ وَانْتِهَاكَ." },
        { text: "القناعة مال لا ينفد" },
    { text: "الحلم والأناة توأمان ينتجهما علو الهمة" },
    { text: "الحلم عشيرة" },
    { text: "التقى رئيس الأخلاق" },
    { text: "العفاف زينة الفقر والشكر زينة الغنى" },
    { text: "أحسنوا في عقب غيركم تحفظوا في عقبكم" },
    { text: "إذا أملقتم فتاجروا الله بالصدقة" },
    { text: "الكرم أعطف من الرحم" },
    { text: "كفى بالقناعة ملكاً وبحسن الخلق نعيماً" },
    { text: "من كساه الحياء ثوبه لم ير الناس عيبه" },
    { text: "استنزلوا الرزق بالصدقة" },
    { text: "ما عال من اقتصد" },
    { text: "الاستقامة سلامة" },
    { text: "الصبر رأس الايمان" },
    { text: "الانصاف عنوان النبل" },
    { text: "العدل فضيلة الانسان" },
    { text: "التواضع يرفع الوضيع" },
    { text: "نعم السجية السخاء" },
    { text: "من الكرم حسن الشيم" },
    { text: "كل الحسب متناه إلا العقل والأدب" },
    { text: "عليك بالحلم فإنه ثمرة العلم" },
    { text: "من الحزم حفظ التجربة" },
    { text: "إقنع تعز" },
    { text: "لا شرف أعلى من التقوى" },
    { text: "لا عيش أهنأ من حسن الخلق" },
    { text: "الصدق لباس الدين" },
    { text: "لا عمل أعظم من الورع" },
    { text: "الزهد ثمرة اليقين" },
    { text: "لا ينفع الايمان بغير تقوى" },
    { text: "من عدل تمكّن" },
    { text: "كن متوكلاً تكن مكفياً" },
    { text: "إعمل تدّخر" },
    { text: "لا يكمل الشرف إلا بالسخاء والتواضع" },
    { text: "لا إيمان كالحياء والسخاء" },
    { text: "الطلاقة شيمة الحر" },
    { text: "لا دين لمن لا تقية له" },
    { text: "الشكر حصن النعم" },
    { text: "الورع أفضل لباس" },
    { text: "لا ظفر لمن لا صبر له" },
    { text: "الورع خير قرين" },
    { text: "لا صيانة لمن لا ورع له" },
    { text: "العفو عنوان النبل" },
    { text: "لا إيمان لمن لا يقين له" },
    { text: "المعروف زكاة النعم" },
    { text: "الحق أفضل سبيل" },
    { text: "الزهد سجية المخلصين" },
    { text: "لا نجاة لمن لا إيمان له" },
    { text: "الكيس من قصر آماله" },
    { text: "الطاعة أبقى عز" },
    { text: "ورع المرء ينزهه عن كل دنيّة" },
    { text: "لا ثواب لمن لا عمل له" },
    { text: "وقروا كباركم يوقركم صغاركم" },
    { text: "ورع الرجل على قدر دينه" },
    { text: "لا عز إلا بالطاعة" },
    { text: "نعم قرين التقوى الورع" },
    { text: "مصاحبة ذوي الفضائل حياة" },
    { text: "من لوازم الورع التنزه عن الآثام" },
    { text: "لا يغلب من يحتج بالصدق" },
    { text: "مجاهدة النفس عنوان النبل" },
    { text: "معاشرة الأبرار توجب الشرف" },
    { text: "من شيم الأبرار حمل النفوس على الايثار" },
    { text: "لا يدهش عند البلاء الحازم" },
    { text: "التوحيد حياة النفس" },
    { text: "التوكل حصن الحكمة" },
    { text: "مع الإنابة تكون المغفرة" },
    { text: "كمال الفضائل شرف الأخلاق" },
    { text: "لا يستغني العاقل عن المشاورة" },
    { text: "من قدم خيراً وجده" },
    { text: "كما ترحم ترحم" },
    { text: "من حسن عمله بلغ من الله آماله" },
    { text: "لا يخصم من يحتج بالحق" },
    { text: "من كره الشر عصم" },
    { text: "كن صادقاً تكن وقياً" },
    { text: "من اتقى الله وقاه" },
    { text: "لا ينفع الحسن بغير نجابة" },
    { text: "من صدق نجا" },
    { text: "كن موقناً تكن قوياً" },
    { text: "من كثر ذكره استنار لبه" },
    { text: "كن ورعاً تكن زكياً" },
    { text: "لا سبيل أنجى من الصدق" },
    { text: "من نصر الحق غنم" },
    { text: "كُن حلو الصبر عند مر الأمر" },
    { text: "من غض طرفه أراح قلبه" },
    { text: "لا سبيل أنجح من الايمان" },
    { text: "العفو تاج المكارم" },
    { text: "لا مسلك أسلم من الإستقامة" },
    { text: "متقي الشر كفاعل الخير" },
    { text: "من شرف الهمة بذل الاحسان" },
    { text: "الموعظة نصيحة شافية" },
    { text: "لا تدفع المكاره إلا بالصبر" },
    { text: "من علامات الكرام تعجيل المثوبة" },
    { text: "الرفق يؤدي إلى السلم" },
    { text: "لا رسول أبلغ من الحق" },
    { text: "من السعادة التوفيق لصالح الأعمال" },
    { text: "السخاء ستر العيوب" },
    { text: "مفتاح الظفر لزوم الصبر" },
    { text: "من كثر شكره، كثر خيره" },
    { text: "الفضل مع الاحسان" },
    { text: "مفتاح الخير التبري من الشر" },
    { text: "كُن لهواك غالباً وللنجاة طالباً" },
    { text: "النجاة مع الايمان" },
    { text: "من بر والديه بره ولده" },
    { text: "لا نعمة أجل من التوفيق" },
    { text: "من حسنت نيته أمده التوفيق" },
    { text: "كن جواداً بالحق بخيلاً بالباطل" },
    { text: "لا عز أرفع من الحلم" },
    { text: "من الحزم قوة العزم" },
    { text: "كفى بالقناعة ملكاً" },
    { text: "من جاهد على إقامة الحق وفق" },
    { text: "لا زاد كالتقوى" },
    { text: "من الكرم الوفاء بالذمم" },
    { text: "كفى بالمشاورة ظهيراً" },
    { text: "من أيقن أحسن" },
    { text: "لا قرين كحسن الخلق" },
    { text: "من بذل ماله استرق الرقاب" },
    { text: "من اعتزل سلم" },
    { text: "لا جهاد كجهاد النفس" },
    { text: "نعم قرين الايمان الحياء" },
    { text: "من كثر إحسانه أحبه إخوانه" },
    { text: "من عرف كف" },
    { text: "من انفرد عن الناس أنس بالله سبحانه" },
    { text: "كفى بالتواضع شرفاً" },
    { text: "نعم الزاد حسن العمل" },
    { text: "من اقتنع بالكفاف أداه إلى العفاف" },
    { text: "كفى بالحلم وقاراً" },
    { text: "من تحلى بالإنصاف بلغ مراتب الأشراف" },
    { text: "مجاهدة النفس أفضل جهاد" },
    { text: "ما أصلح الدين كالتقوى" },
    { text: "من عرف الله لم يشق أبداً" },
    { text: "نعم الكنز الطاعة" },
    { text: "لا زهد كالكف عن الحرام" },
    { text: "لا عبادة كأداء الفرائض" },
    { text: "ما ندم من استخار" },
    { text: "من لم يخف أحداً لم يخف أبداً" },
    { text: "لا إيمان كالصبر" },
    { text: "نعم الخليقة القناعة" },
    { text: "ما ضل من استشار" },
    { text: "من كفارات الذنوب العظام إغاثة الملهوف" },
    { text: "لا ظهير كالحلم" },
    { text: "من صدقت لهجته صحت حجته" },
    { text: "كفى باليقين عبادة" },
    { text: "لا حلم كالصفح" },
    { text: "ما أصيب من صبر" },
    { text: "من حمد الله أغناه" },
    { text: "من سالم الناس ربح السلامة" },
    { text: "لا ربح كالثواب" },
    { text: "من عز النفس لزوم القناعة" },
    { text: "من شاور الرجال شاركها في عقولها" },
    { text: "من بذل بره اشتهر ذكره" },
    { text: "قرن الاجتهاد بالوجدان" },
    { text: "لا نصح كالتحذير" },
    { text: "نعم الايمان جميل الخلق" },
    { text: "من خاف العقاب انصرف عن السيئات" },
    { text: "لكل حسنة ثواب" },
    { text: "من كرم عليه عرضه هان عليه المال" },
    { text: "لا عبادة كالتفكر" },
    { text: "هدي من أطاع ربه وخاف ذنبه" },
    { text: "نعم السلاح الدعاء" },
    { text: "كم من صعب يسهل بالرفق" },
    { text: "كم من وضيع رفعه حسن خلقه" },
    { text: "لا عقل كالتدبير" },
    { text: "نعم الوسيلة الطاعة" },
    { text: "كل راض مستريح" },
    { text: "من كثر إحسانه كثر خدمه وأعوانه" },
    { text: "في الذكر حياة القلوب" },
    { text: "نعم المعونة الصبر على البلاء" },
    { text: "من استعمل الرفق استدر الرزق" },
    { text: "في رضا الله غاية المطلوب" },
    { text: "في الطاعة كنوز الأرباح" },
    { text: "من وقف عند قدره أكرمه الناس" },
    { text: "نعم الذخر المعروف" },
    { text: "مع الشكر تدوم النعمة" },
    { text: "ما أحسن الجود مع الاعسار" },
    { text: "من صدق الله سبحانه نجا" },
    { text: "ليكن سجيتك السخاء والإحسان" },
    { text: "نعم الهدية الموعظة" },
    { text: "مع الزهد تثمر الحكمة" },
    { text: "ما أحسن العفو مع الاقتدار" },
    { text: "من نصح نفسه كان جديراً بنصح غيره" },
    { text: "من أطاع إمامه فقد أطاع ربه" },
    { text: "في مجاهدة النفس كمال الصلاح" },
    { text: "نعم العبادة الخشية" },
    { text: "مع الاخلاص ترفع الأعمال" },
    { text: "ما أشرقت الأعناق بمثل الإحسان" },
    { text: "من انتصر بالله عز نصره" },
    { text: "في سعة الأخلاق كنوز الأرزاق" },
    { text: "من راقب العواقب سلم من النوائب" },
    { text: "كن سمحاً ولا تكن مبذراً" },
    { text: "نعم الشيمة السكينة" },
    { text: "مع الورع يثمر العمل" },
    { text: "ما حصنت النعم بمثل الشكر" },
    { text: "في الاستشارة عين الهداية." },
    { text: "في خلاف النفس رشدها." },
    { text: "من عقل سمح." },
    { text: "غيرة الرجل إيمان." },
    { text: "صلة الرحم عمارة التعم ودفاعة النقم." },
    { text: "من حقّر نفسه عظمّ." },
    { text: "عليك بالعفة فإنها نعم القرين." },
    { text: "صحة الودّ من كرم العهد." },
    { text: "صلاح النفس قلة الطمع." },
    { text: "من أنصف نُصِفَ." },
    { text: "غضّ الطرف من المروّة." },
    { text: "غضّ الطرف من أشرف الورع." },
    { text: "صلة الأرحام من أفضل شيم الكرام." },
    { text: "من يصبر يظفر." },
    { text: "عادة الكرام حسن الصنيعة." },
    { text: "ظفر بجنة المأوى من غلب الهوى." },
    { text: "يصدّق الرجل على قدر مروءته." },
    { text: "من يغلب هواه يعرّ." },
    { text: "غطاء العيوب السخاء والعفاف." },
    { text: "صواب الفعل يزيّن الرجل." },
    { text: "صدر العاقل صندوق سرّه." },
    { text: "من يطع الله يفز." },
    { text: "عليك بذكر الله فإنه نور القلب." },
    { text: "من جاد ساد." },
    { text: "من قنع غني." },
    { text: "صلة الرحم تدرُّ النعم وتدفع النقم." },
    { text: "صلة الرحم منمة للمعدل مثرة للنَّعْم." },
    { text: "من بذل ماله جَلَّ." },
    { text: "عليك بالرضا في الشدة والرخاء." },
    { text: "صلة الرحم تنمي العدد وتوجب المؤد." },
    { text: "من حليم أكرم." },
    { text: "ظفر الكريم يُنْجِي." },
    { text: "صدقة العلانية تدفع ميتة السوء." },
    { text: "من تواضع رُفِع." },
    { text: "عليك بالوفاء فإنه أقوى جُنة." },
    { text: "صلاح العمل بصلاح النية." },
    { text: "من أخلص بلغ الآمال." },
    { text: "غاية التسليم الفوز بدار النعيم." },
    { text: "صلاح البدن الحمية." },
    { text: "من توفى سلم." },
    { text: "ظفر بالخير من طلبه." },
    { text: "صلاح الدين الورع." },
    { text: "من تفضل حُرم." },
    { text: "صنائع الاحسان من فضل الإنسان." },
    { text: "من نصر الحقَّ أفْلح." },
    { text: "غاية المكارم الإيثار." },
    { text: "من عامل بالرفق غنم." },
    { text: "عنوان الثبْل الاحسان إلى النَّاس." },
    { text: "من عمل بالحقَّ نجى." },
    { text: "في صلة الرَّحِم حراسة النَّعم." },
    { text: "من رضي بالقضاء استراح." },
    { text: "عزيمة الخير تطفي نار الشَّر." },
    { text: "من سأل استفاد." },
    { text: "عاشر أهل الفضل تسعد وتنبيل." },
    { text: "عنوان العقل مداراة النَّاس." },
    { text: "من احتجَّ بالحقَّ فَلَجَ." },
    { text: "غاية المجاهدة أن يجاهد المرء نفسه." },
    { text: "من صبر نال المنى." },
    { text: "في التَّسليم الإيمان." },
    { text: "من توگّل لم يهتم." },
    { text: "في شكر النعم دوامها." },
    { text: "من نصحك فقد أنجدك." },
    { text: "في السَّخاء المحبَّة." },
    { text: "من ذَكَر الله ذَكَرَه." },
    { text: "في كلِّ حسنة ثوبة." },
    { text: "من جاهد نفسه أكمل التقى." },
    { text: "كاتم السرّ وفيّ أمين." },
    { text: "من عمل بالحقّ أفلح." },
    { text: "طوبى لمن راقب ربه وخاف ذنبه." },
    { text: "من حاسب نفسه ربح." },
    { text: "شاور ذوي العقول تأمن الزلل والندم." },
    { text: "من صان نفسه وُفّر." },
    { text: "عليك بالشكر في السراء والضراء." },
    { text: "من عصى نفسه وصلها." },
    { text: "صلاح النفس مجاهدة الهوى." },
    { text: "من صبر هانت مصيبته." },
    { text: "شرف الرجل نزاهته ، وجماله مروّته." },
    { text: "من تاب فقد أناب." },
    { text: "طوبى لمن حافظ على طاعة ربه." },
    { text: "من ندم فقد تاب." },
    { text: "سبب المحبّة السخاء." },
    { text: "من عرف الدنيا تزهدّ." },
    { text: "صلاح الدين بحسن اليقين." },
    { text: "من اعتصم بالله نجاه." },
    { text: "سبب الائتلاف الوفاء." },
    { text: "من توكل على الله كفاه." },
    { text: "عليك بالسكينة فإنها أفضل زينة." },
    { text: "من بدل ماله استعبَد." },
    { text: "شرف المؤمن إيمانه، وعزه بطاعته." },
    { text: "من بدل جاهه استُحمد." },
    { text: "سادة أهل الجنة الأتقياء المتقون." },
    { text: "من صبر خفّت محنته." },
    { text: "عليك بالصدقة تنج من دناء السُّخْ." },
    { text: "من بخل بدينه جَلَّ." },
    { text: "سالم الناس تسلم دنياك." },
    { text: "من عمل بالسداد مَلَكَ." },
    { text: "طوبى لمن أشعر التقوى قلبه." },
    { text: "من عرف نفسه فقد عرف ربّه." },
    { text: "سُلْمُ الشرف التواضع والسخاء." },
    { text: "من أحسن إلى جيرانه كثر خدمه." },
    { text: "على الصدق والأمانة مبنى الإيمان." },
    { text: "الصدقة دواء منجٍ." },
    { text: "من اعتزل سليم ورعه." },
    { text: "سبب صلاح الدين الورع." },
    { text: "من تحلّى بالحلم سكن طيشه." },
    { text: "طوبى لمن حافظ على طاعة ربّه." },
    { text: "من رضي بالقضاء طاب عيشه." },
    { text: "شيطان لا يوزن ثوابهما العفو والعدل." },
    { text: "عليك بالحلم فإنه خلق مرضي." },
    { text: "من فوّض أمره إلى الله سَدَّه." },
    { text: "سالم الناس تسلم ، واعمل للآخرة تغنم." },
    { text: "من اهتدى بهدى الله أرشده." },
    { text: "سبب صلاح الإيمان التقوى." },
    { text: "من أقرض الله جزاه." },
    { text: "طوبى لمن شغل بالذكر لسانه." },
    { text: "من سأل الله أعطاه." },
    { text: "سبب الوقار الحلم." },
    { text: "من صان نفسه عن المسألة جَلَّ." },
    { text: "عليك بإدمان العمل في النشاط والكسل." },
    { text: "سلامة العيش في المداراة." },
    { text: "من حفظ عهده كان وفِيًّا." },
    { text: "شيطانان هما مِلاك الدين : الصدق واليقين." },
    { text: "من مَلَك شهوته كان تقِيًّا." },
    { text: "سبب السيادة السخاء." },
    { text: "من مَلَك غضبه كان حليمًا." },
    { text: "طوبى لمن بادر أجله وأخلص عمله." },
    { text: "من مَلَك عقله كان حكيما." },
    { text: "سبب صلاح النفس الورع." },
    { text: "من سأل في صغره أجاب في كبره." },
    { text: "عليك بالأمانة فإنها أفضل دينانة." },
    { text: "من انفرد عن الناس صان دينه." },
    { text: "من كرم خلقه إوسع رزقه." },
    { text: "طوبى لمن خاف الله فأمن." },
    { text: "سنّة الكرام الوفاء بالعهود." },
    { text: "من حسنت سريرته حسنت علانيته." },
    { text: "شكر المؤمن يظهر في عمله." },
    { text: "سلاح المؤمن الاستغفار." },
    { text: "من تعزّز بالله لم يذله سلطان." },
    { text: "على قدر المروّة تكون السّخاوة." },
    { text: "صلاح العبادة التّوكل." },
    { text: "من اعتصم بالله لم يضرّه سلطان." },
    { text: "سلاح الموقن الدّعاء." },
    { text: "من طلب السّلامة لزم الاستقامة." },
    { text: "على قدر الحياة تكون العفّة." },
    { text: "من كان صدوقاً لم يعدم الكرامة." },
    { text: "عادة الكرام الجود." },
    { text: "طوبى لمن ذكر المعاد فأحسن." },
    { text: "من عمل للمعاد ظفر بالسّداد." },
    { text: "سعادة المرء القناعة والرّضا." },
    { text: "من قنع بقسم الله استغنى." },
    { text: "طاعة الهدى تُنجي." },
    { text: "من وثق بالله توكل عليه." },
    { text: "ليس لمتوكّل عِناؤُا." },
    { text: "من صَحَّت ديانته قويت أمانته." },
    { text: "لقاح الإيمان تلاوة القرآن." },
    { text: "طوبى لنفس أدّت لربّها فرضها." },
    { text: "من أيقن بالجزاء أحسن." },
    { text: "لم يعدَم النصر من انتصر بالصبر." },
    { text: "طلب الأدب جمال الحسب." },
    { text: "زكاة الجمال العفاف." },
    { text: "لن يفوز بالجنة إلا الساعي لها." },
    { text: "قد عَزّ من قنع." },
    { text: "صلاح المعاد بحسن العمل." },
    { text: "لن يلقى جزاء الخير إلا فاعله." },
    { text: "شكر المنعم عصمة من النقم." },
    { text: "قد تيقظ من أَعظ." },
    { text: "زكاة الجاه بذله." },
    { text: "على قدر الحميَّة تكون الغيرة." },
    { text: "شكر الإله يدُرُّ النعم." },
    { text: "على قدر شرف النفس تكون المروءة." },
    { text: "طول الإصطبار من شيم الأبرار." },
    { text: "صلاح العقل الأدب." },
    { text: "سامع ذكر الله ذاكر." },
    { text: "زكاة الشجاعة الجهاد في سبيل الله." },
    { text: "زين الايمان الورع." },
    { text: "ردع الهوى من شيمة العقلاء." },
    { text: "زين العبادة الخشوع." },
    { text: "رأس الإيمان الصدق." },
    { text: "زين الحكمة الزهد في الدنيا." },
    { text: "رأس الاسلام الأمانة." },
    { text: "زيادة الجهل تردي." },
    { text: "رضا الله سبحانه أقرب غاية تُدرك." },
    { text: "رضا الله سبحانه مقرون بطاعته." },
    { text: "رأس الحكمة لزوم الحق." },
    { text: "رأس الايمان الصبر." },
    { text: "رحمة الضعفاء تستنزل الرحمة." },
    { text: "رأس الورع غضُّ الطرف." },
    { text: "رأس التقوى ترك الشهوة." },
    { text: "رأس الحلم الكظم." },
    { text: "رأس الاستبصار الفكر." },
    { text: "ذاكر الله سبحانه مجالسه." },
    { text: "ذكر الله مطردة الشيطان." },
    { text: "ذكر الله دواء أعلال النفوس." },
    { text: "ذكر الله طارد الأدواء والبؤس." },
    { text: "دليل دين الرجل ورعه." },
    { text: "دليل غيرة الرجل عفته." },
    { text: "خير الأعمال اعتدال الرجاء والخوف." },
    { text: "خض الغمرات إلى الحق حيث كان." },
    { text: "خشية الله جناح الايمان." },
    { text: "خذ بالحزم والزم العلم تُحمد عواقبك." },
    { text: "خوف الله يجلب لمستشعره الأمان." },
    { text: "خَفِ الله فيؤمنك ولا تأمنه فيعذّبك." },
    { text: "حلاوة الظفر تمحو مرارة الصبر." },
    { text: "حَسْبُ الخلائق الوفاء." },
    { text: "حَسْبُ المَرْء علمه ، وجماله عقله." },
    { text: "حفظ التجارب رأس العقل." },
    { text: "حاصل التواضع الشرف." },
    { text: "حزن القلوب يمحّص الذنوب." },
    { text: "حسن الشكر موجب الزيادة." },
    { text: "حسن الخلق أفضل الدين." },
    { text: "جاور العلماء تستبصر." },
    { text: "حسن الدين من قوة اليقين." },
    { text: "جهاد الغضب بالحلم برهان البُل." },
    { text: "حسن الحلم دليل وفور العلم." },
    { text: "جهاد النفس بالعلم عنوان العقل." },
    { text: "حُسْن النية من سلامة الطوية." },
    { text: "ثواب المصيبة على قدر الصبر عليها." },
    { text: "حُسْن التوفيق خير قائد." },
    { text: "حسن العفاف من شيم الأشراف." },
    { text: "جمال الإحسان ترك الامتنان." },
    { text: "حسن القناعة من العفاف." },
    { text: "جمال المعروف إتمامه." },
    { text: "حسن الاستدراك عنوان الصلاح." },
    { text: "جميل النية سبب لبلوغ الأمنية." },
    { text: "حسن الصبر ملاك كل أمر." },
    { text: "جمال الحرّ تجنب العار." },
    { text: "حسن الصبر طليعة النصر." },
    { text: "جودوا بما يفنى ، تعتاضوا عنه بما يبقى." },
    { text: "حسن البشر شيمة كل حر." },
    { text: "جهاد النفس مهر الجنة." },
    { text: "حسن الإستغفار يمحص الذنوب." },
    { text: "جمال المؤمن ورعه." },
    { text: "حسن الخلق رأس كل بر." },
    { text: "جالس العلماء تسعد." },
    { text: "حسن الأخلاق برهان كرم الأعراق." },
    { text: "جمال الرجل في الوقار." },
    { text: "حسن السيرة عنوان حسن السيرة." },
    { text: "جماع الخير في أعمال البرّ." },
    { text: "جمال الدين الورع." },
    { text: "جميل القصد يدل على طهارة المولد." },
    { text: "جالِسَ الحُلماءَ تزددُ حُلماً." },
    { text: "جالِسَ العُلماءَ تزددُ علماً." },
    { text: "جليسُ الخيرِ نعمةٌ." },
    { text: "ثوبُ التقى أشرفُ الملابسِ." },
    { text: "ثوبُ العافيةِ أهونُ الملابسِ." },
    { text: "ثيابُك على غيرِك أبقى منها عليكِ." },
    { text: "جُدْ بما تجدُ تُحمدُ." },
    { text: "ثمنُ الجنةِ العملُ الصالحُ." },
    { text: "ثوابُ الصبرِ يُذهبُ مَضضُ المصيبةِ." },
    { text: "ثوابُ الجهادِ أعظمُ الثوابِ." },
    { text: "ثوابُ الصبرِ أعلى الثوابِ." },
    { text: "تواضعُ المرءِ يرفعهُ." },
    { text: "تمامُ الشرفِ التواضعُ." },
    { text: "قُولُوا موازينكم بالعملِ الصالحِ." },
    { text: "تمامُ السؤددِ ابتداءُ الصنائعِ." },
    { text: "ثباتُ الدينِ بقوةِ اليقينِ." },
    { text: "تعجيلُ السراحِ نجاحٌ." },
    { text: "قُولُوا موازينكم بالصدقةِ." },
    { text: "تعجيلُ الاستدراكِ إصلاحٌ." },
    { text: "ثمرةُ الإيمانِ الفوزُ عندَ الله." },
    { text: "تاجرُ اللهَ تربحُ." },
    { text: "ثمرةُ الحزمِ السلامةُ." },
    { text: "ثمرة الدين الأمانة." },
    { text: "تاج الرجل عفاه ، وزينته إنصافه." },
    { text: "ثمرة اليقين الزهادة." },
    { text: "بُكرة السبت والخميس بركة." },
    { text: "ثمرة التوبة استدارك فوارط النفس." },
    { text: "بركة المال في الصدقة." },
    { text: "ثمرة المحاسبة إصلاح النفس." },
    { text: "بذل الجاه زكاة الجاه." },
    { text: "ثمرة الإيمان الرغبة في دار البقاء." },
    { text: "ترك الشهوات أفضل عبادة وأجمل عادة." },
    { text: "ثمرة الحكمة الفوز." },
    { text: "برُّ الوالدين أكبر فريضة." },
    { text: "ثمرة القناعة العز." },
    { text: "بشّر نفسك إذا صبرت بالنجاح والظفر." },
    { text: "ثمرة الورع النزاهة." },
    { text: "بادر البر فإن أعمال البر فرصة." },
    { text: "ثمرة العفة القناعة." },
    { text: "بركة العمر في حسن العمل." },
    { text: "ثمرة التقوى سعادة الدنيا والآخرة." },
    { text: "بكاء العبد من خشية الله يمحص ذنوبه." },
    { text: "ثمرة الذكر استنارة القلوب." },
    { text: "توق معاصي الله تفلح." },
    { text: "ثمرة الشكر زيادة النعم." },
    { text: "تفاءل بالخير تنجح." },
    { text: "ثمرة الكرم صلة الرحم." },
    { text: "تعجيل المعروف مِلاك المعروف." },
    { text: "تعجيل البرّ زيادة في البر." },
    { text: "بذل التحية من حسن الأخلاق والسجيَّة." },
    { text: "تحمل يجلّ قدرك." },
    { text: "بادِر الفرصة قبل أن تكون غُصَّة." },
    { text: "بؤُ الرجل ذوي رحمِهِ صدقة." },
    { text: "إذا مَلكتَ فارفق." },
    { text: "بَاكِر الطاعة تسعُد." },
    { text: "إذا أعطيت فاشكر." },
    { text: "بادِر الخير ترشُد." },
    { text: "إذا أبليتَ فاصبر." },
    { text: "بشرك أول برك ووعدك أول عطائك." },
    { text: "إذا عاقبت فارفق." },
    { text: "بادِر الطاعة تسعد." },
    { text: "إذا صنعت معروفاً فاستره." },
    { text: "إذا صَنعتَ إليك معروفٌ فأنشره." },
    { text: "بالشكر تدوم النعمة." },
    { text: "إذا مَدحتَ فاختصر." },
    { text: "بالتواضع تكون الرّفعة." },
    { text: "إذا رُزقتَ فأنفق." },
    { text: "بالإفضال تُعظَم الأقدار." },
    { text: "إذا جُنِّيَ عليك فاغتفر." },
    { text: "بالوقار تكثُر الهيبة." },
    { text: "إذا حُرمتَ فاقنع." },
    { text: "بالحلم تكثُر الأنصار." },
    { text: "إذا أخشتَ فأكرم حقَّ الإخاء." },
    { text: "بالهدى يكثر الاستبصار." },
    { text: "إذا أنعمت بالنّعمة فقد قضيت شكرها." },
    { text: "بالإيثار يُسترقُّ الأحرار." },
    { text: "إذا قارفت ذنباً فكُن عليه نادماً." },
    { text: "بالإحسان يُستعبد الانسان." },
    { text: "إذا تفقَّهَ الرفيع تواضع." },
    { text: "بالمواعظ تنجلي الغفلة." },
    { text: "إذا تفقَّهَ الوضيع ترقَّع." },
    { text: "بالتواضع تُزان الرفعة." },
    { text: "إذا حسُن الخلق لطف القول." },
    { text: "بالتودُّد تكون المحبَّة." },
    { text: "إذا قويت الأمانة كثُر الصدق." },
    { text: "بالتوفيق تكون السَّعادة." },
    { text: "إذا كُمل العقل نقصت الشَّهوة." },
    { text: "بالوجود تكون السيادة." },
    { text: "إذا رأيت الخير فخذوا به." },
    { text: "باليقين تتم العبادة." },
    { text: "إن أحمد الأمور عاقبة الصبر." },
    { text: "بالرفق تتم المروءة." },
    { text: "إذا طلبت العز فاطلبه بالطاعة." },
    { text: "بالمكاره تنال الجنة." },
    { text: "إنك مقوم بأدبك فزيتنه بالحلم." },
    { text: "بالصبر تخف المحنة." },
    { text: "إنك إن عملت للآخرة فاز قدحك." },
    { text: "بالإيمان تكون النجاة." },
    { text: "إنك إن تواضعت رفعك الله." },
    { text: "بالعافية توجد لذّة الحياة." },
    { text: "إن تنزّهوا عن المعاصي يحبكم الله." },
    { text: "بذكر الله تُنزل النعمة." },
    { text: "إن آمنت بالله أمن منقلبك." },
    { text: "بالإيمان يُستدل على الصالحات." },
    { text: "إن اتقيت الله وقالك." },
    { text: "بالبر يُملك الحرّ." },
    { text: "إن توقّرت أُكرمت." },
    { text: "بالكظم يكون الحلم." },
    { text: "إنك إن سالمت الله سلمت وفزت." },
    { text: "بالصدق تكون النجاة." },
    { text: "إذا أراد الله بعبدي خيراً أعفَّ بطنه وفرجه." },
    { text: "بالصدق تكمل المروءة." },
    { text: "إنما الحزم طاعة الله ومعصية النفس." },
    { text: "بالتأني تسهل المطالب." },
    { text: "إنما الكرم التنزُّه عن المعاصي." },
    { text: "بالصبر تدرك الرغائب." },
    { text: "إنما البخل التبرِّي عن المخازي." },
    { text: "بالرُؤد ثمر الحكمة." },
    { text: "إنما سادة الدنيا والآخرة الأجواد." },
    { text: "بالإفضال تُسترقُّ الأعناق." },
    { text: "إنما الوَرع التَّطهير من المعاصي." },
    { text: "بالرَفق تدرك المقاصد." },
    { text: "إنما الكرم بذل الرغائب وإسعاف الطالب." },
    { text: "بالعفاف تزكو الأعمال." },
    { text: "من كساه الحياء ثوبه خفي عن الناس عيبه." },
    { text: "بالدُّعاء يُستدفع البلاء." },
    { text: "من رقى درجات الهمم عظمته الأمم." },
    { text: "بحسن الأفعال يُحسن الثناء." },
    { text: "إنكم مجازون بأفعالكم فلا تفعولوا إلا برّاً." },
    { text: "بالإخلاص ترفع الأفعال." },
    { text: "إن أسلمت نفسك لله سلمت نفسك." },
    { text: "بالقناعة يكون العزُّ." },
    { text: "إن أتاكم الله بنعمة فاشكروا." },
    { text: "بالصبر تُدرك معالي الأمور." },
    { text: "إن ابتلاك الله بمصيبة فاصبروا." },
    { text: "بالورع يكون التنزُّه عن الدُّنيا." },
    { text: "إن صبرت جرى عليك القلم وأنت مأجور." },
    { text: "بحسن الأخلاق تزدُ الأرزاق." },
    { text: "إنَّ أفضل الجهاد مجاهدة الرجل نفسه." },
    { text: "بالصالحات يُستدلُّ على الإيمان." },
    { text: "إن تصبروا ففي الله من كلِّ مصيبة خَلَفٌ." },
    { text: "بأصالة الرأي يقوى الحزم." },
    { text: "إنَّ أفضل العلم السكينة والحلم." },
    { text: "بالمجاهدة صلاح النَّفس." },
    { text: "إنَّ بذل التحية من محاسن الأخلاق." },
    { text: "بالعفو تُنزل الرَّحمة." },
    { text: "إنَّ من النعمة تعذُّر المعاصي." },
    { text: "بالتوبة تُمحَصُ السَّيئات." },
    { text: "بالتقوى تزدو الأعمال." },
    { text: "إنَّ المؤمنين وجِلون." },
    { text: "إنَّ لأنفسكم أثماناً فلا تبيعوها إلا بالجنَّة." },
    { text: "بكثرة الإفضال يُعرف الكريم." },
    { text: "إذا رأيت مظلوماً فأعنه على الظالم." },
    { text: "بكثرة الاحتمال يُعرف الحليم." },
    { text: "إذا استخلص الله عبداً ألهمه الديانة." },
    { text: "بالإحسان يُملك الأحرار." },
    { text: "إذا أكرم الله عبداً شغله بمحبته." },
    { text: "بإحسان الوفاء يُعرف الأبرار." },
    { text: "إذا اتقيت فاتقِ محارم الله." },
    { text: "بإحسان الطاعة يُعرف الأختيار." },
    { text: "إذا هرب الزاهد من الناس فأطلبه." },
    { text: "بالورع يتزكى المؤمن." },
    { text: "إذا اصطفى الله عبداً جليه بخشيته." },
    { text: "بالغفران يعظم المجد." },
    { text: "إذا نزلت بك النعمة فاجعل قراها الشكر." },
    { text: "بالبذل تكثر المحامد." },
    { text: "إذا أحبب الله عبداً ألهمه الصدق." },
    { text: "بالإفضال تُستر العيوب." },
    { text: "إذا أكرم الله عبداً أعانه على إقامة الحق." },
    { text: "بصلة الرحم تُستدَر النعم." },
    { text: "إنما الحلم كظم الغيظ وملك النفس." },
    { text: "بالاستبصار يحصل الاعتبار." },
    { text: "إذا أحبب الله عبداً ألهمه حسن العبادة." },
    { text: "إن حسن العهد من الإيمان." },
    { text: "إن أسرع الخير ثواباً البُؤْ." },
    { text: "أعقل الناس أنظرهم في العواقب." },
    { text: "إن أفضل أخلاق الرجال الحلم." },
    { text: "أحسن الصدق الوفاء بالعهد." },
    { text: "إن أعظم المثوبة مثوبة الإنصاف." },
    { text: "أفضل الجود بذل الجهد." },
    { text: "أشرف الأقوال الصدق." },
    { text: "أفضل الدين قصر الأمل." },
    { text: "أكرم حسب حسن الأدب." },
    { text: "أفضل الشرف بذل الإحسان." },
    { text: "أعلى العبادة إخلاص العمل." },
    { text: "أفضل الإيمان حسن الإيقان." },
    { text: "أحسن الآداب ما كفك عن المحارم." },
    { text: "أفضل المروءة الحياء وثمرته العفة." },
    { text: "أحسن الأخلاق ما حملك على المكارم." },
    { text: "لا كرم أعز من التقى." },
    { text: "أحسن المقال ما صدقه حسن الفعال." },
    { text: "أقرب النتائج بالنجاح أعودها بالصلاح." },
    { text: "الصلاة قربان كل تقى." },
    { text: "أفضل الشرف كف الأذى وبذل الإحسان." },
    { text: "أنجح الأمور ما أحاط به الكتمان." },
    { text: "أسعد الناس بالخير العامل به." },
    { text: "أفضل الشيم السخاء والعفة والسكينة." },
    { text: "أفضل الذخائر حسن الضمائر." },
    { text: "أشجع الناس من غلب الجهل بالحلم." },
    { text: "أحسن اللباس الورع وخير الذخر التقوى." },
    { text: "أسعد الناس من ترك لذة فانية للذة باقية." },
    { text: "أكرم الأخلاق السخاء وأعمها نفعاُ العدل." },
    { text: "أدين الناس من لم تُفسد الشهوة دينه." },
    { text: "أحسن الفعل الكفُّ عن القبيح." },
    { text: "أقرب الناس إلى الله سبحانه أحسنهم إيماناً." },
    { text: "أعون شيء على صلاح النفس القناعة." },
    { text: "أبخل الناس بعرضه أسخاهم بماله." },
    { text: "أفضل الجود ما كان عن عسرة." },
    { text: "أحسن العفو ما كان عن قدرة." },
    { text: "أقوى الناس من قوي على غضبه بحلمه." },
    { text: "أعظم الناس رفعة من وضع نفسه." },
    { text: "أعلم الناس بالله أكثرهم خشية له." },
    { text: "أفضل الجود إيصال الحقوق إلى أهلها." },
    { text: "أزكى المكاسب كسب الحلال." },
    { text: "أفضل العطيّة ما كان قبل ذل السؤال." },
    { text: "أحلى التوال بذل غير سؤال." },
    { text: "أصل الورع تجنّب الشهوات." },
    { text: "أفضل الطاعات العزوف عن اللذات." },
    { text: "أعلم الناس بالله أرضاهم لقضائه." },
    { text: "أكثر الناس معرفة لنفسه أخوفهم لربه." },
    { text: "أغبط الناس المُسارع إلى الخيرات." },
    { text: "أفضل الأدب ما بدأت به نفسك." },
    { text: "أحسن الحياة استحيائك من نفسك." },
    { text: "أفضل عُدَّة الصبر على الشدة." },
    { text: "أحكم الناس من فرَّ من جُهَّال الناس." },
    { text: "أسعد الناس من خالط كرام الناس." },
    { text: "أعظم الناس سعادة أكثرهم زهدة." },
    { text: "أصل الزهد اليقين وثمرته السعادة." },
    { text: "أصل العزم الحزم وثمرته الظفر." },
    { text: "أحزم الناس من استهان بأمر الدنيا." },
    { text: "أفضل الناس من جاهد هواه." },
    { text: "أصل الإيمان حسن التسليم لأمر الله." },
    { text: "أصل الرضا حسن الثقة بالله." },
    { text: "أصل الصبر حسن اليقين بالله." },
    { text: "أصل قوة القلب التوكل على الله." },
    { text: "أقوى الناس من غلب هواه." },
    { text: "أعقل الناس أبعداهم عن كل دنيَّة." },
    { text: "أرضى الناس من كانت أخلاقه رضيَّة." },
    { text: "أحق من ذكرت من لا ينساك." },
    { text: "أحق من شكرت من لا يَمْنَعُ مزيدك." },
    { text: "أحقُّ من بررت من لا يمنع بركة." },
    { text: "أحقُّ الناس بالإسعاف طالب العفو." },
    { text: "أفضل النوال ما حصل قبل السؤال." },
    { text: "أجلُّ المعروف ما صُنع إلى أهله." },
    { text: "أقدر الناس على الصواب من لم يغضب." },
    { text: "أهنا الأقسام القناعة وصحة الأجسام." },
    { text: "أحسن شكر النعم الإنعام بها." },
    { text: "أقوى الناس من قوي على نفسه." },
    { text: "أجلُّ الناس من وضع نفسه." },
    { text: "أفضل العبادة عفة البطن والفرج." },
    { text: "أفضل العطاء ترك المنِّ." },
    { text: "أفضل الورع حسن الظنِّ." },
    { text: "أحسن المقال ما صدقه الفعل." },
    { text: "أنفع الذخائر صالح الأعمال." },
    { text: "أنفع الدواء ترك المنى." },
    { text: "أفضل الصدق الوفاء بالعهود." },
    { text: "أفضل الجود بذل الموجود." },
    { text: "أفضل الأمانة الوفاء بالعهد." },
    { text: "أحسن المروءة الوُدُّ." },
    { text: "أفضل الزهد إخفاء الزهد." },
    { text: "أصدق القول ما طابق الحق." },
    { text: "أعدل الخلق أقضاهم بالحقِّ." },
    { text: "أزين الشيم الحلم والعفاف." },
    { text: "أحسن أفعال المقدر العفو." },
    { text: "أحسن ملابس الدين الحياء." },
    { text: "أنفع المواعظ ما ردع." },
    { text: "أحسن شيء الورع." },
    { text: "أفضل الناس السخي الموقن." },
    { text: "أسعد الناس العاقل المؤمن." },
    { text: "أفضل الناس أنفعهم للناس." },
    { text: "أعقل الناس أعذرهم للناس." },
    { text: "أفضل الأدب حسن المروءة." },
    { text: "أشرف المروءة حسن الأخوة." },
    { text: "أفضل الكرم إتمام النعم." },
    { text: "أحسن الشيم شرف الهمم." },
    { text: "أقوى الوسائل حسن الفضائل." },
    { text: "أنفذ السهام دعوة المظلوم." },
    { text: "أحسن العدل نصرة المظلوم." },
    { text: "أفضل الصبر عند مر الفجيعة." },
    { text: "أنفع الكنوز محبة القلوب." },
    { text: "أحسن الجود عفو بعد مقدرة." },
    { text: "أفضل الطاعات هجر اللذات." },
    { text: "أعلى مراتب الكرم الإيثار." },
    { text: "أعظم الملك ملك النفس." },
    { text: "أطيب العيش القناعة." },
    { text: "أبعد الهمم أقربها من الكرم." },
    { text: "أوفر القسم صحة الجسم." },
    { text: "أفضل المعروف إغاثة الملهوف." },
    { text: "أفضل العمل ما أريد به وجه الله." },
    { text: "أفضل البرّ ما أصيب به أهله." },
    { text: "أفضل البرّ ما أصيب به الأبرار." },
    { text: "أمنع حُصون الدين التقوى." },
    { text: "أشرف حسبٍ حسنُ الأدب." },
    { text: "أحسن الصنائع ما وافق الشّرائع." },
    { text: "أفضل الذخائر حسن الصنائع." },
    { text: "أفضل الجهاد مجاهدة المرء نفسه." },
    { text: "أحسن المكارم الجود." },
    { text: "أشرف الأعمال الطاعة." },
    { text: "أفضل السبل الرّشد." },
    { text: "أحسن الكرم الايثار." },
    { text: "أفضل الايمان الأمانة." },
    { text: "أفضل الشرف الأدب." },
    { text: "أعظم الشرف التواضع." },
    { text: "أشجع الناس أسخاهم." },
    { text: "أفضل الصبر الصبرُ الصَّبْرُ." },
    { text: "أحسن اللباس الورع." },
    { text: "أوقى جُنَّةُ الثُّقَى." },
    { text: "أفخر الذخر الهدى." },
    { text: "والحجُّ جهاد الضعيف." },
    { text: "أفضل السخاء الايثار." },
    { text: "أفضل التَّوْشُل الاستغفار." },
    { text: "أسنى المواهب العدل." },
    { text: "أفضل العبادة الزهادة." },
    { text: "أفضل الايمان الاحسان." },
    { text: "أفضل السعادة استقامة الدين." },
    { text: "أفضل الدين اليقين." },
    { text: "أكبر البرّ الرفق." },
    { text: "أكبر الحساب الخُلُق." },
    { text: "أحسن القول السَّداد." },
    { text: "أعقلكم أطوعكم." },
    { text: "أرحمكم أزهدكم." },
    { text: "أحياكم أحلمكم." },
    { text: "أغناكم أقنعكم." },
    { text: "أنجحكم أصدقكم." },
    { text: "أكيسكم أورعكم." },
    { text: "أحسن شيء الخلق." },
    { text: "أجل شيء الصدق." },
    { text: "أفضل شيء الرّفق." },
    { text: "أفيضوا في ذكر الله فإنّه أحسن الذكر." },
    { text: "إملكوا أنفسكم بدوام جهادها." },
    { text: "إلموا الجماعة واجتنبوا الفرقة." },
    { text: "إستنزلوا الرزق بالصدقة." },
    { text: "أطيعوا الله حسب ما أمركم به رسله." },
    { text: "إعملوا إذا علمتم." },
    { text: "أخلصوا إذا عملتم." },
    { text: "ألن كنفك وتواضع الله يرفعك." },
    { text: "إقنع بما أوتيته تكن مكفيًا." },
    { text: "إرض من الرزق بما قُسم لك تكن مكفيًا." },
    { text: "إرض بما قُسم لك تكن مؤمنًا." },
    { text: "أكرم نفسك ما أعانتك على طاعة الله." },
    { text: "إشتغل بشكر النعمة عن التّطرب بها." },
    { text: "إمشِ بدائك ما مشى بك." },
    { text: "إستغن عمّن شئت وكن نظيره." },
    { text: "أحسن إلى من شئت وكن أميره." },
    { text: "إجعل رفيقك عملك وعدوّك أملك." },
    { text: "إعدل تدُم لك القدرة." },
    { text: "إحفظ بطنك وفرجك من الحرام." },
    { text: "أعن أخاك على هدايته." },
    { text: "اكظم الغيظ تزدد حلماً." },
    { text: "إزهد في الدنيا تنزل عليك الرحمة." },
    { text: "إستدم الشُكر تدم عليك النعمة." },
    { text: "أحسن إلى المسيء تملكه." },
    { text: "إغلب الشهوة تكمل لك الحكمة." },
    { text: "أحسن يُحسَنُ إليك." },
    { text: "أكرم وُدَّك واحفظ عهدك." },
    { text: "أبذل معروفك وكفَّ أذاك." },
    { text: "عصِر الجاهل تسلم." },
    { text: "أطيع العاقل تغنم." },
    { text: "آمن تأمن." },
    { text: "أشكر تُزدد." },
    { text: "أخلص تنل." },
    { text: "إسمَحْ تُسد." },
    { text: "أكرم تُعزَّ." },
    { text: "إصبر تنلْ." },
    { text: "إعتبر تقنتعُ." },
    { text: "إعدل تملك." },
    { text: "أصدق تنجح." },
    { text: "حُسن الأدب أفضل نسب، وأشرف سبب." },
    { text: "من غلب عقله هواه أفلح." },
    { text: "من قبل النصيحة سلم من الفضيحة." },
    { text: "إرضَ تسترح." },
    { text: "أحلم ثَوَّر." },
    { text: "إعتبر تزدجر." },
    { text: "إستغفر تُرزق." },
    { text: "أحسن تسترق." },
    { text: "أطع تُغنم." },
    { text: "إسال تعلم." },
    { text: "الصَّدقة تستدفع البلاء والنقمة." },
    { text: "الصلاة حصن من سطوات الشيطان." },
    { text: "الاعتراف شفيع الجاني." },
    { text: "الإيثار سجية الأبرار وشيمة الأخيار." },
    { text: "العاقل من قمع هواه بعقله." },
    { text: "الكامل من غلبَ جدُّه هزه." },
    { text: "إنجاز الوعد من دلائل المجد." },
    { text: "السخاء والحياء أفضل الخلق." },
    { text: "المرء بفضته لا بصورته." },
    { text: "الورع الوقوف عند الشبهة." },
    { text: "المؤمن من وقى دينه بدنيه." },
    { text: "الكريم من صان عرضه بماله." },
    { text: "الطاعة والبر هما المتجر الربح." },
    { text: "النبل التحلي بالجود ، والوفاء بالعهود." },
    { text: "الصدقات تنزل الرحمة." },
    { text: "العفة تُضعف الشهوة." },
    { text: "المنصف كثير الأولياء والأصدقاء." },
    { text: "الموقن أشد الناس خوفاً على نفسه." },
    { text: "الكريم يأبي العار ويكرم الجار." },
    { text: "الأمر بالمعروف أفضل أعمال الخلق." },
    { text: "العاقل من صان لسانه من الغيبة." },
    { text: "إكمال المعروف أحسن من ابتدائه." },
    { text: "المشاورة راحة لك وتعب لغيرك." },
    { text: "المؤمن حيٌّ غنيٌّ موقنٌ تقِيٌّ." },
    { text: "المؤمن إذا سئل أسعف وإذا سأل خفف." },
    { text: "القانع ناجٍ من آفات المطامع." },
    { text: "التنزُّه عن المعاصي عبادة الثوابين." },
    { text: "الجود في الله عبادة المقربين." },
    { text: "الصدق عماد الإسلام ودعامة الإيمان." },
    { text: "المؤمن عفيف في الغنى متنزّه عن الدنيا." },
    { text: "التقوى ثمرة الدين وماراة اليقين." },
    { text: "الورع من تنزّهت نفسه وشرفت خلّاله." },
    { text: "العدل رأس الإيمان وجمع الإحسان." },
    { text: "الصبر على المصيبة يجزل المثوبة." },
    { text: "الأدب والدين نتيجة العقل." },
    { text: "الكريم من جازى الإساءة بالإحسان." },
    { text: "المحسن من عمّ الناس بالإحسان." },
    { text: "الشجاعة نصرة حاضرة ، وفضيلة ظاهرة." },
    { text: "الحازم من دارى زمانه." },
    { text: "الأمانة تؤدي إلى الصدق." },
    { text: "الصبر أول لوازم الإيقان." },
    { text: "الصدق أقوى دعائم الإيقان." },
    { text: "اكتساب الحسنات من أفضل المكاسب." },
    { text: "السعيد من استهان بالمفقود." },
    { text: "الكريم من جاد بالموجود." },
    { text: "المبادرة إلى العفو من أخلاق الكرام." },
    { text: "النفس الكريمة لا تؤثر فيها النكبات." },
    { text: "الرضا بقضاء الله يهون عظيم الرزايا." },
    { text: "الشكر مأخوذ على أهل النعم." },
    { text: "المعروف كنز فانظر عند من تودعه." },
    { text: "الرضا بالكفاف يؤدي إلى العفاف." },
    { text: "الصدقة في السرّ من أفضل البرّ." },
    { text: "الصدقة تقي مصارع السوء." },
    { text: "المشورة تجلب لك صواب غيرك." },
    { text: "التواضع من مصائد الشرف." },
    { text: "المؤمن يعاف الله ويألف الجد." },
    { text: "القانع غني وإن جاع وعرى." },
    { text: "المؤمن يُنصف من لا ينصفه." },
    { text: "العزلة أفضل شيم الأكياس." },
    { text: "الذكر هداية العقول ، وتبصرة النفوس." },
    { text: "الطاعة أقوى سبب." },
    { text: "العمل كله هباء إلا ما أخلص فيه." },
    { text: "الندم على الذنب يمنع من معاودته." },
    { text: "إستقباح الشر يدعو إلى تجنّبه." },
    { text: "الفكر في الخير يدعو إلى العمل به." },
    { text: "الحياء زينة الفتاة." },
    { text: "الحياء يصدّ عن فعل القبيح." },
    { text: "الحازم من اطرح المؤن والكلف." },
    { text: "الفعل الجميل ينبىء عن علوّ الهمة." },
    { text: "الكفّ عمّا في أيدي الناس عفة وكبر همة." },
    { text: "العاقل من صدّقت أقواله أفعاله." },
    { text: "الكريم من سبق نواله سؤاله." },
    { text: "الظنّ الصواب من شيم الألباب." },
    { text: "المؤمن ليّن العريكة سهل الخلققة." },
    { text: "الذكر جلاء البصائر ونور السرائر." },
    { text: "إدمان الصدق أفضل عُدّة." },
    { text: "إخوان الدين أبقى مودّة." },
    { text: "التثبت في القول يؤمن العثر والرّتلل." },
    { text: "التوبة تطهّر القلوب وتغسل الذنوب." },
    { text: "المواعظ صقال النفوس وجلاء القلوب." },
    { text: "احتمال الدنيا من كرم السجينة." },
    { text: "الشكر زينة الرخاء وحصن النعماء." },
    { text: "الإيمان صبر في البلاء وشكر في الرخاء." },
    { text: "المجاهدون تُفتح لهم أبواب السماء." },
    { text: "الجهاد عماد الدين ومنهج السعداء." },
    { text: "الثرود إلى الناس رأس العقل." },
    { text: "الإحسان إلى المسيء أحسن الفضل." },
    { text: "الدين لا يصلحه إلا العقل." },
    { text: "الحياة تمام، الكرم وأحسن الشيم." },
    { text: "الحلم حلية العمل، وعدة السالم." },
    { text: "السلم وعدة السلامة، وعلامة الاستقامة." },
    { text: "الصبر على المضض يؤدي إلى إصابة الفرصة." },
    { text: "التقوى أوثق حصن وأوفى حرز." },
    { text: "المعروف أنمى زرع." },
    { text: "التعاون على إقامة الحق أمانة وديانة." },
    { text: "العقل رقي إلى عليين." },
    { text: "الكرم إيثار العرض على المال." },
    { text: "الرجاء لرحمة الله أنجح." },
    { text: "العمل بطاعة الله أربح." },
    { text: "الاشتغال بتزكية النفس أصلح." },
    { text: "الاتكال على القضاء أروح." },
    { text: "الزهد في الدنيا الراحة العظمى." },
    { text: "أخو العزّ من تحلّى بالطاعة." },
    { text: "أخو الغنى من التحف بالقناعة." },
    { text: "المداراة أحمدُ الخلال." },
    { text: "الموااسة أفضل الأعمال." },
    { text: "التردّي في القول يؤمن الرّذل." },
    { text: "التأثّي في الفعل يُؤمن الخطل." },
    { text: "الأعمال في الدنيا تجارة الآخرة." },
    { text: "الأيّام تُوضح السّرائر الكامنة." },
    { text: "العالم الذي لا يملُّ من تعلّم العلم." },
    { text: "الحليم الذي لا يشقّ عليه مؤونة الحلم." },
    { text: "إخلاص العمل من قوّة اليقينين وصلاح النية." },
    { text: "الشكر ترجمان النية ولسان الطويّة." },
    { text: "التّصيحة من أخلاق الكرام." },
    { text: "المروءة تحثّ على المكارم." },
    { text: "الكرم تحمل أعباء المغارم." },
    { text: "الدّين يصدّ عن المحارم." },
    { text: "الغني من أثر القناعة." },
    { text: "السّعيد من أخلص الطّاعة." },
    { text: "العقل في الغربة قربة." },
    { text: "أصاب متأنٍ أو كاد." },
    { text: "المؤمن منيبٌ مُستغفر توّاب." },
    { text: "المغبوط من قوي يقينه." },
    { text: "العاقل من أَعظّ بغيره." },
    { text: "آية البلاغة قلب عَقول ، ولسانُ قائل." },
    { text: "الخُلُق المحمود من ثمار العقل." },
    { text: "العلم رشدٌ لمن عمل به." },
    { text: "العقل زينٌ لمن رُزقَه." },
    { text: "العزيز من اعتزّ بالطاعة." },
    { text: "الغنيّ من استغنى بالقناعة." },
    { text: "إحسان النية يوجب المثوبة." },
    { text: "الحازم من كفّ أذاه." },
    { text: "العاقل من بذل نداءه." },
    { text: "الكريم من بذل إحسانه." },
    { text: "أوّل العبادة انتظار الفرج بالصبر." },
    { text: "الدين شجرة أصلها التسليم والرضا." },
    { text: "العقل شجرة ثمرها السخاء والحياء." },
    { text: "الصدق أشرف خلائق الموقن." },
    { text: "الصبر خير جنود المؤمن." },
    { text: "الحزم والفضيلة في الصبر." },
    { text: "الصبر أعون شيء على الدهر." },
    { text: "الصادق على شفا منجاة وكرامة." },
    { text: "المؤمن مُنْزَهٌ من الزيغ والشقاق." },
    { text: "الطاعة تُطفئ غضب الرب." },
    { text: "العالم ينظر بقلبه وخاطره." },
    { text: "العاقل يعتمد على عمله." },
    { text: "العالم من عرف قدره." },
    { text: "العقل ثوب جديد لا يبلى." },
    { text: "أمارات السعادة إخلاص العمل." },
    { text: "المتأني مُصيبٌ وإن هلك." },
    { text: "الكريم يشكر القليل." },
    { text: "المستشير على طرف النجاح." },
    { text: "الندم على الخطيئة استغفار." },
    { text: "المستشير متحصّن من السقوط." },
    { text: "المجرب أحكم من الطيب." },
    { text: "القويّ من قمع لذّته." },
    { text: "العاقل من أamat شهوته." },
    { text: "الجمال الباطن حسن السرية." },
    { text: "العاقل من وعظته التجارب." },
    { text: "الصواب من فروع الروية." },
    { text: "السخاء عنوان المروءة والبذل." },
    { text: "الحلم نورٌ جوهره العقل." },
    { text: "الأمانة فضيلة لمن أداها." },
    { text: "المواعظ شفاء لمن عمل بها." },
    { text: "العُقلة رأس كل خير." },
    { text: "التسليم أن لا تتهم." },
    { text: "التفكر في آلاء الله نعيم العبادة." },
    { text: "إخفاء الفاقة والأمراض من المروّة." },
    { text: "المعين على الطاعة خير الأصحاب." },
    { text: "إظهار الغنى من الشُكر." },
    { text: "الإحسان ذخراً والكريم من حازه." },
    { text: "التقوى حرز لمن عمل بها." },
    { text: "الأمانة فوز لمن رعاها." },
    { text: "العالم حيّ وإن كان ميتاً." },
    { text: "القناعة تؤدي إلى العزّ." },
    { text: "السعادة ما أفضت إلى الفوز." },
    { text: "الإعتبار يقود إلى الرُشد." },
    { text: "التَنَزُّهُ يؤدّي إلى الزهد." },
    { text: "الصدق ينجيك وإن خفته." },
    { text: "الصدق صلاح كلُّ شيء." },
    { text: "العاقل من أحرز أمره." },
    { text: "الكاظِم من أمت أضغانه." },
    { text: "الحليم من احتمل إخوانه." },
    { text: "الورع أساس التقوى." },
    { text: "القناعة رأس الغنى." },
    { text: "العُرُّ إدراك الانتصار." },
    { text: "الكرم حُسن الإصطبار." },
    { text: "العفو أحسن الانتصار." },
    { text: "الطَّاعة تعظيم الإمامة." },
    { text: "الامامة نظام الامّة." },
    { text: "العفو يوجب المجد." },
    { text: "السخاء يُكسب الحمد." },
    { text: "الانصاف يستديم المحبّة." },
    { text: "الجنة مال الفائز." },
    { text: "الطاعة تستدر المثوبة." },
    { text: "المقرُّ بالذنوب تائب." },
    { text: "الصدقة كنز الموسر." },
    { text: "الاحسان يسترق الإنسان." },
    { text: "الصدق كمال الثبيل." },
    { text: "التواضع سلّم الشرف." },
    { text: "الصحّة أفضل النعم." },
    { text: "الحياة تمام الكرم." },
    { text: "التقوى حصن المؤمن." },
    { text: "الأمل رفيقٌ مؤنس." },
    { text: "النيّة أساس العمل." },
    { text: "الاعتبار يفيد الرشاد." },
    { text: "التجارب علمٌ مستفاد." },
    { text: "الحياة خلقٌ مرضيٌّ." },
    { text: "العقل مُرْكب العلم." },
    { text: "الغفلة ضدّ الحزم." },
    { text: "العلم قاتل الجهل." },
    { text: "الجنة أفضل غاية." },
    { text: "العلم أشرف هداية." },
    { text: "الصدق أفضل رواية." },
    { text: "الاستشارة عين الهداية." },
    { text: "الأدب كمال الرجل." },
    { text: "الأدب صورة العقل." },
    { text: "الورع شيمة الفقهاء." },
    { text: "المعروف ذخيرة الأبد." },
    { text: "الكريم من بدأ بإحسانه." },
    { text: "العدل أفضل سجية." },
    { text: "الرفق أخو المؤمن." },
    { text: "العمل رفيق الموقن." },
    { text: "العافية أهنا النعم." },
    { text: "الإفضال أفضل الكرم." },
    { text: "الانصاف أفضل الكرم." },
    { text: "المروّة اجتناب الدنيّة." },
    { text: "الكرم احتمال الجبيرة." },
    { text: "شرُّ الإِخوان من تُكَلَّفَ له." },
    { text: "إذا احتشم المؤمن أخاه فقد فارقَه." },
    { text: "لكلِّ قادمٍ حيرةٌ، فابسطوه بالكلام." },
    { text: "لكلِّ داخلٍ دهشةٌ، فابدؤوا بالسلام." },
    { text: "لا تصرم أخاك على ارتياب، ولا تهجره بعد استعتاب." },
    { text: "حسد الصديق من سقم المودة." },
    { text: "عاتب أخاك بالاحسان إليه، وردد شره بالإنعام عليه." },
    { text: "لا خير فيمن يهجر أخاه بغير جرم." },
    { text: "لا خير في صديق ضنين." },
    { text: "لا تدوم مع الغدر صحبة الخليل." },
    { text: "ما سعد من شقى إخوانه." },
    { text: "لا تجتمع الخيانة والأخوَّة." },
    { text: "لا أخوَّةً لملول." },
    { text: "لا تحلو مصاحبة غير أديب." },
    { text: "مع الانصاف تدوم الأخوَّة." },
    { text: "لا تصفو الخلَّة مع غير أديب." },
    { text: "ما حفظت الأخوَّة بمثل المواساة." },
    { text: "من أعظم الحمق مواخاة الفجّار." },
    { text: "من النعم الصديق الصدوق." },
    { text: "من صغر الهمّة حسد الصديق على النعمة." },
    { text: "من دنت همته فلا تصحبه." },
    { text: "من لم يحتمل زلل الصديق مات وحيداً." },
    { text: "من ناقش الإخوان قلّ صديقه." },
    { text: "من ساء خلقه قلاه صاحبه وصفيه." },
    { text: "من حفر لأخيه بئراً أوقعه الله فيه." },
    { text: "من لا صديق له لا ذخَر له." },
    { text: "من لا إخوان له لا أهل له." },
    { text: "من لا إخاء له لا خير فيه." },
    { text: "كلما طالت الصُحبة تأكدت المحبّة." },
    { text: "من لم يبالِ بك فهو عدوّك." },
    { text: "من اهتمّ بك فهو صديقك." },
    { text: "كفى بالصُحبة اختباراً." },
    { text: "في حسن المصاحبة يرغب الرفاق." },
    { text: "صديق الجاهل متعوب منكوب." },
    { text: "صديق الأحمق في تعب." },
    { text: "صديق الأحمق معرّض للمعطب." },
    { text: "صديقك من نهاك وعدوّك من أغراك." },
    { text: "شرط المصاحبة قلّة المخالفة." },
    { text: "زُبّ أخٌ لم تلده أمّك." },
    { text: "شرُّ إخوانك من أرضاك بالباطل." },
    { text: "حسن العشرة يستديم المودة." },
    { text: "شرُّ من صاحبته الجاهل." },
    { text: "حسن الصُّحبة يزيد في محبَّة القلوب." },
    { text: "شرُّ إخوانك من تتكلَّف له." },
    { text: "سل عن الرفيق قبل الطريق." },
    { text: "شرُّ الأصحاب السريع الإنقلاب." },
    { text: "تناسَ مساوي الإخوان تستدم مودَّتهم." },
    { text: "شرُّ الأتراب الكثير الإرتياب." },
    { text: "سل عن الجار قبل الدار." },
    { text: "بشس الجار جار السوء." },
    { text: "بحُسن الموافقة تدوم الصُّحبة." },
    { text: "بحُسن العشرة تدوم المودة." },
    { text: "بالثَّوَاخي في الله تُثمر الأخوَّة." },
    { text: "بحُسن العشرة تأنس الرِّفاق." },
    { text: "بحُسن الصُّحبة تكثر الرِّفاق." },
    { text: "بالرِّفق تدوم الصُّحبة." },
    { text: "إذا ظهر غدْر الصَّديق سهّل هجره." },
    { text: "أفضل النَّاس مَنَّة من بدأ بالمودة." },
    { text: "أولى من أحببت من لا يقلاك." },
    { text: "أفضل العُدد ثقة الإخوان." },
    { text: "أحسن الإحسان مواساة الإخوان." },
    { text: "أطع أخاك وإن عصاك واصله وإن جفالك." },
    { text: "الصديق أفضل عُدّة وأتقى مودّة." },
    { text: "الأخوان زينة في الرخاء وعُدّة في البلاء." },
    { text: "لا تحدث الناس كلما تسمع، فكفى بذلك خرقاً." },
    { text: "لا تسيء اللفظ وإن ضاق عليك الجواب." },
    { text: "لا خير في الصمت عن الحكم، كما أنه لا خير في القول بالجهل." },
    { text: "تكلموا تعرفوا، فإن المرء مخبوء تحت لسانه." },
    { text: "لا تقل ما لا تعلم، بل لا تقل كل ما تعلم." },
    { text: "إذا تمّ العقل نقص الكلام." },
    { text: "اللسان سبع، إن خلّيه عنه عقر." },
    { text: "قلب الأحمق في فيه، ولسان العاقل في قلبه." },
    { text: "لسان العاقل وراء قلبه، وقلب الأحمق وراء لسانه." },

  { title: "العزلة", quote: "يا أيُّها المرءُ فكُن مُفرداً، دهرك لا تأنس بِإِنسانِ" },
  { title: "الماضي لا يعود", quote: "واللهُ لا يُرجِعُ شيئاً قد مضى، واللهُ لا يُبرِمُ شيئاً نُقِضا" },
  { title: "حسن الظن", quote: "وظنّي فيك يا ربّي جميلٌ، فحقِّق يا إِلهي حُسن ظنّي" },
  { title: "عناء الدنيا", quote: "ما هذِهِ الدُنيا وطالِبُها، إِلّا عناءً وهو لا يدري" },
  { title: "إقبال وإدبار", quote: "إِن أقبلت شغلت دِيانتهُ، أو أدبرت شغلتهُ بِالفقرِ" },
  { title: "الصبر على الدهر", quote: "اصبِر على الدهرِ لا تغضب على أحدٍ، فلا ترى غير ما في الدهرِ مخطوطُ" },
  { title: "دار لا نفع فيها", quote: "ولا تقيمنّ بِدارٍ لا انتِفاع بِها، فالأرضُ واسِعةٌ والرِزقُ مبسوطُ" },
  { title: "الموت قبل القبور", quote: "وفي الجهلِ قبل الموتِ موتٌ لِأهلِهِ، وأجسادُهُم قبل القُبورِ قُبورُ" },
  { title: "حياة العلم", quote: "وإِنّ اِمرءاً لم يُحيِ بِالعِلمِ ميِّتٌ، وليس لهُ حتّى النشورِ نُشورُ" },
  { title: "القدرة والظلم", quote: "لا تظلِمنّ إِذا ما كُنت مُقتدِراً، فالظُلمُ مرتعُهُ يُفضي إِلى الندمِ" },
  { title: "عين الله لم تنم", quote: "تنامُ عينُك والمظلومُ مُنتبِهٌ، يدعو عليك وعينُ اللهِ لم تنمِ" },
  { title: "تعزية", quote: "فلا المُعزّي بِباقٍ بعد مِيتتِهِ، ولا المُعزِّي ولو عاشا إِلى حينِ" },
  { title: "قضاء الخلاق", quote: "قضاءُ لِخلّاقِ الخلائِقِ سابِقٌ، وليس على ردِّ القضا أحدٌ يقوى" },
  { title: "خيانة الدهر", quote: "ومن عرف الدهر الخؤون وصرفهُ، تصبّر لِلبلوى ولم يُظهِر الشكوى" },
  { title: "المعيشة المذلة", quote: "لا تطلُبّن معيشةً بِمذلةٍ، واِربأ بِنفسِك عن دنِيِّ المُطلبِ" },
  { title: "علاج الفقر", quote: "وِإِذا اِفتقرت فداوِ فقرك بِالغِنى، عن كُلِّ ذي دنسٍ كجِلدِ الأجربِ" },
  { title: "الرزق يعود", quote: "فليرجِعنّ إِليك رزقُك كُلُّهُ، لو كان أبعدُ مِن مقامِ الكوكبِ" },
  { title: "طول الأمل", quote: "تؤمِّلُ في الدُنيا طويلاً ولا تدري، إِذا جنّ ليلٌ هل تعيشُ إِلى الفجرِ" },
  { title: "أكفان منسوجة", quote: "وكم مِن فتىً يُمسي ويُصبِحُ آمِناً، وقد نُسِجت أكفانُهُ وهو لا يدري" },
  { title: "ذهاب الوفاء", quote: "ذهب الوفاءُ ذِهاب أمسِ الذاهِبِ، فالناسُ بين مُخاتِلٍ ومُوارِبِ" },
  { title: "قلوب العقارب", quote: "يفشون بينهُمُ المودّة والصفا، وقُلوبهُم محشُوّةٌ بِعقارِبِ" },
  { title: "صروف الدهر", quote: "نومُ اِمرئٍ خيرٌ لهُ مِن يِقظة، وفي صُروفِ الدهرِ لِلمرءِ عِظه" },
  { title: "صندوق العمل", quote: "يا من بِدُنياهُ اِشتغل وغرّهُ طولُ الأمل، الموتُ يأتي بغتةً والقبرُ صندوقُ العمل" },
  { title: "أخلاق مطهرة", quote: "إِنّ المكارِم أخلاقٌ مُطهرةٌ، فالدّينُ أولُّها والعقلُ ثانيها" },
  { title: "محل الديار", quote: "إِنّ الّذين بنوا فطال بِناؤُهُم، جرتِ الرِياحُ على محلِّ دِيارِهِم" },
  { title: "أنفاس تعد", quote: "حياتُك أنفاسٌ تُعدُّ فكُلّما، مضى نفسٌ أنقصت بِهِ جُزءاً" },
  { title: "الدهر يوم وليلة", quote: "ألم تر أنّ الدهر يومٌ وليلةٌ، يكُرّانِ مِن سبتٍ جديدٍ إِلى سبتِ" },
  { title: "تشتت الشمل", quote: "فقُل لِجديدِ الثوبِ لا بُدّ مِن بِلىً، وقُل لِاِجتِماعِ الشملِ لا بُدّ مِن شتِ" },
  { title: "التواضع والثياب", quote: "ودعِ التواضُع في الثيابِ تخشُّعاً، فاللهُ يعلمُ ما تجِنُّ وتكتُمُ" },
  { title: "الدواء فيك", quote: "دواؤُك فيك وما تُبصِرُ، وداؤُك مِنك وما تشعُرُ" },
  { title: "العالم الأكبر", quote: "أتزعُمُ أنّك جُرمٌ صغير، وفيك اِنطوى العالمُ الأكبرُ" },
  { title: "الكتاب المبين", quote: "فأنت الكِتابُ المُبينُ الّذي، بِأحرُفِهِ يظهرُ المُضمرُ" },
  { title: "اعتزال الناس", quote: "فاِعتزِلِ الناس ما اِستطعتُ ولا تركن إِلى من تخافُ مِن دنسِه" },
  { title: "الأخ الحقيقي", quote: "أخوك الّذي إِن أخرجتك مُلِمّةٌ، مِن الدهرِ لم يبرح لها الدهرُ واحِما" },
  { title: "الصبر على اللذات", quote: "صبرتُ عنِ اللذاتِ لمّا تولّتِ، وألزمتُ نفسي صبرها فاِستمرّتِ" },
  { title: "حيث تجعل نفسك", quote: "وما المرءُ إِلّا حيثُ يجعلُ نفسهُ، فإِن طمِعت تاقت وإِلّا تسلّتِ" },
  { title: "الشكوى والصبر", quote: "ولا خير في الشكوى إِلى غيرِ مُشتكي، ولا بُدّ مِن شكوى إِذا لم يكُن صبرُ" },
  { title: "شربة مورودة", quote: "إِنّ المنِيّة شُربةٌ مورودةٌ، لا تجزعنّ وشدّ لِلترحيلِ" },
  { title: "أدب ومحمود", quote: "كُن اِبن من شِئت واِكتسِب أدباً، يُغنيك محمُودُهُ عنِ النسبِ" },
  { title: "ليس الفتى من قال", quote: "إِنّ الفتى من يُقولُ ها أنا ذا، ليس الفتى من يُقولُ كان أبي" },
  { title: "صحبة الجاهل", quote: "فلا تصحب أخا الجهلِ وإياك واِيّاهُ، فكم مِن جاهِلٍ أردى حليماً حين آخاهُ" },
  { title: "قياس المرء", quote: "يُقاسُ المرءُ بِالمرءِ، إِذا ما هُو ما شاهُ" },
  { title: "الغنى والفقر بالنفوس", quote: "الغِنى في النُفوسِ والفقرُ فيها، اِن تجزّت فقلّ ما يُجزيها" },
  { title: "تعليل النفس", quote: "علِّلِ النفس بِالقنوعِ واِلّا، طلبت مِنك فوق ما يكفيها" },
  { title: "ظل العمر", quote: "إِنّما أنت ظلّ عُمرك ما عمّرت بِالساعةِ الّتي أنت فيها" },
  { title: "صون السر", quote: "صُنِ السر عن كُلِّ مُستخبِرٍ، وحاذِر فما الحزمُ إِلّا الحِذِر" },
  { title: "أسير السر", quote: "أسيرُك سِرُّك إِن صُنتهُ، وأنت أسيرٌ لهُ إِن ظهر" },
  { title: "الحرص على الدنيا", quote: "دعِ الحِرص على الدُنيا وفي العيشِ فلا تطمع، ولا تجمع مِن المالِ فلا تدري لِمن تجمع" },
  { title: "الرزق مقسوم", quote: "فإِنّ الرِزق مقسومٌ وسوءُ الظنِّ لا ينفع، فقيرٌ كُلُّ من يطمع، غنيٌّ كُلُّ من يقنع" },
  { title: "ضيق الزمان", quote: "إِذا ضاق الزمانُ عليك فاِصبِر، ولا تيأس مِن الفرجِ القريبِ" },
  { title: "تنكر الدهر", quote: "تنكّر لِي دهري ولم يدرِ أنّني، أعزُّ وروعاتُ الخُطوبِ تهونُ" },
  { title: "إظهار الصبر", quote: "فظلّ يُريني الخطبُ كيف اِعتِداؤُهُ، وبِتُّ أُريهِ الصبر كيف يكونُ" },
  { title: "الأرزاق حظ", quote: "ولكِنّما الأرزاقُ حظٌّ وقِسمةٌ، بفضلِ مليكٍ لا بِحيلةِ طالِبِ" },
  { title: "الروح والجسد", quote: "جِسمي معي غير أن الروح عِندكُمُ، فالجِسمُ في عزبةٍ والروحُ في وطنِ" },
  { title: "اكتساب العلم", quote: "العِلمُ زينٌ فكُن لِلعِلمِ مُكتسِباً، وكُن لهُ طالِباً ما عِشت مُقتبِسا" },
  { title: "التخلق بالآداب", quote: "فمن تخلّق بِالآدابِ ظلّ بِها، رئيس قومٍ إِذا ما فارق الرُؤسا" },
  { title: "عزم التصبر", quote: "لئِن ساءني دهرٌ عزمتُ تصبُّراً، فكُلُ بلاءٍ لا يدومُ يسيرُ" },
  { title: "زوال السرور", quote: "وإِن سرّني لم ابتهج بِسُروره، فكُلُّ سُرورٍ لا يدومُ حقيرُ" },
  { title: "سهام الموت", quote: "واعلم بِأنّ سِهام الموتِ نافِذةٌ، في كُلِ مُدّرعٍ مِنا ومُتّرِسِ" },
  { title: "سفينة النجاة", quote: "ترجو النجاة ولم تسلُك مسالِكها، إِن السفينة لا تجري على اليبسِ" },
  { title: "الرفق والأناة", quote: "الرِفقُ يُمنٌ والأناةُ سعادةٌ، فتأنّ في أمرٍ تُلاقِ نجاحا" },
  { title: "العسر والتيسير", quote: "إِصبِر قليلاً فبعد العُسرِ تيسيرُ، وكُلُّ أمرٍ لهُ وقتٌ وتدبيرُ" },
  { title: "تقدير المهيمن", quote: "ولِلمُهيمِنِ في حالاتِنا نظرٌ، وفوق تقديرِنا لِلّهِ تقديرُ" },
  { title: "جزع النفس", quote: "النفسُ تجزع أن تكون فقيرةً، والفقرُ خيرٌ مِن غِنىً يُطغيها" },
  { title: "غنى النفوس", quote: "وغِنى النفوسِ هُو الكفافُ وإِن أبت، فجميعُ ما في الأرضِ لا يكفيها" },
  { title: "الرزق المكتوب", quote: "حتّى تُودّي الّذي في اللوحِ خُطّ لهُ، إِن هِي أتتهُ وإِلّا سوف يأتيها" },
  { title: "الصبر على الشدة", quote: "صبراً على شِدّةِ الأيامِ إِنّ لها، عُقبى وما الصبرُ إِلّا عِند ذي الحسبِ" },
  { title: "الحلم والصفح", quote: "وكُن معدناً لِلحِلمِ واصفح عنِ الأذى، فإِنك لاقٍ ما عمِلت وسامِعُ" },
  { title: "الحب المقارب", quote: "أحِبُّ إِذا أحببتُ حُباً مُقارِباً، فإِنك لا تدري متى أنت نازِعُ" },
  { title: "تجنب السفاهة", quote: "إِذا ما اِجتررت سفاه السفيهِ، عليّ فإِنّي أنا الأسفهُ" },
  { title: "هبوب الرياح", quote: "إِذا هبّت رِياحُك فاِغتنِمها، فعُقبى كُلُّ خافِقةٍ سُكونُ" },
  { title: "ظفر اليدين", quote: "إِذا ظفِرت يداك فلا تقصِّر، فإِنّ الدهر عادتهُ يخونُ" },
  { title: "بلوى الصروف", quote: "بلوتُ صُروف الدهرِ سِتين حُجّةً، وجرّبتُ حاليهِ مِن العُسرِ واليُسرِ" },
  { title: "خير الغنى", quote: "فلم أر بعد الدينِ خيراً مِن الغِنى، ولم أر بعد الكُفرِ شرّاً مِن الفقرِ" },
  { title: "العون من الله", quote: "إِذا لم يكُن عونٌ مِن اللهِ للِفتى، فأكثرُ ما يجني عليهِ اِجتِهادُهُ" },
  { title: "الدنيا فناء", quote: "إِنّما الدُنيا فناءٌ، ليس لِلدُّنيا ثُبوتُ" },
  { title: "بيت العنكبوت", quote: "إِنّما الدُنيا كبيتٍ، نسجتهُ العنكبوتُ" },
  { title: "حالان وسجالان", quote: "هِي حالانِ شِدّةٌ ورخاءُ، وسِجالانِ نِعمةٌ وبلاءُ" },
  { title: "الفطنة والدهر", quote: "والفتى الحاذِقُ الأريبُ إِذا ما، خانهُ الدهرُ لم يخُنهُ عزاءُ" },
  { title: "تأديب الدهر", quote: "الدهرُ أدّبني واليأسُ أغناني، والقوتُ أقنعني والصبرُ ربانّي" },
  { title: "صقل التجربة", quote: "وأحكمتني مِن الأيامِ تجرِبةٌ، حتّى نهيتُ الّذي قد كان ينهاني" },
  { title: "حزن الناظر", quote: "كُنت السواد لِناظِري، فبكى عليك الناظِرُ" },
  { title: "الحسب والأخلاق", quote: "ما لِفتىً حسبٌ إِلّا إِذا كمُلت، أخلاقُهُ وحوى الآداب والحسبا" },
  { title: "تفويض الأمر", quote: "رضيتُ بِما قسّم اللهُ لِي، وفوّضتُ أمري إِلى خالِقي" },
  { title: "إحسان الله", quote: "كما أحسن اللهُ فيما مضى، كذلِك يُحسنُ فيما بقي" },
  { title: "المكاره المتباينة", quote: "لا تكرهِ المكروه عِند نُزولِهِ، إِنّ المكارِه لم تزل مُتبايِنه" },
  { title: "نعم كامنة", quote: "كم نِعمةٍ لم تستقِلُّ بِشُكرِها، لِلّهِ في طيِّ المكارِهِ كامِنه" },
  { title: "نضوب البحر", quote: "ألم تر أنّ البحر ينضُبُ ماؤُهُ، ويأتي على حيتانِهِ نُوبُ الدهرِ" },
  { title: "الماضي والآتي", quote: "كُلُّ ماضٍ كأن لم يكُن، كُلُّ آتٍ فكأن قدِ" },
  { title: "سعي للثراء", quote: "وكم ساعٍ لِيُثري لم ينلهُ، وآخِرُ ما سعى الخُلُقُ الثراء" },
  { title: "صون العرض", quote: "صُنِ النفس واِحمِلها على ما يزيِنُها، تعِش سالِماً والقولُ فيك جميلُ" },
  { title: "ضيق الرزق", quote: "وإِن ضاق رِزقُ اليومِ فاِصبِر إِلى غدٍ، عسى نكباتِ الدهرِ عنك تزولُ" },
  { title: "غنى الذليل", quote: "يعِزُّ غنِيُّ النفسِ إِن قلّ مالُهُ، ويغنى غنِيُّ المالِ وهو ذليلُ" },
  { title: "كثرة الإخوان", quote: "فما أكثر الإِخوان حين تعدّهُم، ولكِنهُم في النائِباتِ قليلُ" },
  { title: "رحمة الله", quote: "ذُنوبي إِن فكّرتُ فيها كثيرةٌ، ورحمةُ ربّي مِن ذُنوبي أوسعُ" },
  { title: "الجود بالدنيا", quote: "إِذا حادتِ الدُنيا عليك فجُد بِها، على الناسِ طُرّاً إِنّها تتقلّبُ" },
  { title: "ركوب العار", quote: "النارُ أهونُ من رُكوبِ العارِ، والعارُ يُدخُلُ أهلهُ في النارِ" },
  { title: "زوال البؤس", quote: "فما نُوبُ الحوادِثِ باقياتٌ، ولا البُؤسى تدومُ ولا النعيمُ" },
  { title: "أسف على فائت", quote: "فلا تهلِك على ما فات وجداً، ولا تفرِدك بِالأسفِ الهُمومُ" },
  { title: "حتمية الموت", quote: "الموتُ لا والِداً يُبقي ولا ولداً، هذا السبيلُ إِلى أن لا ترى أحدا" },
  { title: "العمر والدين", quote: "لعمرُك ما الإِنسانُ إِلّا بِدينِهِ، فلا تترُكِ التقوى اِتِّكالاً على النسب" },

        // --- بقية الكود ---
        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('themeToggle').classList.add('active');
            }
        }
        
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('themeToggle').classList.toggle('active', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        
        // Copy to Clipboard
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast('تم النسخ بنجاح'));
        }
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        
        // Export Image
        let currentRatio = '1:1';
        function openExportModal(data) {
            document.getElementById('exportModal').classList.remove('hidden');
            document.getElementById('exportModal').classList.add('flex');
            document.getElementById('exportText').textContent = data.full || data.text || data.quote || data.lines?.join('\n') || '';
        }
        
        function closeExportModal() {
            document.getElementById('exportModal').classList.add('hidden');
            document.getElementById('exportModal').classList.remove('flex');
        }
        
        function setExportRatio(r) {
            currentRatio = r;
            const preview = document.getElementById('exportPreview');
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-ratio="${r}"]`).classList.add('active');
            if(r === '1:1') { preview.style.width = '100%'; preview.style.maxWidth = '400px'; preview.style.aspectRatio = '1/1'; }
            else if(r === '9:16') { preview.style.width = '100%'; preview.style.maxWidth = '300px'; preview.style.aspectRatio = '9/16'; }
            else { preview.style.width = '100%'; preview.style.maxWidth = '500px'; preview.style.aspectRatio = '16/9'; }
        }
        
        async function exportImage() {
            const btn = event.target;
            btn.textContent = 'جاري المعالجة...';
            try {
                const canvas = await html2canvas(document.getElementById('exportPreview'), { scale: 2, backgroundColor: null });
                const a = document.createElement('a');
                a.download = `hikma-${Date.now()}.png`;
                a.href = canvas.toDataURL();
                a.click();
                closeExportModal();
            } catch(e) { alert('حدث خطأ أثناء التصدير'); }
            btn.textContent = 'حفظ الصورة';
        }
        
        // Render Functions
        function renderQuotes() {
            const container = document.getElementById('quotes-container');
            container.innerHTML = quotesData.map((q, i) => `
                <div class="ios-card p-6 animate-slide-up" style="animation-delay: ${i*0.1}s">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-4xl font-amiri text-blue-500/20">"</span>
                        <div class="flex gap-2">
                            <button onclick="copyText('${q.text}')" class="ios-btn w-8 h-8 rounded-lg flex items-center justify-center bg-gray-100 dark:bg-gray-700 p-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg></button>
                            <button onclick="openExportModal(${JSON.stringify(q).replace(/'/g, "\\'")})" class="ios-btn w-8 h-8 rounded-lg flex items-center justify-center bg-gray-100 dark:bg-gray-700 p-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></button>
                        </div>
                    </div>
                    <p class="font-amiri text-lg leading-relaxed text-gray-800 dark:text-gray-200">${q.text}</p>
                </div>
            `).join('');
        }

        function renderDualQuotes() {
            const container = document.getElementById('dual-quotes-container');
            container.innerHTML = quotes.map((q, i) => `
                <div class="ios-card p-8 animate-slide-up flex flex-col justify-center items-center text-center" style="animation-delay: ${i*0.1}s">
                    <p class="font-amiri text-2xl leading-normal mb-6 text-gray-900 dark:text-white">${q.first}</p>
                    <div class="w-16 h-0.5 bg-gray-300 dark:bg-gray-600 mb-6"></div>
                    <p class="font-amiri text-2xl leading-normal mb-6 text-gray-900 dark:text-white">${q.second}</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="copyText('${q.full}')" class="ios-btn px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-700 text-xs">نسخ</button>
                        <button onclick="openExportModal(${JSON.stringify(q).replace(/'/g, "\\'")})" class="ios-btn px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-700 text-xs">تصدير</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPoetry() {
            const container = document.getElementById('poetry-container');
            container.innerHTML = poems.map((p, i) => `
                <div class="ios-card overflow-hidden animate-slide-up" style="animation-delay: ${i*0.1}s">
                    <div class="bg-gradient-to-r from-purple-50/50 to-blue-50/50 dark:from-purple-900/20 dark:to-blue-900/20 p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold text-lg text-purple-700 dark:text-purple-300">${p.title}</h3>
                            <div class="flex gap-2">
                                <button onclick="copyText('${p.lines.join('\\n')}')" class="ios-btn w-8 h-8 rounded-lg flex items-center justify-center bg-white/50 dark:bg-black/30 p-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg></button>
                            </div>
                        </div>
                        <div class="space-y-3 text-center">
                            ${p.lines.map(l => `<div class="poem-line font-amiri text-xl leading-loose text-gray-800 dark:text-gray-200 inline-block w-full">${l}</div>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderBios() {
            const container = document.getElementById('bios-container');
            container.innerHTML = bios.map((b, i) => `
                <div class="ios-card p-6 animate-slide-up" style="animation-delay: ${i*0.1}s">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-xl bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 flex items-center justify-center shrink-0">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-lg mb-2">${b.title}</h3>
                            <p class="font-amiri text-base text-gray-600 dark:text-gray-300 leading-relaxed mb-4">${b.quote}</p>
                            <div class="flex gap-2">
                                <button onclick="copyText('${b.quote}')" class="ios-btn px-3 py-1.5 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs">نسخ</button>
                                <button onclick="openExportModal(${JSON.stringify(b).replace(/'/g, "\\'")})" class="ios-btn px-3 py-1.5 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs">تصدير</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Init
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderQuotes();
            renderDualQuotes();
            renderPoetry();
            renderBios();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منهل الحكمة - الإمام علي (ع)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ios-light-bg: #f2f2f7;
      --ios-dark-bg: #000000;
      --ios-light-card: rgba(255, 255, 255, 0.7);
      --ios-dark-card: rgba(44, 44, 47, 0.6);
      --ios-light-text: #1d1d1f;
      --ios-dark-text: #f2f2f7;
      --ios-accent: #007AFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--ios-light-bg);
      color: var(--ios-light-text);
      transition: background-color 0.3s ease, color 0.3s ease;
      min-height: 100vh;
      padding-top: 60px;
      background-image: url('https://image.qwenlm.ai/public_source/2049f0a4-085e-42c0-8f14-6ebb4a23ff43/1059ce56d-1d3f-97c0-a717-b612278b2335.png');
      background-size: cover;
      background-position: center;
    }

    body.dark-mode {
      background-color: var(--ios-dark-bg);
      color: var(--ios-dark-text);
      background-image: url('https://image.qwenlm.ai/public_source/2049f0a4-085e-42c0-8f14-6ebb4a23ff43/1059ce56d-1d3f-97c0-a717-b612278b2335.png');
    }

    .card {
      background: var(--ios-light-card);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    body.dark-mode .card {
      background: var(--ios-dark-card);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-bar {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      z-index: 100;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--ios-light-card);
      backdrop-filter: blur(20px);
      border-radius: 0 0 20px 20px;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    body.dark-mode .nav-bar {
      background: var(--ios-dark-card);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn {
      background-color: var(--ios-accent);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .btn:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--ios-accent);
      color: var(--ios-accent);
    }

    .footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 14px;
    }

    .footer a {
      color: var(--ios-accent);
      text-decoration: none;
      margin: 0 10px;
    }

    .quote-container {
      padding: 20px;
      margin: 20px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .poem-line {
      margin-bottom: 8px;
      line-height: 1.8;
    }

    .theme-tag {
      display: inline-block;
      background-color: rgba(0, 122, 255, 0.1);
      color: var(--ios-accent);
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 14px;
      margin-top: 10px;
    }

    .export-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .export-content {
      width: 90%;
      max-width: 500px;
      padding: 30px;
      border-radius: 20px;
    }

    .aspect-btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.1);
      border: 1px solid var(--ios-accent);
      color: var(--ios-accent);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .aspect-btn:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    .hidden {
      display: none;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: var(--ios-light-text);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    body.dark-mode .action-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--ios-dark-text);
    }

    .action-btn:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    .dark-toggle {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .dark-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #007AFF;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="nav-bar">
    <h1 class="text-xl font-bold">منهل الحكمة</h1>
    <div class="flex items-center space-x-4">
      <label class="dark-toggle">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container mx-auto px-4 py-8">
    <div id="contentContainer" class="card mb-8">
      <div id="quoteDisplay" class="quote-container text-center">
        <p id="quoteText" class="text-lg leading-relaxed"></p>
        <div id="themeTag" class="theme-tag mt-4 mx-auto"></div>
        <div id="poemLines" class="mt-6 hidden"></div>
      </div>
      
      <div class="controls px-4 pb-4">
        <button id="copyBtn" class="action-btn w-full mb-3">نسخ النص</button>
        <button id="exportBtn" class="action-btn w-full">تصدير كصورة</button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="card p-6">
        <h2 class="text-xl font-bold mb-4">الحكم</h2>
        <p id="hikmaCount" class="text-sm opacity-75"></p>
      </div>
      <div class="card p-6">
        <h2 class="text-xl font-bold mb-4">الأشعار</h2>
        <p id="shi3rCount" class="text-sm opacity-75"></p>
      </div>
      <div class="card p-6">
        <h2 class="text-xl font-bold mb-4">النبذات</h2>
        <p id="nubdhaCount" class="text-sm opacity-75"></p>
      </div>
    </div>
  </main>

  <!-- Export Modal -->
  <div id="exportModal" class="export-modal hidden">
    <div class="card export-content">
      <h2 class="text-xl font-bold mb-6 text-center">اختر تنسيق الصورة</h2>
      <button class="aspect-btn" data-aspect="1">مربع (1:1)</button>
      <button class="aspect-btn" data-aspect="9/16">Portrait (9:16)</button>
      <button class="aspect-btn" data-aspect="16/9">Landscape (16:9)</button>
      <button id="closeExportModal" class="btn w-full mt-4">إلغاء</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>تابعنا على:</p>
    <a href="https://instagram.com/@NE_7U" target="_blank">@NE_7U</a>
    <a href="https://t.me/WWGTR" target="_blank">@WWGTR</a>
    <p class="mt-4 text-sm opacity-75">مصدر الحكمة: منهل الحكمة - الإمام علي (ع)</p>
  </footer>

  <script>
    // Import external data files
    const importData = async () => {
      try {
        const hikamResponse = await fetch('hikam.js');
        const shu3rResponse = await fetch('shu3r.js');
        const aqtabasatResponse = await fetch('aqtabasat.js');
        const nubdhatResponse = await fetch('nubdhat.js');

        const hikamText = await hikamResponse.text();
        const shu3rText = await shu3rResponse.text();
        const aqtabasatText = await aqtabasatResponse.text();
        const nubdhatText = await nubdhatResponse.text();

        eval(hikamText);
        eval(shu3rText);
        eval(aqtabasatText);
        eval(nubdhatText);

        return {
          hikam: window.hikam || [],
          shu3r: window.shu3r || [],
          aqtabasat: window.aqtabasat || [],
          nubdhat: window.nubdhat || []
        };
      } catch (error) {
        console.error('Error loading data:', error);
        return {
          hikam: [],
          shu3r: [],
          aqtabasat: [],
          nubdhat: []
        };
      }
    };

    // Initialize data
    let allData = [];
    let currentIndex = 0;
    let currentType = '';
    let dataSources = {};

    const loadData = async () => {
      dataSources = await importData();
      
      // Combine all data sources
      allData = [
        ...dataSources.hikam.map(item => ({ ...item, type: 'hikma' })),
        ...dataSources.shu3r.map(item => ({ ...item, type: 'shi3r' })),
        ...dataSources.aqtabasat.map(item => ({ ...item, type: 'aqtabasa' })),
        ...dataSources.nubdhat.map(item => ({ ...item, type: 'nubdha' }))
      ];
      
      // Update counts
      document.getElementById('hikmaCount').textContent = `عدد الحكم: ${dataSources.hikam.length}`;
      document.getElementById('shi3rCount').textContent = `عدد الأبيات: ${dataSources.shu3r.length}`;
      document.getElementById('nubdhaCount').textContent = `عدد النبذات: ${dataSources.nubdhat.length}`;
      
      if (allData.length > 0) {
        showRandomQuote();
      }
    };

    // Display random quote/poem/excerpt
    const showRandomQuote = () => {
      if (allData.length === 0) return;
      
      const randomIndex = Math.floor(Math.random() * allData.length);
      const item = allData[randomIndex];
      currentIndex = randomIndex;
      currentType = item.type;
      
      const quoteTextElement = document.getElementById('quoteText');
      const themeTagElement = document.getElementById('themeTag');
      const poemLinesElement = document.getElementById('poemLines');
      
      // Reset elements
      themeTagElement.classList.add('hidden');
      poemLinesElement.classList.add('hidden');
      poemLinesElement.innerHTML = '';
      
      switch (item.type) {
        case 'hikma':
          quoteTextElement.textContent = item.text;
          break;
        case 'shi3r':
          quoteTextElement.textContent = '';
          poemLinesElement.classList.remove('hidden');
          
          if (item.lines && item.lines.length > 0) {
            item.lines.forEach(line => {
              const lineElement = document.createElement('div');
              lineElement.className = 'poem-line text-center';
              lineElement.textContent = line;
              poemLinesElement.appendChild(lineElement);
            });
          } else {
            // Handle old format with first/second
            const firstLine = document.createElement('div');
            firstLine.className = 'poem-line text-center';
            firstLine.textContent = item.first;
            
            const secondLine = document.createElement('div');
            secondLine.className = 'poem-line text-center';
            secondLine.textContent = item.second;
            
            poemLinesElement.appendChild(firstLine);
            poemLinesElement.appendChild(secondLine);
          }
          
          if (item.theme) {
            themeTagElement.textContent = item.theme;
            themeTagElement.classList.remove('hidden');
          }
          break;
        case 'aqtabasa':
          quoteTextElement.textContent = item.full;
          if (item.theme) {
            themeTagElement.textContent = item.theme;
            themeTagElement.classList.remove('hidden');
          }
          break;
        case 'nubdha':
          quoteTextElement.textContent = item.quote;
          if (item.title) {
            themeTagElement.textContent = item.title;
            themeTagElement.classList.remove('hidden');
          }
          break;
      }
    };

    // Copy text to clipboard
    const copyToClipboard = () => {
      let textToCopy = '';
      
      if (currentType === 'shi3r') {
        const lines = Array.from(document.querySelectorAll('#poemLines .poem-line')).map(el => el.textContent);
        textToCopy = lines.join('\n');
      } else {
        textToCopy = document.getElementById('quoteText').textContent;
      }
      
      navigator.clipboard.writeText(textToCopy)
        .then(() => {
          alert('تم نسخ النص بنجاح!');
        })
        .catch(err => {
          console.error('Failed to copy: ', err);
        });
    };

    // Export as image
    const exportAsImage = (aspectRatio) => {
      const container = document.querySelector('.card');
      const originalWidth = container.offsetWidth;
      const originalHeight = container.offsetHeight;
      
      // Calculate new dimensions based on aspect ratio
      let newWidth, newHeight;
      if (aspectRatio === '1') {
        newWidth = 1080;
        newHeight = 1080;
      } else if (aspectRatio === '9/16') {
        newWidth = 1080;
        newHeight = 1920;
      } else {
        newWidth = 1920;
        newHeight = 1080;
      }
      
      container.style.width = `${newWidth}px`;
      container.style.height = `${newHeight}px`;
      
      html2canvas(container, {
        backgroundColor: null,
        scale: 2,
        useCORS: true
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `quote-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        // Restore original dimensions
        container.style.width = `${originalWidth}px`;
        container.style.height = `${originalHeight}px`;
        
        // Close modal
        document.getElementById('exportModal').classList.add('hidden');
      });
    };

    // Event Listeners
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      
      document.getElementById('darkModeToggle').addEventListener('change', (e) => {
        if (e.target.checked) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
      });
      
      document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
      
      document.getElementById('exportBtn').addEventListener('click', () => {
        document.getElementById('exportModal').classList.remove('hidden');
      });
      
      document.querySelectorAll('.aspect-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const aspect = e.target.getAttribute('data-aspect');
          exportAsImage(aspect);
        });
      });
      
      document.getElementById('closeExportModal').addEventListener('click', () => {
        document.getElementById('exportModal').classList.add('hidden');
      });
    });

    // Preload next quote to improve performance
    let preloadTimeout;
    const preloadNext = () => {
      clearTimeout(preloadTimeout);
      preloadTimeout = setTimeout(() => {
        if (allData.length > 0) {
          Math.floor(Math.random() * allData.length); // Pre-calculate random index
        }
      }, 2000);
    };

    // Add click event to change quote
    document.getElementById('quoteDisplay').addEventListener('click', () => {
      showRandomQuote();
      preloadNext();
    });
  </script>
</body>
</html>
